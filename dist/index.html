<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 365/AVD入門</title>
<style>
/* === Theme: Dark (default) === */
:root, [data-theme="dark"] {
  --azure:#0078D4;--azure-dark:#106EBE;--azure-light:rgba(0,120,212,.12);
  --green:#107C10;--green-bg:rgba(16,124,16,.12);
  --purple:#742774;--purple-bg:rgba(116,39,116,.12);
  --red:#D83B01;--red-bg:rgba(216,59,1,.12);
  --yellow:#FFB900;--yellow-bg:rgba(255,185,0,.12);
  --teal:#008B8B;--teal-bg:rgba(0,139,139,.12);
  --bg:#09090b;--card-bg:#18181b;--card-border:#27272a;
  --fg:#ffffff;--fg-sub:#a1a1a1;--fg-muted:#52525b;
  --header-bg:rgba(9,9,11,.85);--sb-hover:rgba(0,120,212,.12);
  --input-bg:rgba(255,255,255,.05);--row-hover:rgba(255,255,255,.03);
  --radius:12px;--radius-full:9999px;
}
/* === Theme: Light === */
[data-theme="light"] {
  --bg:#F3F2F1;--card-bg:#FFFFFF;--card-border:#E1DFDD;
  --fg:#323130;--fg-sub:#605E5C;--fg-muted:#A19F9D;
  --header-bg:rgba(255,255,255,.9);--sb-hover:rgba(0,120,212,.08);
  --input-bg:rgba(0,0,0,.03);--row-hover:rgba(0,0,0,.02);
  --azure-light:rgba(0,120,212,.08);--green-bg:rgba(16,124,16,.08);
  --purple-bg:rgba(116,39,116,.08);--red-bg:rgba(216,59,1,.08);
  --yellow-bg:rgba(255,185,0,.1);--teal-bg:rgba(0,139,139,.08);
}
/* === Theme: Blue === */
[data-theme="blue"] {
  --bg:#001B3D;--card-bg:#002050;--card-border:#003380;
  --fg:#DEECF9;--fg-sub:#8CBAE8;--fg-muted:#4A7FB5;
  --header-bg:rgba(0,27,61,.9);--sb-hover:rgba(0,120,212,.15);
  --input-bg:rgba(255,255,255,.06);--row-hover:rgba(255,255,255,.04);
  --azure-light:rgba(0,120,212,.18);--green-bg:rgba(16,124,16,.15);
  --purple-bg:rgba(116,39,116,.15);--red-bg:rgba(216,59,1,.12);
  --yellow-bg:rgba(255,185,0,.12);--teal-bg:rgba(0,139,139,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Segoe UI","Meiryo UI",system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased;}

/* Header */
.header{position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--card-border);}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;padding:14px 24px;gap:14px;}
.header .logo{display:flex;align-items:center;gap:8px;}
.header .logo-grid{width:16px;height:16px;display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.header .logo-grid span{background:var(--azure);border-radius:1px;}
.header h1{font-size:15px;font-weight:600;}
.header .progress-wrap{margin-left:auto;display:flex;align-items:center;gap:10px;}
.header .prog-bar{width:140px;height:5px;background:var(--card-border);border-radius:3px;overflow:hidden;}
.header .prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}
.header .prog-text{font-size:12px;color:var(--fg-sub);}

/* Layout */
.layout{display:flex;max-width:1100px;margin:0 auto;min-height:calc(100vh - 50px);}

/* Sidebar */
.sidebar{width:260px;border-right:1px solid var(--card-border);overflow-y:auto;position:sticky;top:50px;height:calc(100vh - 50px);flex-shrink:0;padding:16px 0;}
.sb-section{padding:8px 16px;margin-bottom:4px;}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--fg-muted);margin-bottom:6px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 12px;margin-bottom:2px;border-radius:8px;font-size:12px;cursor:pointer;color:var(--fg-sub);transition:all .12s;}
.sb-item:hover{background:var(--azure-light);color:var(--fg);}
.sb-item.active{background:var(--azure-light);color:var(--azure);font-weight:600;}
.sb-item.done{color:var(--green);}
.sb-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sb-item .check{font-size:10px;width:16px;text-align:center;}

/* Main */
.main{flex:1;padding:28px 36px;overflow-y:auto;}

/* Hero welcome */
.hero{text-align:center;padding:48px 20px 32px;}
.hero h2{font-size:36px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--azure),#50a0e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:16px;color:var(--fg-sub);max-width:560px;margin:0 auto 28px;}
.hero-stat{font-size:48px;font-weight:700;color:var(--fg);}
.hero-stat-label{font-size:13px;color:var(--fg-muted);}

.month-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:780px;margin:24px auto 0;}
.month-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform .15s,border-color .15s;}
.month-card:hover{transform:translateY(-2px);border-color:var(--azure);}
.month-card .mc-num{font-size:32px;font-weight:700;margin-bottom:4px;}
.month-card h3{font-size:14px;font-weight:600;margin-bottom:2px;}
.month-card p{font-size:11px;color:var(--fg-muted);}
.month-card .mc-prog{margin-top:8px;height:4px;background:var(--card-border);border-radius:2px;overflow:hidden;}
.month-card .mc-prog-fill{height:100%;border-radius:2px;transition:width .3s;}

/* Topic view */
.topic-view{display:none;}.topic-view.active{display:block;}
.breadcrumb{font-size:12px;color:var(--fg-muted);margin-bottom:4px;}
.topic-title{font-size:26px;font-weight:700;margin-bottom:6px;}
.key-msg{font-size:14px;color:var(--fg-sub);padding:10px 16px;background:var(--azure-light);border-left:3px solid var(--azure);border-radius:0 8px 8px 0;margin-bottom:20px;}

/* Block */
.block{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px 24px;margin-bottom:14px;}
.block h3{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.block h3 .icon{font-size:20px;}

/* List items */
.block ul{list-style:none;padding:0;}
.block ul li{padding:10px 14px;margin-bottom:5px;background:rgba(255,255,255,.04);border:1px solid var(--card-border);border-radius:8px;font-size:13px;color:var(--fg-sub);border-left:3px solid var(--azure);}
.block ul li.green{border-left-color:var(--green);}
.block ul li.red{border-left-color:var(--red);}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.card{background:rgba(255,255,255,.03);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px 18px;}
.card h4{font-size:13px;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--card-border);}
.card ul{list-style:none;padding:0;}
.card ul li{font-size:12px;padding:3px 0;color:var(--fg-sub);border:none;background:none;margin:0;border-left:none;}
.card ul li::before{content:"→ ";color:var(--azure);font-weight:600;}

/* Table */
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.cmp-table th{background:rgba(0,120,212,.15);color:var(--azure);padding:9px 10px;text-align:center;font-weight:600;border-bottom:1px solid var(--card-border);}
.cmp-table th:first-child{text-align:left;}
.cmp-table td{padding:8px 10px;border-bottom:1px solid var(--card-border);color:var(--fg-sub);}
.cmp-table tr:hover{background:rgba(255,255,255,.03);}

/* Flow diagram */
.diagram{display:flex;align-items:center;justify-content:flex-start;gap:0;padding:14px 0;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;}
.diagram-step{text-align:center;min-width:110px;}
.diagram-box{border:1px solid var(--card-border);border-radius:10px;padding:14px 10px;margin:0 6px;background:var(--card-bg);}
.diagram-box.blue{border-color:var(--azure);background:var(--azure-light);}
.diagram-box.green{border-color:var(--green);background:var(--green-bg);}
.diagram-box .d-icon{font-size:22px;margin-bottom:4px;}
.diagram-box h5{font-size:11px;font-weight:600;color:var(--fg);}
.diagram-box p{font-size:10px;color:var(--fg-muted);}
.diagram-arrow{font-size:16px;color:var(--azure);font-weight:700;}

/* Pillars */
.pillar-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0;}
.pillar{text-align:center;padding:16px 6px;border-radius:10px;color:white;font-size:12px;font-weight:600;}

/* Links */
.link-box{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--azure-light);border:1px solid rgba(0,120,212,.3);border-radius:var(--radius-full);font-size:12px;color:var(--azure);text-decoration:none;margin:4px 4px 4px 0;transition:background .12s;}
.link-box:hover{background:rgba(0,120,212,.2);}

/* Complete bar */
.complete-bar{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);margin-top:16px;}
.btn{padding:10px 24px;border:none;border-radius:var(--radius-full);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-green{background:var(--green);color:white;}
.btn-green:hover{opacity:.85;}
.btn-outline{background:transparent;border:1px solid var(--card-border);color:var(--fg-sub);}
.btn-outline:hover{background:rgba(255,255,255,.05);color:var(--fg);}
.btn-azure{background:var(--azure);color:white;}
.btn-azure:hover{background:var(--azure-dark);}

/* Quiz */
.quiz-q{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px 22px;margin-bottom:12px;border-left:3px solid var(--azure);}
.quiz-q.scenario{border-left-color:var(--purple);}
.quiz-q h4{font-size:14px;font-weight:600;margin-bottom:8px;}
.quiz-answer{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--fg);resize:vertical;min-height:56px;}
.quiz-answer:focus{outline:none;border-color:var(--azure);}
.quiz-hint{display:none;margin-top:8px;padding:10px 14px;background:var(--green-bg);border:1px solid rgba(16,124,16,.3);border-radius:8px;font-size:12px;color:var(--green);}
.quiz-hint.active{display:block;}
.hint-btn{background:none;border:1px solid var(--card-border);border-radius:var(--radius-full);padding:4px 12px;font-size:11px;cursor:pointer;color:var(--fg-muted);margin-top:6px;font-family:inherit;}
.hint-btn:hover{border-color:var(--fg-muted);color:var(--fg-sub);}

.section-divider{margin:20px 0 12px;padding:8px 0;border-bottom:1px solid var(--card-border);}
.section-divider h3{font-size:14px;font-weight:600;color:var(--fg-muted);}

/* Theme switcher */
.theme-switcher{display:flex;gap:4px;align-items:center;margin-right:8px;}
.theme-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--card-border);cursor:pointer;transition:transform .15s,border-color .15s;position:relative;}
.theme-btn:hover{transform:scale(1.15);}
.theme-btn.active{border-color:var(--azure);box-shadow:0 0 0 2px rgba(0,120,212,.3);}
.theme-btn.dark-btn{background:#18181b;}
.theme-btn.light-btn{background:#F3F2F1;}
.theme-btn.blue-btn{background:#002050;}

/* Save indicator */
.save-indicator{font-size:10px;color:var(--green);opacity:0;transition:opacity .3s;margin-left:4px;}
.save-indicator.show{opacity:1;}

@media(max-width:800px){
  .sidebar{display:none;}
  .month-cards{grid-template-columns:1fr;}
  .card-grid{grid-template-columns:1fr;}
  .pillar-row{grid-template-columns:repeat(3,1fr);}
  .main{padding:20px 16px;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo" onclick="view='welcome';renderSB();renderMain();upd();window.scrollTo(0,0);" style="cursor:pointer;">
      <div class="logo-grid"><span></span><span></span><span></span><span></span></div>
      <h1>Windows 365/AVD入門</h1>
    </div>
    <div class="theme-switcher">
      <div class="theme-btn dark-btn" title="Dark" onclick="setTheme('dark')"></div>
      <div class="theme-btn light-btn" title="Light" onclick="setTheme('light')"></div>
      <div class="theme-btn blue-btn" title="Blue" onclick="setTheme('blue')"></div>
    </div>
    <div class="progress-wrap">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <span class="prog-text" id="progText">0%</span>
      <span class="save-indicator" id="saveInd">✓ 保存済み</span>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<script>
const T=[{month:1,title:"基礎固め",color:"#0078D4",period:"Week 1-4",topics:[

// ═══════════════════════════════════════════════════════
// Topic 1: ゼロトラスト
// ═══════════════════════════════════════════════════════
{id:"zt",title:"ゼロトラスト",week:"Week 1",time:"3h",keyMsg:"「社内は安全」を捨て、全アクセスを常に検証するモデル",content:[
{type:"list",title:"ゼロトラストとは何か — 基礎から理解する",icon:"📖",items:[
"ゼロトラストとは「何も信頼しない(Zero Trust)」を前提としたセキュリティモデルのことで、2010年にForrester Researchのジョン・キンダーバーグ氏が提唱した考え方です",
"従来のセキュリティは「城と堀(Castle and Moat)」モデルと呼ばれ、企業ネットワークの境界(ファイアウォール/VPN)を守れば中は安全という考え方でした。社内LANに入れば信頼されたユーザーとして扱われていました",
"しかしクラウド(M365/SaaS)の普及とリモートワークの一般化により、「社内ネットワーク」という境界自体が曖昧になりました。データはクラウドに、ユーザーは自宅や外出先にいます",
"ゼロトラストでは、アクセス元が社内であっても社外であっても、全てのアクセス要求を毎回検証します。「信頼するが検証する(Trust but Verify)」ではなく「検証してから信頼する(Verify then Trust)」という発想転換です",
"なぜ今ゼロトラストが必要か: ランサムウェア攻撃の85%以上がVPN/リモートアクセス経由で侵入しています(2023年統計)。境界防御だけでは防げない攻撃が主流になっています",
"お客様への説明の仕方: 「ゼロトラスト=何も信じないではなく、毎回確認する仕組みです。銀行ATMのように、カードを入れてもPINを入力しても、毎回本人確認をしますよね。あれと同じ考え方です」"]},
{type:"flow",title:"ゼロトラスト導入の段階的ステップ",icon:"📈",steps:[
{icon:"🔑",label:"Step 1: MFA導入",desc:"全ユーザーにMFA必須化",style:"blue"},
{icon:"📋",label:"Step 2: CA設定",desc:"条件付きアクセスポリシー",style:""},
{icon:"📱",label:"Step 3: デバイス管理",desc:"Intune準拠チェック",style:""},
{icon:"🛡️",label:"Step 4: EDR導入",desc:"Defender for Endpoint",style:""},
{icon:"🌐",label:"Step 5: SASE/GSA",desc:"NWセキュリティ統合",style:"green"}]},
{type:"cards",title:"3つの原則 — 具体例で理解する",icon:"🛡️",cards:[
{title:"原則1: 明示的に検証する",color:"red",items:[
"全てのアクセス要求で認証・認可を実施する",
"ユーザーID・デバイス状態・場所・アプリ・データ感度を総合評価",
"実例: 社内LANからのアクセスでも毎回MFAを要求",
"実例: 管理者がAzure Portalにアクセスする際、フィッシング耐性MFA(FIDO2)を要求",
"従来型: VPN接続済み=信頼→社内リソース全てアクセス可能だった",
"ゼロトラスト: VPN接続済みでも、アクセス先ごとに条件を再評価",
"ポイント: 「一度認証したから安全」という考えを排除する"]},
{title:"原則2: 最小特権アクセス",color:"yellow",items:[
"業務に必要な最小限の権限のみを付与する",
"JIT (Just-In-Time): 必要な時だけ権限を昇格させる",
"実例: Global Adminは常時付与せず、PIMで申請→承認→時間制限付き昇格",
"実例: 開発者にはDevサブスクリプションのContributor権限のみ、Prodには読み取りのみ",
"データ分類: 機密データにアクセスできるユーザーを限定(DLP連携)",
"セグメンテーション: ネットワークを分割し横方向移動を防止",
"ポイント: 「必要十分」を常に問い直す文化が重要"]},
{title:"原則3: 侵害を前提とする",color:"",items:[
"攻撃者は既にネットワーク内にいると仮定して設計する",
"ブラストラジアス(被害範囲)を最小化する設計",
"実例: ランサムウェアが1台に感染しても他デバイスに拡散しない設計",
"実例: 管理者アカウント侵害時、影響範囲を1サービスに限定",
"マイクロセグメンテーション: アプリ間の通信も制御",
"EDR/XDR: 侵害後の検知・対応を自動化(Defender)",
"暗号化: データは保存時も転送中も常に暗号化",
"ポイント: 「侵入されないこと」ではなく「侵入されても大丈夫」を目指す"]}]},
{type:"table",title:"ゼロトラスト成熟度モデル — 現在地を把握する",icon:"📊",headers:["段階","ID","デバイス","ネットワーク","状態","次のアクション"],rows:[
["Level 0: 未着手","パスワードのみ","管理なし","VPNのみ","多くの中小企業が該当","MFA導入から開始"],
["Level 1: 基本","MFA導入済み","Intune登録開始","レガシー認証ブロック","M365 E3導入済み企業","CAポリシー強化"],
["Level 2: 標準","CA+準拠デバイス","Intune完全管理","条件付きNWアクセス","セキュリティ意識の高い企業","ID Protection導入"],
["Level 3: 高度","パスワードレス+PIM","EDR+自動隔離","SASE/GSA導入","先進的な大企業","ゼロトラスト完成"],
["Level 4: 最適化","継続的なリスク評価","自動修復","全通信の可視化","ゼロトラスト先進企業","継続的な改善"]]},
{type:"diagram",title:"ゼロトラストの6つの柱",icon:"🏛️",pillars:[
{label:"ID",color:"#0078D4",desc:"本人確認"},{label:"デバイス",color:"#5C2D91",desc:"端末検証"},
{label:"NW",color:"#008B8B",desc:"通信保護"},{label:"アプリ",color:"#107C10",desc:"権限管理"},
{label:"データ",color:"#FFB900",desc:"分類・保護"},{label:"インフラ",color:"#D83B01",desc:"構成管理"}]},
{type:"table",title:"従来型セキュリティ vs ゼロトラスト比較",icon:"⚖️",headers:["比較軸","従来型(境界防御)","ゼロトラスト"],rows:[
["信頼モデル","社内NW=信頼、社外=不信頼","全てのアクセスを検証、信頼しない"],
["NW境界","ファイアウォール/VPNが防御線","境界の概念なし、ID中心の制御"],
["認証頻度","VPN接続時に1回","毎回の要求で継続的に評価"],
["横方向移動","NW内で自由に移動可能","マイクロセグメンテーションで制限"],
["リモートアクセス","VPN経由で社内NWに接続","どこからでもIDベースで直接アクセス"],
["デバイス信頼","社内NW接続=信頼","デバイス正常性を毎回チェック"],
["データ保護","NW境界内に保管","データ自体を分類・暗号化・DLP"],
["インシデント対応","境界突破後は検知困難","EDR/XDRで内部の脅威も検知"],
["クラウド対応","VPN経由で回り道","クラウドネイティブに直接アクセス"],
["運用コスト","VPN/FW機器の維持管理","クラウドサービスで運用軽減"]]},
{type:"cards",title:"DaaS/VDIとゼロトラストの関係",icon:"☁️",cards:[
{title:"DaaSがゼロトラストに貢献する理由",color:"green",items:[
"データがクラウドに留まり端末に残らない→情報漏洩リスク大幅減",

{id:"eid",title:"Entra ID",week:"Week 1",time:"4h",keyMsg:"Microsoft のクラウド ID 管理基盤。W365/AVDの認証・認可の中核",content:[
{type:"list",title:"なぜEntra IDが重要なのか — W365/AVD提案の起点",icon:"📖",items:[
"Entra ID(旧Azure AD)は、Microsoftクラウドサービス全体の認証・認可を司る中核基盤です。W365やAVDを提案する際、まず最初に確認すべきは「お客様のEntra IDの状態」です",
"お客様への説明の仕方: 「Entra IDはMicrosoftクラウドの「身分証明書発行所」です。M365もW365もAVDも、全てEntra IDで本人確認してからアクセスを許可します」",
"なぜW365/AVD提案で必須か: Cloud PCへのサインイン認証、条件付きアクセスによるアクセス制御、Intuneとの連携、全てEntra IDが起点になります",
"Active Directory(AD)との違い: ADはオンプレミスのWindowsサーバー上で動くディレクトリサービスで、Kerberos/NTLMプロトコルを使用します。Entra IDはクラウドネイティブのIDaaS(Identity as a Service)で、OAuth 2.0/OpenID Connect/SAMLを使用します",
"歴史: Azure Active Directory として2013年にリリースされ、2023年7月にMicrosoft Entra IDに名称変更されました。機能は変わっていないので、「名前が変わっただけ」とお客様に説明できます",
"提案時のポイント: Entra IDのライセンス(Free/P1/P2)によって使える機能が大きく異なるため、W365/AVD提案時には必ずお客様のM365ライセンスを確認しましょう"]},
{type:"flow",title:"オンプレADからEntra IDへの進化",icon:"🔄",steps:[

{type:"list",title:"基本概念 — 詳細解説",icon:"🔑",items:[
"テナント: 組織のID管理の単位（1社=1テナント）。Azure ADからEntra IDに名称変更(2023年7月)",

{type:"cards",title:"SSO(シングルサインオン) — 1回の認証で全アプリにアクセス",icon:"🔓",cards:[

{id:"ca",title:"条件付きアクセス",week:"Week 1-2",time:"4h",keyMsg:"「もし〜なら〜を要求する」ルールベースのアクセス制御。ゼロトラストの要",content:[
{type:"list",title:"条件付きアクセスとは — 基礎から理解する",icon:"📖",items:[
"条件付きアクセス(Conditional Access / CA)は、Entra IDの機能の一つで、「もし〜の条件なら、〜の制御を適用する」というIF-THENルールでアクセスを制御する仕組みです",
"なぜ必要か: 単純なパスワード+MFAだけでは不十分です。「社外からのアクセスにはMFA必須だが、社内の準拠デバイスからならMFA不要」といった柔軟な制御が求められます",
"お客様への説明の仕方: 「条件付きアクセスは、建物のセキュリティゲートのようなものです。社員証(ID)だけでなく、入る時間帯(場所/時間)、入る人の役職(ロール)、持ち物(デバイスの状態)を総合的にチェックして入館を判断します」",
"ゼロトラストとの関係: ゼロトラストの「明示的に検証する」原則を実装する中核機能です。全てのアクセスに対して条件を評価し、適切な制御を適用します",
"ライセンス要件: Entra ID P1以上(M365 E3に含まれる)が必要です。無料版(Free)では使えません。これはW365 Enterprise導入の前提条件でもあります",
"W365/AVD提案での重要性: Cloud PCへのアクセスを「誰が」「どこから」「どのデバイスで」「どのようなリスクレベルで」アクセスしているかに基づいて制御できます"]},

{id:"mfa",title:"MFA / パスワードレス",week:"Week 2",time:"2h",keyMsg:"パスワードだけでは不十分。管理者にはフィッシング耐性MFAを強く推奨",content:[
{type:"list",title:"なぜMFAが必要なのか — パスワードの限界を理解する",icon:"📖",items:[
"MFA(Multi-Factor Authentication / 多要素認証)とは、パスワード(知識要素)に加えて、スマートフォン(所持要素)や指紋(生体要素)など複数の要素で本人確認する仕組みです",
"パスワードだけの認証がなぜ危険か: Microsoftの統計によると、MFAを有効にするだけでアカウント侵害攻撃の99.9%を防御できます。逆に言えば、パスワードだけではほぼ無防備です",
"パスワード攻撃の種類: ブルートフォース(総当たり)、パスワードスプレー(よくあるパスワードを多数のアカウントに試行)、フィッシング(偽サイトで入力させる)、認証情報の漏洩(ダークウェブで売買)があります",
"お客様への説明の仕方: 「パスワードは鍵のようなもの。鍵だけだとコピーされたら終わりですが、MFAは鍵+指紋認証のようなもの。鍵をコピーされても指紋は複製できません」",
"W365/AVD提案での位置づけ: Cloud PCへのアクセスにMFAを必須にすることで、不正アクセスリスクを劇的に低減できます。条件付きアクセスと組み合わせて適用します",
"パスワードレスの目標: 最終的にはパスワード自体を廃止し、Windows Hello(顔/指紋)+FIDO2セキュリティキーだけで認証する世界を目指します。パスワードがなければパスワード攻撃自体が成立しません"]},

{type:"flow",title:"AiTM攻撃の仕組み — フィッシング耐性MFAが必要な理由",icon:"⚠️",steps:[

{type:"list",title:"AiTMフィッシング攻撃 — なぜSMSは危険か",icon:"⚠️",items:[
"AiTM(Adversary-in-the-Middle)攻撃: 攻撃者が偽サイトを中継し、ユーザーのMFAトークンをリアルタイムで窃取",
"攻撃の流れ: フィッシングメール→偽ログインページ→ユーザーが正規認証情報+MFA入力→攻撃者がセッションクッキーを横取り",
"SMS/電話MFAはAiTMに対して完全に無力: 攻撃者がリアルタイムで中継するため、ワンタイムコードも傍受される",
"SIMスワップ攻撃: 攻撃者がキャリアを騙して被害者の電話番号を乗っ取り→SMSを受信",
"SS7プロトコル攻撃: 通信プロトコルの脆弱性を突いてSMSを傍受する高度な攻撃",
"フィッシング耐性MFA(FIDO2/Passkey)はAiTMに有効: オリジンバインディングにより偽サイトでは認証が成立しない",
"実例: 2022年大規模AiTM攻撃キャンペーンで10,000+組織が標的に。SMS-MFAでは防げなかった",
"Microsoftの推奨: 管理者はフィッシング耐性MFA必須。一般ユーザーもAuthenticator(番号一致)以上を強く推奨"]},

{id:"idp",title:"Entra ID Protection",week:"Week 2",time:"2h",keyMsg:"AIがサインインリスクをリアルタイム評価し、怪しいアクセスを自動ブロック",content:[
{type:"list",title:"ID Protectionとは — なぜ必要なのか",icon:"📖",items:[
"Entra ID Protectionは、MicrosoftのAI/機械学習がサインインのリスクをリアルタイムで評価し、異常なアクセスを自動的にブロックまたは追加認証を要求する機能です",
"なぜ必要か: MFAだけでは防げない高度な攻撃(AiTMフィッシング、認証情報漏洩、内部不正)に対して、AIベースのリスク検知で自動的に防御します",
"お客様への説明の仕方: 「ID Protectionは、銀行のAI不正検知と同じ仕組みです。いつもと違う場所・時間・デバイスからのアクセスを自動検知して、本人確認を追加したりブロックしたりします」",
"Microsoftの規模の利点: 毎日6.5兆以上のシグナルを分析するMicrosoftの脅威インテリジェンスを活用。1社だけでは検知できない攻撃パターンも、グローバルな知見で検知可能です",
"W365/AVD提案での位置づけ: Cloud PCへの不正アクセスをAIが自動検知。「認証情報が漏洩しても、異常なサインインを検知して自動ブロック」という安心感を提供できます",
"ライセンス: Entra ID P2が必要(M365 E5に含まれる)。E3のお客様にはE5アップグレードの訴求ポイントになります"]},
{type:"flow",title:"ID Protectionのリスク検知から自動対応までの流れ",icon:"🔄",steps:[
{icon:"👤",label:"サインイン試行",desc:"ユーザーがアクセス",style:"blue"},
{icon:"🤖",label:"AI分析",desc:"6.5兆のシグナルと比較",style:""},
{icon:"⚠️",label:"リスク判定",desc:"低/中/高にスコアリング",style:""},
{icon:"🛡️",label:"自動対応",desc:"MFA要求/ブロック/通知",style:"green"}]},
{type:"cards",title:"リスク検知の種類と具体例",icon:"🛡️",cards:[
{title:"サインインリスク検知",color:"red",items:[
"匿名IPアドレス: Tor/VPN経由のサインインを検知",
"特殊な移動(Atypical travel): 東京→ニューヨーク間30分でサインイン→物理的に不可能",
"マルウェアリンクIPアドレス: 既知のマルウェアC2サーバーIPからのアクセス",
"不審なブラウザ: 通常と異なるブラウザ/OS/デバイスからのアクセス",
"パスワードスプレー: 同一IPから多数のアカウントに対してよくあるパスワードを試行",
"不審な受信トレイ操作: サインイン後にメール転送ルール作成→情報窃取の兆候",
"管理者確認: リアルタイムでアラートを受信しMicrosoft Entra管理センターで確認"]},
{title:"ユーザーリスク検知",color:"yellow",items:[
"漏洩した認証情報: ダークウェブ等でユーザーのパスワードが発見された場合",
"異常なユーザーアクティビティ: 通常のパターンと大きく異なる操作",
"疑わしいAPI呼び出し: 自動化ツールによる大量のAPI操作",
"ユーザーリスクは「アカウント自体が侵害されている可能性」を示す",
"サインインリスクとは独立して評価される",
"高リスク時の推奨対応: パスワード変更+MFA再登録を強制",
"セキュリティ管理者による手動確認・却下も可能"]}]},
{type:"list",title:"お客様からよくある質問と回答",icon:"💬",items:[
"Q: ID Protectionは本当に必要か → A: MFAだけでは防げないAiTM攻撃や認証情報漏洩に対して、AIベースのリスク検知で自動防御します。2022年以降のサイバー攻撃はMFA突破型が増加しており、ID Protectionの必要性が高まっています",
"Q: P2ライセンスが必要なのがネック → A: M365 E5に含まれます。E3→E5へのアップグレード訴求では「ID Protectionによるリアルタイムリスク検知」が最大のポイントです。年間数千万円の被害を防ぐ投資として、ライセンスコストは十分に正当化できます",
"Q: 誤検知(False Positive)が多くないか → A: Microsoftの6.5兆シグナルを活用したAIのため、誤検知率は非常に低いです。万が一誤検知があった場合は、管理者が「安全」として却下できます。リスクポリシーの閾値も調整可能です",
"Q: 既存のSIEMと連携できるか → A: Microsoft Sentinel(SIEM)とネイティブ連携し、サードパーティSIEM(Splunk/QRadar等)にもSyslog/API経由でリスクイベントを送信できます",
"Q: Cloud PC(W365)のアクセスにもID Protectionは有効か → A: 有効です。Cloud PCへのサインイン時のリスクを検知し、高リスクの場合はアクセスをブロックまたはMFAを追加要求します"]},
{type:"table",title:"リスクレベル別の推奨対応 — CAポリシーとの連携",icon:"📋",headers:["リスクレベル","サインインリスクの対応","ユーザーリスクの対応","Cloud PCへの影響"],rows:[
["なし","通常通りアクセス許可","通常通りアクセス許可","Cloud PCに通常接続"],
["低","ログに記録(監視のみ)","ログに記録(監視のみ)","Cloud PCに通常接続"],
["中","MFA要求(追加認証)","MFA+パスワード変更推奨","Cloud PC接続時にMFA再要求"],
["高","アクセスブロック","アクセスブロック+パスワード変更強制","Cloud PCへのアクセス完全遮断"],
["管理者の手動対応","リスクの確認→安全なら却下","パスワードリセット+MFA再登録","対応完了後にCloud PCアクセス復旧"]]},
{type:"list",title:"設定手順と推奨構成",icon:"⚙️",items:[
"前提: Entra ID P2ライセンス(M365 E5に含む)が必要",
"Step 1: Entra管理センター > 保護 > ID Protection > リスクポリシーを開く",
"Step 2: サインインリスクポリシーを構成 — 対象: 全ユーザー、リスク: 中以上、制御: MFAを要求",
"Step 3: ユーザーリスクポリシーを構成 — 対象: 全ユーザー、リスク: 高、制御: パスワード変更を要求",
"Step 4: ただし上記レガシーポリシーではなく、条件付きアクセスにリスク条件を統合する方法を推奨(2024年以降の推奨)",
"推奨: CA-AllUsers-HighSignInRisk-Block(サインインリスク高→ブロック)",
"推奨: CA-AllUsers-MediumSignInRisk-RequireMFA(サインインリスク中→MFA要求)",
"推奨: CA-AllUsers-HighUserRisk-RequirePasswordChange(ユーザーリスク高→パスワード変更)",
"注意: セルフサービスパスワードリセット(SSPR)を有効にしないとパスワード変更制御が機能しない"]},
{type:"table",title:"条件付きアクセスとの統合パターン",icon:"🔗",headers:["シナリオ","サインインリスク","ユーザーリスク","CA制御","効果"],rows:[
["通常アクセス","なし","なし","MFA要求","標準セキュリティ"],
["やや怪しい","中","なし","MFA+準拠デバイス","追加検証で安全確認"],
["危険なサインイン","高","なし","ブロック","即座にアクセス拒否"],
["認証情報漏洩","なし","中","MFA+パスワード変更","アカウント回復"],
["アカウント侵害","なし","高","ブロック+管理者通知","即座に隔離"],
["複合リスク","高","高","ブロック+インシデント対応","SOC連携"]]},
{type:"list",title:"ダッシュボード・モニタリング",icon:"📊",items:[
"ID Protection概要ダッシュボード: リスクユーザー数/リスクサインイン数をリアルタイム表示",
"リスクユーザーレポート: 現在リスクフラグが付いているユーザーの一覧。管理者が確認→安全→却下操作",
"リスクサインインレポート: リスクが検知されたサインインの詳細(IP/場所/デバイス/リスク理由)",
"脆弱性レポート: 組織全体のセキュリティ態勢の弱点を可視化",
"Microsoft Sentinel連携: ID Protectionのアラートをセキュリティ運用基盤に統合",
"自動修復の効果測定: 自動ブロック/MFA強制でどれだけの攻撃を防いだかをレポート",
"週次レビュー推奨: 高リスクユーザーの確認と対応を定期的に実施",
"提案ポイント: 「IPアドレス制限だけでは不十分。AIベースのリスク検知で未知の攻撃にも対応」"]
},
{type:"table",title:"ID Protection導入のBefore/After",icon:"📈",headers:["シナリオ","導入前の対応","導入後の対応"],rows:[
["認証情報がダークウェブに漏洩","気づかず放置→不正アクセスされるまで分からない","自動検知→ユーザーリスク「高」→パスワード変更を自動強制"],
["海外からの不審なサインイン","IP制限がなければ通過→サインインログで事後発見","特殊な移動を自動検知→即座にMFA要求またはブロック"],
["パスワードスプレー攻撃","ログイン失敗の監視を手動で実施(見落としあり)","AIが攻撃パターンを自動検知→対象アカウントを即座に保護"],
["内部不正(退職予定者)","行動監視なし→情報持ち出しに気づけない","異常なアクティビティを検知→管理者にアラート通知"],
["AiTMフィッシング攻撃","SMS-MFAでは防げず、セッショントークン窃取","リスクベースCAでセッション無効化+再認証要求"]]}
],
links:[{title:"MS Learn: ID Protection",url:"https://learn.microsoft.com/ja-jp/entra/id-protection/"}]},

{id:"intune",title:"Intune",week:"Week 3",time:"4h",keyMsg:"物理PCもW365もAVDも、Intuneで統一管理。最大の提案ポイント",content:[
{type:"list",title:"Intuneとは — なぜW365/AVD提案の最重要ポイントなのか",icon:"📖",items:[
"Microsoft Intune(旧Microsoft Endpoint Manager)は、クラウドベースのデバイス管理(MDM)とアプリ管理(MAM)を提供する統合エンドポイント管理(UEM)サービスです",
"なぜW365/AVD提案で最重要か: W365 Enterpriseの利用にはIntuneが必須です。つまりW365を提案する=Intune導入を提案することになります。物理PCもCloud PCもIntuneで統一管理できることが最大の差別化ポイントです",
"お客様への説明の仕方: 「Intuneは、会社のPC・スマホ・タブレット・Cloud PCの全てを1つの管理画面から管理できるサービスです。新しいPCを追加しても、Cloud PCを導入しても、管理ツールが変わらないので教育コストがかかりません」",
"従来のPC管理との違い: SCCM(System Center Configuration Manager)はオンプレミスに管理サーバーが必要でしたが、Intuneはクラウドサービスなので管理サーバーの構築・運用が不要です",
"ライセンス: M365 E3/E5に含まれます(Intune Plan 1)。高度な機能(Intune Plan 2)はM365 E3にアドオンとして追加できます。W365 Enterprise導入時にはM365 E3が前提なので、Intuneは「追加費用なし」で使えます",
"競合との差別化: Citrix DaaSやVMware HorizonではVDIと物理PCの管理ツールが別々になりますが、Microsoft環境ならIntuneで全て統一できます。管理コンソールが1つ=運用コスト削減です"]},
{type:"flow",title:"GPO管理からIntune管理への進化",icon:"🔄",steps:[
{icon:"🏢",label:"GPO時代",desc:"オンプレAD+SCCM",style:""},

{icon:"☁️",label:"クラウド管理",desc:"Intune単独運用",style:"green"}]},

{id:"dj",title:"デバイス参加方式",week:"Week 3",time:"3h",keyMsg:"Entra参加 vs ハイブリッド参加 — 必ず聞かれるポイント",content:[
{type:"list",title:"デバイス参加方式とは — なぜ理解が必要なのか",icon:"📖",items:[
"デバイス参加方式とは、PCやモバイルデバイスを組織のID管理基盤(Entra IDやオンプレAD)に「参加」させる方式のことです。参加方式によって管理方法やアクセスできるリソースが変わります",
"なぜW365/AVD提案で重要か: Cloud PCのプロビジョニング設定で「Entra参加」か「ハイブリッドEntra参加」かを選択する必要があります。この選択がネットワーク設計(MHN vs ANC)やオンプレ接続可否に直結します",
"お客様への説明の仕方: 「デバイスの参加方式は、その端末がどの身分証明書を持つかを決めるものです。Entra参加はクラウドの身分証、ハイブリッドはクラウドとオンプレ両方の身分証を持ちます」",
"お客様から必ず聞かれる質問: 「うちのPCはどっちにすべきですか？」→ 回答の鍵は「オンプレADに依存するアプリ(Kerberos/NTLM認証)があるかどうか」です",
"よくある誤解: 「Entra参加するとオンプレのファイルサーバーにアクセスできなくなる」→ 実際はEntra Private Access(GSA)やAzure Filesへの移行で対応可能です",
"推奨の方向性: 新規導入はEntra参加を推奨。既存環境はハイブリッドEntra参加で移行期間を設け、段階的にEntra参加に移行するのがベストプラクティスです"]},

"Step 1: Entra Connect設定でハイブリッドEntra参加を有効化(現状維持)",

{title:"AVDでの考慮点",color:"",items:[

{type:"list",title:"お客様への参加方式の説明テクニック",icon:"💬",items:[
"お客様の反応: 「ハイブリッドEntra参加が安全そう」→ 回答: ハイブリッドはAD依存が残るため移行が遅れます。新規導入ならEntra参加を推奨します。オンプレアクセスはGSA Private Accessで代替できます",

{id:"ap",title:"Autopilot",week:"Week 4",time:"3h",keyMsg:"箱から出して電源ONするだけで業務PCが完成。W365なら不要",content:[
{type:"list",title:"Autopilotとは — 基礎から理解する",icon:"📖",items:[
"Windows Autopilotは、新しいPCを箱から出して電源を入れるだけで、業務に必要なアプリ・設定・セキュリティポリシーが自動的に適用される仕組みです。IT部門がキッティング(手動セットアップ)する必要がなくなります",
"なぜ必要か: 従来のPC展開では、IT部門が1台ずつ手作業でOS設定・ドメイン参加・アプリインストールを行っていました。1台あたり2-4時間、年間100台リプレースなら200-400時間のIT工数がかかっていました",
"お客様への説明の仕方: 「新しいPCをAmazonで買って社員の自宅に直送できます。社員が電源を入れてサインインするだけで、会社のPCとして自動設定されます。IT部門は一切触る必要がありません」",
"W365との関係: W365 Cloud PCはAutopilotが不要です(ライセンス割当だけで自動プロビジョニング)。ただし物理PCが残る限り、Autopilotとの併用が現実的です",
"よくある誤解: 「Autopilotは新品PCしか使えない」→ 既存PCもハードウェアハッシュ登録でAutopilot対象にできます。また、Autopilot Resetで既存PCをリセットして再展開することも可能です",
"ライセンス: M365 E3/E5に含まれます(Intune連携が前提)。追加費用なしで利用開始できます"]},
{type:"table",title:"PC展開のBefore/After — Autopilotの効果",icon:"📈",headers:["項目","従来のPC展開","Autopilot展開"],rows:[

{id:"def",title:"Defender for Endpoint",week:"Week 4",time:"3h",keyMsg:"端末の脅威をリアルタイム検知・対応するEDR/XDR",content:[
{type:"list",title:"Defender for Endpointとは — なぜCloud PCにも必要なのか",icon:"📖",items:[
"Microsoft Defender for Endpoint(MDE)は、PC・サーバーなどのエンドポイント(端末)に対する脅威をリアルタイムで検知・調査・対応するEDR(Endpoint Detection and Response)ソリューションです",
"なぜCloud PCにも必要か: 「Cloud PCはクラウドにあるから安全」は誤解です。Cloud PCもWindowsが動いている以上、マルウェア感染・フィッシング・ランサムウェアのリスクは物理PCと同じです",
"お客様への説明の仕方: 「Defenderは24時間365日、PCの中を監視するAIセキュリティガードです。不審な動きを検知したら自動的に隔離し、管理者にアラートを送ります。物理PCにもCloud PCにも同じように適用できます」",
"EDRとアンチウイルスの違い: 従来のアンチウイルスは「既知のマルウェアをパターンマッチで検知」する方式。EDRは「端末の振る舞い(挙動)を監視し、未知の攻撃も検知」します。さらにXDRはメール・ID・クラウドアプリまで含めた統合検知を行います",
"Intune+CA連携: Defenderが端末を「高リスク」と判定→Intuneが「非準拠」に設定→条件付きアクセスがアクセスブロック。この自動連携が最大の強みです",
"ライセンス: M365 E5に含まれます。E3の場合はDefender for Endpoint P1(基本機能)が含まれ、P2(フル機能)はアドオンが必要です"]},

{id:"m365lic",title:"M365 ライセンス体系",week:"Week 3",time:"4h",keyMsg:"E3/E5/F1/F3/Business Premium — お客様のライセンスを見ればW365/AVDの提案方針が決まる",content:[
{type:"list",title:"なぜライセンス体系の理解が必要か",icon:"📖",items:[
"W365やAVDの提案において、お客様の既存ライセンスは「提案の前提条件」そのものです。ライセンスを知らずに提案を始めることは、地図を見ずに航海に出るようなものです",
"例えば「E3をお持ちなら、追加費用なしでIntuneとEntra ID P1が使えます。W365の前提条件は既に満たしています」と具体的に伝えられるSEは、お客様から圧倒的に信頼されます",
"逆に、お客様がE3を持っているのにEntra ID P1のアドオンを提案してしまうと「この人はライセンスを理解していない」と信頼を失います。ライセンスの知識は提案の基本中の基本です",
"W365 EnterpriseにはEntra ID P1 + Intuneが前提条件として必要です。E3/E5/Business Premiumにはこれらが含まれていますが、Business BasicやBusiness Standardには含まれていません",
"AVDの接続権(アクセス権)はM365 E3/E5/F3に含まれています。追加のCAL購入は不要です。これを知っているだけで「AVDは追加コストが大きい」という誤解を解消できます",
"ライセンス体系の理解は、アップセル/クロスセルの機会発見にも直結します。E3のお客様にE5の価値を説明し、Defender for Endpoint P2やPIM(特権管理)の導入を提案できます",
"CSP(Cloud Solution Provider)とEA(Enterprise Agreement)では価格体系が異なります。CSPは月額課金で柔軟性が高く、EAは年間契約で大規模向けのボリュームディスカウントがあります",
"ライセンス最適化の提案は、お客様にとって「コスト削減」という分かりやすい価値を提供できます。重複ライセンスの排除や、適切なプランへの切り替えで月額数百万円の削減が実現した事例もあります"]},

{type:"list",title:"ライセンス関連のよくある質問",icon:"💬",items:[
"Q: CSPとEAの違いは？ → A: CSP(Cloud Solution Provider)は月額課金でパートナー経由の契約。柔軟な増減が可能で中小企業向き。EA(Enterprise Agreement)は年間契約・前払いで大企業向け。最低500ライセンスからのボリュームディスカウントが適用されます",
"Q: 年契約と月契約の価格差は？ → A: 年間コミットメント(年契約)は月額契約より約20%安い場合が多い。ただし途中解約ができないため、人員変動が激しい場合は月契約が安全です",
"Q: ライセンスのアップグレードパスは？ → A: E3→E5へは差額のみで移行可能。Business Premium→E3は新規契約が必要(300名上限の壁)。F3→E3も差額移行可能。段階的なアップグレード計画を提案しましょう",
"Q: アドオンの考え方は？ → A: E3 + Defender P2アドオン(¥580) = ¥5,080 vs E5 ¥7,130。Defenderだけならアドオンが安い。PIM+ID Protection+電話システムも必要ならE5の方がお得。お客様の必要機能を精査して判断",
"Q: ライセンスの棚卸しはどうやる？ → A: M365管理センター→ライセンス→使用状況レポートで確認。未使用ライセンスの発見→再割当/削減でコスト最適化。PowerShellスクリプトで一括確認も可能",
"Q: 試用版はある？ → A: M365 E5は25ライセンス/1ヶ月の無料試用版があります。W365も試用版(2ヶ月)を提供中。まず試用版でPoC(概念実証)を行い、効果を確認してから本契約を推奨します",
"提案のコツ: ライセンスの話は「お客様が既に持っているものを活かす」という切り口で始めると、追加コストへの抵抗感が下がります",

{id:"pim",title:"Entra PIM",week:"Week 4",time:"3h",keyMsg:"常時Global Adminをゼロに — 特権の常時保有こそが最大のリスク。Stryker事案の教訓",content:[
{type:"list",title:"なぜPIMが必要か — Stryker事案から学ぶ",icon:"📖",items:[
"2026年3月に発生したStryker社の事案は、特権アクセス管理の重要性を世界中に知らしめました。元従業員がGlobal Admin権限を悪用し、Intune経由で約8万台のデバイスにリモートワイプを実行した事件です",
"攻撃者はマルウェアを一切使用していません。正規の管理者権限と正規の管理機能(Intune Wipe)を使って攻撃を実行しました。これは従来のアンチウイルスやEDRでは検知・防止できない攻撃パターンです",
"根本原因は「Global Admin権限の常時保有」です。退職後もアカウントが有効だった、あるいは権限が常時付与されていたことが、この大規模インシデントを可能にしました",
"PIM(Privileged Identity Management)が導入されていれば、Global Admin権限は常時付与されず、昇格時には承認と時間制限が必要になるため、この攻撃は構造的に不可能でした",
"日本企業でも「ITの管理者が1人しかおらず、その人がGlobal Admin権限を常時持っている」というケースは非常に多いです。これはStryker事案と同じリスクを抱えていることを意味します",
"お客様への説明の仕方: 「Global Adminは会社の全てのデータ・全てのデバイスを制御できる「神の権限」です。この権限を24時間365日、誰かが常に持っている状態は、金庫の鍵を玄関に置いているのと同じです」",
"PIMはEntra ID P2の機能で、M365 E5に含まれています。E3のお客様には「PIMのためにE5にアップグレードする価値がある」と提案できます。セキュリティインシデントの被害額を考えれば、月額¥2,630/userの差額は安い投資です",
"Stryker事案の被害: 約8万台のデバイスが初期化され、業務停止の影響は数億ドル規模と推定されています。PIMの月額コストと比較すれば、投資対効果は明白です"]},
{type:"flow",title:"攻撃のキルチェーン — Stryker事案の再構成",icon:"⚠️",steps:[
{icon:"🎣",label:"認証情報取得",desc:"フィッシング or 既存権限悪用",style:""},
{icon:"🔑",label:"Global Admin作成",desc:"最高権限を自分に付与",style:"blue"},
{icon:"📱",label:"Intune操作",desc:"デバイス管理画面にアクセス",style:""},
{icon:"💥",label:"一括ワイプ実行",desc:"8万台にリモートワイプ送信",style:""},
{icon:"🔥",label:"全社壊滅",desc:"全デバイス初期化・業務停止",style:"green"}]},
{type:"cards",title:"PIMの3つの柱",icon:"🏛️",cards:[
{title:"Just-in-Time(必要時のみ昇格)",color:"",items:[
"通常時はGlobal Admin権限を持たない「一般ユーザー」として作業する",
"管理作業が必要な時だけ、PIMポータルから「昇格申請」を行う",
"設定例: Global Admin権限は常時0人。緊急時に申請→承認→最大4時間のみ昇格",
"効果: 攻撃者がアカウントを乗っ取っても、その時点ではAdmin権限を持っていない",
"Windows Helloの例え: 「鍵は使う時だけ取り出す。使い終わったら金庫に戻す」と同じ発想",
"注意: 緊急時のブレークグラス(非常用)アカウントは別途用意しておくことが推奨されます"]},
{title:"承認制(第三者の承認が必要)",color:"green",items:[
"昇格申請を行うと、事前に指定された承認者(別の管理者やセキュリティチーム)に通知が送られる",
"承認者が「この昇格は正当な理由がある」と判断した場合のみ、権限が付与される",
"設定例: Global Adminの昇格には、セキュリティチームリーダーの承認が必須",
"Stryker事案への対策: 攻撃者が昇格を申請しても、承認者が拒否すれば権限は得られない",
"承認者は最低3名を推奨: 1名だと承認者自身がリスクになる。3名で相互牽制",
"監査証跡: 誰が申請し、誰が承認し、何を行ったかが全てログに記録される"]},
{title:"時間制限(最大8時間で自動失効)",color:"purple",items:[
"昇格が承認されても、指定した時間が経過すると自動的に権限が失効する",
"設定例: Global Admin昇格は最大4時間。Security Adminは最大8時間。タスクに応じて設定",
"効果: 管理者が権限を「戻し忘れる」リスクをゼロにする。人間のミスに依存しない",
"ストーリー: 「以前は管理者が権限を持ったまま退社→翌朝もAdmin権限を保持」という状況が頻発していた",
"自動延長: 時間内に作業が終わらない場合、再度申請→承認のプロセスを経て延長可能",
"Stryker事案への対策: 仮に権限を得ても最大数時間で自動失効。長期的な悪用は不可能"]}]},

{type:"list",title:"PIMの設定手順 — ステップバイステップ",icon:"⚙️",items:[
"Step 1: Entra管理センター(https://entra.microsoft.com)にGlobal Adminでサインイン。この作業自体が「最後の常時Admin操作」となります",
"Step 2: 左メニュー→「ID ガバナンス」→「Privileged Identity Management」を選択。PIMのダッシュボードが表示されます",
"Step 3: 「Microsoft Entra ロール」→「ロール」を選択。Global Admin、Security Admin等の各ロールが一覧表示されます",
"Step 4: 各ロールをクリック→「設定」→「昇格の最大期間」を設定(Global Adminは4時間を推奨)。「承認が必要」をオンにします",
"Step 5: 承認者グループを指定。「承認者」セクションで、承認権限を持つユーザーまたはグループを選択します。最低3名を推奨",
"Step 6: 「MFAが必要」をオンに設定。可能であれば「認証強度」で「フィッシング耐性MFA」を指定します(FIDO2キーまたはWindows Hello)",
"Step 7: 「通知」タブで、昇格申請時・承認時・期限切れ時の通知先メールアドレスを設定。CISOやセキュリティチームのDLを指定",
"Step 8: 現在Global Admin権限を常時持っているユーザーの割り当てを「Eligible(対象)」に変更。「Active(有効)」から「Eligible」に切り替えることで、常時保有→申請制に移行完了"]},
{type:"cards",title:"PIM + MAA の二重防御 — 構造的安全性の確保",icon:"🛡️",cards:[
{title:"PIM — 誰が昇格できるかを制御",color:"",items:[
"PIMは「特権ロールへのアクセス」を制御する仕組み。誰が管理者になれるかをゲートキーピング",
"Just-in-Time + 承認制 + 時間制限の3層で、不正な特権取得を構造的に防止",
"例: Global Admin昇格には、セキュリティチームリーダーの承認 + フィッシング耐性MFA + 最大4時間の時間制限",
"PIMだけでは不十分: 正当に昇格した管理者が(意図的または無意識に)破壊的な操作を行うリスクは残る",
"Stryker事案では、攻撃者がGlobal Admin権限を「正当に」保有していた。PIMがあれば昇格自体を防止できた可能性が高い",
"PIMのカバー範囲: Entra IDのロール(Global Admin/Intune Admin等)およびAzureリソースのロール"]},
{title:"MAA — 昇格後に何ができるかを制御",color:"green",items:[
"MAA(Multi Admin Approval)は「管理操作の実行」を制御する仕組み。昇格後でも危険な操作には承認が必要",
"例: Intune Adminに昇格した後でも、デバイスワイプの実行には別の管理者の承認が必要",
"PIM + MAAの組み合わせ: 「昇格するにも承認が必要」+「昇格後の操作にも承認が必要」= 二重の構造的防御",
"Stryker事案への対策: 仮にGlobal Admin権限を得ても、MAAがあれば8万台のワイプ操作に承認が必要→単独犯行は不可能",
"金融機関の「ダブルチェック」と同じ考え方: 振込処理に2人の承認が必要なのと同じ。管理操作にも2人の目が必要",
"PIMとMAAは競合する機能ではなく、補完する機能です。両方導入することで初めて構造的な安全性が確保されます"]}]},

["コンプライアンス","特権管理の証跡が不十分","PIMのレポートで監査要件を満たす"]]},
{type:"list",title:"お客様への説明の仕方 — 実践的トーク集",icon:"💬",items:[
"導入トーク: 「御社のGlobal Admin権限を持っている方は何名いらっしゃいますか？常時お持ちですか？」→ここからPIMの話を自然に始められます",
"Stryker事案の引用: 「2026年3月に米国の医療機器メーカーで、管理者権限を悪用して8万台のPCが初期化される事案がありました。マルウェアではなく、正規の管理機能で実行されたため、EDRでは防げませんでした」",
"コストの説明: 「PIMはEntra ID P2に含まれ、M365 E5ライセンス(¥7,130/user/月)で利用できます。E3(¥4,500)との差額は¥2,630ですが、セキュリティインシデントの被害額(数億円)を考えれば、極めて合理的な投資です」",
"ROIの説明: 「1回のセキュリティインシデントの平均被害額は約4億円(IBM調査)。PIMの年間コスト(¥31,560/user)は、1名分のAdmin管理のために支払う保険料として考えてください」",
"抵抗への対応: 「承認が面倒」という反論には「銀行の振込に承認が必要なのと同じです。全社のPCを管理する権限なら、それ以上の慎重さが必要ではないでしょうか」と返しましょう",
"段階的導入: 「まずはGlobal AdminだけPIMを適用し、1ヶ月間運用してみましょう。効果を実感したら他のロール(Security Admin, Intune Admin)に拡大できます」",
"緊急時の対策: 「ブレークグラスアカウント(緊急用)を2つ用意し、金庫等に保管。承認者全員が不在の緊急時にのみ使用するルールを策定しましょう」",
"提案のコツ: PIMの話は「セキュリティ強化」ではなく「リスク管理」として経営層に説明すると通りやすい。「万が一の被害を構造的に防ぐ仕組み」という位置づけ"]}
],

// ═══════════════════════════════════════════════════════
// Topic 12: Microsoft Purview
// ═══════════════════════════════════════════════════════
{id:"purview",title:"Microsoft Purview",week:"Week 4",time:"3h",keyMsg:"データの分類・保護・ガバナンス — DaaS環境でデータがクラウドに集約されるからこそ重要",content:[
{type:"list",title:"なぜPurviewがW365/AVD提案に関係するか",icon:"📖",items:[
"DaaS(Desktop as a Service)の本質は「データをクラウドに集約する」ことです。W365やAVDを導入すると、ユーザーのデスクトップ・ファイル・アプリケーションデータが全てMicrosoftのデータセンターに集まります",
"お客様がDaaS導入を検討する際、最も多い懸念が「データが手元にないのが不安」です。この不安に対してPurviewは「むしろクラウドに集約した方が安全」と回答できる具体的な根拠を提供します",
"物理PCの場合: データはPC本体・USB・個人メール等に分散し、管理も保護も困難です。退職者のPCにデータが残存していた、USBで持ち出されていた等のインシデントが頻発しています",
"DaaS + Purviewの場合: データはクラウドに集約→Purviewで自動的に分類・ラベル付け→暗号化→アクセス制御→監査ログ。「どのデータを誰がいつアクセスしたか」が完全に可視化されます",
"Purviewは「データの分類」「データの保護」「データのガバナンス」を統合したプラットフォームです。M365 E3でも基本機能が使え、E5で高度な自動分類やインサイダーリスク管理が利用可能です",
"W365/AVD提案時のセールストーク: 「物理PCではデータが散在して管理できませんが、DaaSならデータがクラウドに集約されます。さらにPurviewで自動保護をかけることで、物理PCより遥かに安全な環境が実現します」",
"コンプライアンス要件: 個人情報保護法、GDPR、ISMS(ISO27001)等の要件に対して、Purviewのデータ分類・保護・監査機能が直接的に対応します。監査法人への説明にも使えます",
"競合優位性: AWS WorkSpacesやCitrix DaaSには、Purviewのような統合的なデータ保護・ガバナンスプラットフォームがありません。Microsoft DaaS + Purviewの組み合わせは強力な差別化ポイントです"]},
{type:"diagram",title:"Purviewの主要機能 — 5つの柱",icon:"🏛️",pillars:[
{label:"情報保護",color:"#0078D4",desc:"秘密度ラベル"},
{label:"DLP",color:"#D83B01",desc:"漏洩防止"},
{label:"コンプライアンス",color:"#107C10",desc:"監査・保持"},
{label:"インサイダーリスク",color:"#5C2D91",desc:"内部脅威検知"},
{label:"データガバナンス",color:"#FFB900",desc:"分類・カタログ"}]},
{type:"cards",title:"主要3機能の詳細",icon:"🛡️",cards:[
{title:"秘密度ラベル — ファイルの自動分類と保護",color:"",items:[
"秘密度ラベルは、ファイルやメールに「分類タグ」を付与する機能です。ラベルに応じて暗号化・アクセス制限・透かし等の保護が自動適用されます",
"手動ラベル(E3): ユーザーがファイル作成時にWord/Excel/PowerPointのリボンからラベルを選択。「公開」「社内」「機密」「極秘」等から選択",
"自動ラベル(E5): AI(Trainable Classifiers)がファイルの内容を分析し、クレジットカード番号・マイナンバー・医療情報等のパターンを検知して自動的にラベルを適用",
"暗号化連携: 「機密」以上のラベルが付いたファイルは自動的にAES-256で暗号化。ファイルが社外に流出しても、権限のないユーザーは開けない",
"DaaS環境での効果: Cloud PC上で作成・編集される全てのファイルに秘密度ラベルが適用され、データの保護がシームレスに行われる",
"提案ポイント: 「ファイルそのものに保護がかかるので、万が一ファイルが流出しても中身は読めません」"]},
{title:"DLP — データ漏洩防止ルール",color:"red",items:[
"DLP(Data Loss Prevention)は、メール・Teams・SharePoint・OneDrive・エンドポイント(PC)でのデータ漏洩を防止するルールベースの制御です",
"ルール例①: マイナンバー(12桁の数字パターン)を含むファイルの社外メール送信をブロック",
"ルール例②: 「極秘」ラベルの付いたファイルのTeams外部共有を禁止",
"ルール例③: クレジットカード番号を含むメールの送信時に警告を表示し、ユーザーに確認を求める",
"エンドポイントDLP(E5): Cloud PC上のファイル操作(コピー/印刷/USBへの保存/ブラウザアップロード)を制御。W365ならUSBはそもそも存在しないが、画面キャプチャやクリップボード転送も制御可能",
"提案ポイント: 「うっかりミスによる情報漏洩も、意図的な持ち出しも、DLPで構造的に防止できます」"]},
{title:"監査ログ — 誰が何にアクセスしたかの完全な記録",color:"green",items:[
"基本監査(E3): ユーザーと管理者のアクティビティログを90日間保持。ファイルアクセス・メール送受信・管理操作等を記録",
"高度な監査(E5): 保持期間を最大10年に延長。さらにMailItemsAccessed(メールアイテムへのアクセスログ)等の高度なイベントを記録",
"検索機能: Microsoft Purview コンプライアンスポータルから、ユーザー・日時・アクティビティ種類でログを検索。CSVエクスポートも可能",
"インシデント対応: セキュリティインシデント発生時に「いつ・誰が・何にアクセスしたか」を正確に追跡。フォレンジック調査の基盤",
"コンプライアンス: 監査ログの保持は多くの規制要件(個人情報保護法・ISMS等)で求められています。Purviewの監査機能で要件を満たせます",
"提案ポイント: 「万が一の際に何が起きたかを正確に追跡できることが、経営層への説明責任を果たす鍵です」"]}]},
{type:"flow",title:"秘密度ラベルの適用フロー — ファイル作成から保護まで",icon:"🔄",steps:[
{icon:"📝",label:"ファイル作成",desc:"Word/Excel/PPT等で新規作成",style:"blue"},

{type:"table",title:"秘密度ラベルの設定例 — 推奨構成",icon:"🏷️",headers:["ラベル","色","暗号化","アクセス制限","透かし","適用例"],rows:[

{type:"list",title:"DaaS環境でのPurview活用 — W365/AVDならではの強み",icon:"🖥️",items:[
"W365 Cloud PCからのファイルアクセスに対してDLPルールを適用可能。SharePoint/OneDriveのファイル操作をリアルタイムで制御します",
"USBへのコピー禁止: 物理PCの場合はエンドポイントDLPでUSB制御が必要ですが、Cloud PCにはそもそもUSBポートが存在しません。これだけで物理的なデータ持ち出しリスクがゼロになります",
"画面キャプチャ制御: Cloud PCのセッション設定で画面キャプチャ(Print Screen)を無効化可能。Purviewの秘密度ラベルと組み合わせることで多層的な保護を実現",
"クリップボード制御: W365/AVDのRDPプロパティでクリップボードのリダイレクト(コピー&ペースト)を制御。Cloud PC↔ローカルPC間のデータ転送を禁止できます",
"透かし機能: 秘密度ラベルの「透かし」設定により、機密ファイルを開いた際にユーザー名やタイムスタンプの透かしが表示されます。不正な画面撮影への心理的抑止効果",
"Cloud PC上での自動ラベル適用: E5ライセンスがあれば、Cloud PC上で作成される全ファイルをAIが分析し、適切な秘密度ラベルを自動付与。ユーザーの手間なく保護を実現",
"統合管理: Purviewの管理ポータルからDaaS環境を含む全てのデータ保護を一元管理。物理PCとCloud PCで同じポリシーを適用できるため、管理の二重化が不要",
"提案トーク: 「DaaSにすればデータがクラウドに集約されます。そこにPurviewの自動保護をかけることで、データの分散→集約→保護→監視の全サイクルが完成します」"]},

{type:"list",title:"お客様への提案ポイント — 実践トーク集",icon:"💬",items:[
"導入トーク: 「御社のファイルは現在、どのように分類・保護されていますか？退職者が持ち出したファイルを追跡できますか？」→Purviewの必要性を実感させる質問",
"DaaS連携トーク: 「DaaSにすればデータがクラウドに留まります。さらにPurviewで自動保護をかけることで、物理PCより遥かに安全な環境が実現します。USB持ち出し・画面キャプチャ・クリップボード転送も全て制御可能です」",

// ═══════════════════════════════════════════════════════
// Topic 13: Intune MAA & RBAC
// ═══════════════════════════════════════════════════════
{id:"maa",title:"Intune MAA & RBAC",week:"Week 4",time:"3h",keyMsg:"最小特権 + 複数承認 — 管理者の操作を構造的に制御し、Stryker事案を防ぐ",content:[
{type:"list",title:"なぜMAA/RBACが重要か — 最小特権の原則",icon:"📖",items:[
"Stryker事案(2026年3月)の教訓は明確です。単独の管理者が全社規模の破壊的操作を実行できる環境は、構造的に危険です。MAA(Multi Admin Approval)とRBAC(Role-Based Access Control)は、この構造的リスクを解消する仕組みです",
"最小特権の原則(Principle of Least Privilege)とは: ユーザーや管理者に対して、業務遂行に必要な最小限の権限のみを付与する考え方です。「必要以上の権限は、リスクでしかない」が基本思想です",
"RBAC(ロールベースアクセス制御)は「誰にどの範囲の権限を与えるか」を定義する仕組みです。IntuneのRBACでは、ヘルプデスク・アプリ管理者・デバイス管理者等のロールを分離し、各管理者の操作範囲を限定します",
"MAA(複数管理者承認)は「危険な操作に対して複数人の承認を必要とする」仕組みです。1人の管理者だけでは破壊的な操作(デバイスワイプ等)を実行できないようにします",
"なぜPIMだけでは不十分か: PIMは「誰が管理者に昇格できるか」を制御しますが、昇格後の操作は制限しません。MAA/RBACは「昇格後に何ができるか」を制御します。PIM + MAA/RBACの組み合わせで二重防御が完成します",
"金融機関の「ダブルチェック(二重承認)」と同じ概念です。1億円の送金に2人の承認が必要なのと同様、8万台のデバイスワイプにも2人の承認が必要であるべきです",
"W365/AVD提案との関係: Cloud PCの管理はIntune経由で行われます。Intune管理者の権限を適切にRBACで分離し、MAAで危険操作を保護することは、DaaS環境の安全性に直結します",
"お客様への説明: 「管理者1人が暴走しても、あるいは管理者アカウントが乗っ取られても、被害を最小限に抑える構造的な安全装置です。個人の信頼に依存するのではなく、仕組みで安全性を担保します」"]},
{type:"flow",title:"MAA承認フロー — 危険な操作の実行プロセス",icon:"🔄",steps:[
{icon:"👤",label:"管理者がワイプ要求",desc:"Intuneでデバイス操作を実行",style:"blue"},
{icon:"🔔",label:"承認者に通知",desc:"承認者グループに通知送信",style:""},
{icon:"🔍",label:"承認者がレビュー",desc:"操作の正当性を確認",style:""},
{icon:"✅",label:"承認/拒否",desc:"承認者が判断を下す",style:""},
{icon:"⚡",label:"実行完了",desc:"承認後に管理者が完了操作",style:"green"}]},
{type:"table",title:"MAAで保護できるリソース — 保護対象一覧",icon:"📋",headers:["リソース","保護内容","推奨"],rows:[
["デバイスアクション","Wipe(初期化)/Retire(廃止)/Delete(削除)の実行に承認を要求","必須 — Stryker事案の直接的な対策"],
["アプリ展開","アプリの配布・更新・削除に承認を要求","推奨 — マルウェア配布の防止"],
["コンプライアンスポリシー","準拠条件の変更に承認を要求","推奨 — ポリシーの無断緩和を防止"],
["構成ポリシー","デバイス構成プロファイルの変更に承認を要求","推奨 — セキュリティ設定の改ざん防止"],
["RBAC変更","ロール割り当ての追加・変更・削除に承認を要求","必須 — 権限エスカレーションの防止"],
["スクリプト","PowerShellスクリプトの展開に承認を要求","推奨 — 悪意あるスクリプト実行の防止"],
["テナント構成","テナント全体の設定変更に承認を要求","必須 — テナントレベルの破壊的変更を防止"],
["アクセスポリシー自体","MAAポリシーの変更・削除に承認を要求","必須 — MAAの無効化を防止(自己保護)"]]},
{type:"cards",title:"Intune RBAC推奨ロール設計 — 実践的な3分離モデル",icon:"👥",cards:[
{title:"ヘルプデスク — 日常サポート用",color:"",items:[
"権限範囲: デバイスの読み取り + パスコードリセット + リモートロック。デバイスのワイプ権限は付与しない",
"対象操作: ユーザーからの「パスコードを忘れた」「PCがロックされた」等の日常的な問い合わせに対応",
"ロール定義: Intune組み込みロール「Help Desk Operator」をベースにカスタマイズ",
"スコープタグ: 担当部門のデバイスのみを対象に限定。他部門のデバイスは見えない・操作できない設定",
"MAA不要: 破壊的な操作権限がないため、MAAの対象外。迅速なサポート対応が可能",
"人数: IT部門のサポート担当者全員に割り当て。最もユーザー数が多いロール"]},

{id:"autopatch",title:"Autopatch & Windows Update",week:"Week 4",time:"2h",keyMsg:"パッチ管理の自動化 — IT部門の最大の負担を W365 + Autopatch で解消",content:[
{type:"list",title:"パッチ管理の現実 — IT部門が抱える最大の負担",icon:"📖",items:[
"IT部門の工数の約30%がパッチ管理に費やされているという調査結果があります(Forrester Research)。毎月のWindows Update、セキュリティパッチの検証、配信、障害対応は、IT部門にとって最も時間と労力を消費する業務の一つです",
"パッチ管理の典型的なサイクル: ①Microsoftが毎月第2火曜日(Patch Tuesday)にパッチをリリース→②IT部門が検証環境でテスト(3-5日)→③パイロットグループに配信(3-5日)→④全社配信(数日-1週間)→⑤障害対応(随時)。この1サイクルで2-4週間を要します",
"パッチ未適用端末は攻撃者にとって格好のターゲットです。既知の脆弱性を悪用した攻撃の60%以上が「パッチが利用可能になってから30日以内」に発生しています(CISA統計)。パッチ適用の遅延は直接的なセキュリティリスクです",
"従来のWSUS(Windows Server Update Services)運用の限界: WSUSサーバーの構築・維持管理が必要、帯域制御の設定が複雑、リモートワーカーへの配信が困難(VPN経由が前提)、レポート機能が貧弱で適用状況の把握が困難",
"「パッチを当てたら業務アプリが動かなくなった」というインシデントへの恐怖から、パッチ適用を先送りにする企業が多いです。しかし先送りは脆弱性の放置と同義であり、ランサムウェア等のリスクを高めます",
"お客様への質問: 「毎月のWindows Updateにどれくらいの工数をかけていますか？パッチ適用率は何%ですか？」この質問でIT部門の痛みを引き出し、Autopatchの提案につなげます",
"IT部門の理想: 「パッチ管理に時間をかけたくない。自動的に安全に適用されてほしい。でも業務アプリへの影響は心配」→この理想をAutopatchが実現します",
"W365のアドバンテージ: Cloud PCはMicrosoft管理のインフラ上で動作するため、パッチ適用がより安全・確実です。物理PCのように「電源が入っていない」「VPNに接続されていない」という問題が発生しません"]},

{type:"list",title:"W365でのパッチ管理の優位性 — DaaSならではの強み",icon:"🖥️",items:[
"Cloud PCはMicrosoft管理のAzure基盤上で動作しているため、パッチ適用の環境が安定しています。物理PCのようにハードウェアの多様性(メーカー・モデル・ドライバー)に起因する互換性問題が大幅に少ないです",
"再起動がクラウド側で完結します。ユーザーの業務時間外(深夜等)にCloud PCを自動再起動し、翌朝ユーザーがアクセスした時にはパッチ適用済みの状態。「再起動してください」の通知が不要になります",
"物理PCでは「電源が入っていない」「ネットワークに接続されていない」という理由でパッチが適用されないケースが頻発しますが、Cloud PCは常に電源ON・常にネットワーク接続済み。パッチ適用率が飛躍的に向上します",
"W365の「リセット」機能: パッチ適用後に問題が発生した場合、Cloud PCを数分で「リセット」(初期状態に戻す)できます。物理PCのリカバリーに数時間かかるのと比べ、圧倒的に迅速です",
"W365のポイントリストア: Cloud PCの復元ポイントを自動作成し、パッチ適用前の状態にロールバック可能。バックアップ・リストアがクラウド上で完結するため、IT部門の負担がほぼゼロです",
"Windows 11への移行: W365ならCloud PCのOSバージョンをプロビジョニングポリシーで制御できます。Windows 10→11への移行もCloud PCの再プロビジョニングで対応可能。物理PCの入れ替えが不要です",
"パッチ管理のROI: 物理PC100台のパッチ管理に月20時間→W365+Autopatchで月2時間に削減した事例があります。IT担当者の時間を戦略的なIT施策に振り向けられます",

{id:"w3a",title:"W365 アーキテクチャ",week:"Week 5",time:"4h",keyMsg:"Cloud PCはMSテナント内で稼働。インフラは全てMS管理のSaaS",content:[
{type:"list",title:"W365とは — SaaS型DaaSの革新性を理解する",icon:"📖",items:[
"Windows 365(W365)は、Microsoftが2021年8月にリリースしたSaaS型のクラウドPC(Desktop as a Service)サービスです。ユーザーごとに専用のWindows PCがクラウド上に作成され、どこからでもアクセスできます",
"最大の特徴は「SaaS」であること: 従来のVDI(Citrix/VMware/AVD)はインフラの管理が必要でしたが、W365はMicrosoftがインフラ(サーバー/ネットワーク/ストレージ)を全て管理します。お客様はユーザーにライセンスを割り当てるだけです",
"お客様への説明の仕方: 「W365はクラウド上にある自分専用のWindowsパソコンです。M365のライセンスを持っている方なら、追加のW365ライセンスを割り当てるだけで数分でPCが使えるようになります。サーバーの構築も、ネットワークの設計も不要です」",
"物理PCとの違い: 物理PCはハードウェアが手元にありますが、W365のCloud PCはMicrosoftのデータセンターで稼働しています。ユーザーのデバイス(PC/タブレット/スマホ)には画面だけが転送されるため、データがデバイスに残りません",
"なぜ今W365なのか: Windows 10のサポートは2025年10月に終了しました。未移行PCのリプレース需要が高まっています。物理PCを買い替える代わりにW365に移行すれば、ハードウェア管理から解放されます。このタイミングが最大の提案チャンスです",

{id:"w3e",title:"3つのエディション",week:"Week 5",time:"3h",keyMsg:"Frontlineが提案の武器。1ライセンス3ユーザーで50%削減",content:[
{type:"list",title:"なぜエディション選定が重要か — コスト最適化の出発点",icon:"📖",items:[
"W365には3つのエディション(Business/Enterprise/Frontline)があり、お客様の規模・要件・ライセンス状況に応じて適切なエディションを選定することがSEの腕の見せ所です",
"最も多い間違い: お客様が「全員Enterprise」で見積もる→コストが高く見える→「W365は高い」と判断してしまう。実際にはSKUミックス+Frontline活用で30-50%削減可能です",
"お客様への説明の仕方: 「W365には3つのプランがあります。Businessは中小企業向けのシンプルプラン、Enterpriseは大企業向けのフル機能プラン、そしてFrontlineは交代制で働く方向けの1ライセンスを3名で共有できるお得なプランです」",
"Frontlineが「最強の武器」である理由: 工場3交代制(8時間×3シフト)なら1ライセンスで3名がカバーできるため、実質的にEnterpriseの1/3のコストになります。これは競合(WorkSpaces/Citrix)にはないW365独自の機能です",
"よくある誤解: 「FrontlineはEnterpriseより機能が劣る」→ 基本機能はほぼ同じです。主な違いは同時利用制限（1ライセンスで同時1セッション）とリサイズ未サポートです",
"提案のコツ: 最初に「お客様の中に、シフト制で働いている部門はありますか？」と聞く。工場・コールセンター・店舗・受付など、Frontline対象者がいればコスト提案のインパクトが劇的に変わります"]},

{id:"w3p",title:"料金体系 & SKUミックス",week:"Week 6",time:"3h",keyMsg:"全員同じSKUにせず用途別最適化がコスト提案の鍵",content:[
{type:"list",title:"なぜSKUミックスが重要か — コスト最適化の本質",icon:"📖",items:[
"SKUミックスとは、組織内のユーザーを業務内容に応じてグループ分けし、それぞれに最適なスペック(SKU)を割り当てる戦略です。全員に同じ高スペックを割り当てる「一律方式」は大きな無駄を生みます",
"お客様がやりがちな見積もり方法: 「安全のために全員4vCPU/16GBで見積もってください」→ 実際には一般事務の70%は2vCPU/8GBで十分→年間で数千万円のコスト差が出ます",
"お客様への説明の仕方: 「スマートフォンと同じです。全員に最新のiPhone Proを配る必要はありません。メール中心の方は標準モデルで十分で、動画編集する方だけProにすればコストを大幅に削減できます」",
"SKU選定の具体的な手順: (1)部門・職種のリストを作成→(2)各部門の主要業務アプリを確認→(3)必要なCPU/RAM/Storageを判定→(4)SKUを割当→(5)コストを試算。このプロセスを提案書に含めることで説得力が増します",
"PoC(Proof of Concept)の活用: 「まず各部門から2-3名ずつ代表者を選んで、異なるSKUを割り当てて2週間使ってもらいましょう。実際のパフォーマンスを体験してからSKUを確定すればリスクゼロです」",
"リサイズの安心感: W365はSKU変更(リサイズ)が簡単にできます。「もし足りなければすぐにアップグレードできるので、まずは低いSKUから始めましょう」と提案すると、お客様の心理的ハードルが下がります"]},

{id:"avd",title:"AVD アーキテクチャ",week:"Week 7",time:"4h",keyMsg:"セッションホストは顧客Azure内。柔軟だが管理責任も顧客側",content:[
{type:"list",title:"AVDとは — W365との違いを理解する",icon:"📖",items:[
"Azure Virtual Desktop(AVD)は、Azure上でWindows仮想デスクトップを提供するPaaS型のDaaSサービスです。W365がSaaS(全部おまかせ)であるのに対し、AVDはPaaS(インフラの柔軟性がある分、管理責任も顧客側)です",
"AVDの最大の特徴: マルチセッション方式で1台のVMに複数ユーザーが同時接続できるため、大規模環境ではW365よりもコスト効率が良くなります。また、GPU搭載VM(NVシリーズ)やAutoscaleによるコスト最適化が可能です",
"お客様への説明の仕方: 「AVDは『自分で設計できるクラウドPC』です。W365は全部おまかせで楽ですが、AVDは自由に設計できます。サーバーのスペック、ネットワーク構成、スケーリング方法を細かく指定できます。ただしその分、管理の手間も増えます」",
"W365との使い分け: 一般業務→W365(運用が楽)、マルチセッション/GPU/大規模環境→AVD(コスト最適化)、という棲み分けが基本です。多くのお客様にはW365+AVDの併用を提案します",
"責任分界の重要性: AVDの制御プレーン(ゲートウェイ/ブローカー)はMicrosoft管理ですが、データプレーン(セッションホストVM/ネットワーク/ストレージ)は顧客管理です。この責任分界をお客様に明確に説明することが重要です",
"コストモデル: AVDのコストは「Azure VM(時間課金)+ストレージ+ネットワーク」の従量課金です。Autoscaleで夜間/休日にVMを停止すればコストを大幅に削減できますが、設計・管理のスキルが必要です"]},

{type:"list",title:"AVD構築時によくあるトラブルと対処法",icon:"🔧",items:[
"セッションホストのドメイン参加失敗: DNS設定を確認(VNetのDNSがADを参照しているか)。Entra参加の場合はIntune登録設定を確認",
"FSLogixプロファイルがマウントされない: Azure Filesの共有権限(Storage File Data SMB Share Contributor)を確認。ファイアウォールでSMB(445)が許可されているか",
"Autoscaleが動かない: スケーリングプランのタイムゾーンが正しいか確認。マネージドIDにDesktop Virtualization Power On Off Contributorロールが付与されているか",
"接続時にセッションホストが見つからない: ホストプールのドレインモードが無効か確認。セッションホストの状態が「Available」か確認",
"マルチセッションでパフォーマンスが悪い: 1VMあたりのセッション数上限を確認(D4s_v5で4セッション推奨)。CPU/メモリ使用率をAzure Monitorで確認",
"RemoteAppが表示されない: アプリグループの公開アプリ一覧を確認。ユーザーがアプリグループに割り当てられているか確認",
"接続が頻繁に切れる: ネットワーク帯域を確認(最低1.5Mbps/ユーザー)。RDP Shortpath(UDP)を有効化。Keep-alive設定を確認",
"イメージ更新後にプロファイルが壊れる: FSLogixのバージョン互換性を確認。OSメジャーバージョンが変わる場合はプロファイルリセットが必要な場合あり"]

{id:"fsl",title:"FSLogix",week:"Week 7",time:"3h",keyMsg:"AVDマルチセッションではほぼ必須。W365では不要（差別化ポイント）",content:[
{type:"list",title:"FSLogixとは — なぜ必要で、なぜW365との差別化ポイントなのか",icon:"📖",items:[
"FSLogixは、Microsoftが2018年に買収したプロファイル管理ソリューションです。ユーザーのプロファイル(デスクトップ設定/ドキュメント/アプリ設定/Outlookキャッシュ)をVHD(仮想ハードディスク)ファイルに格納し、外部ストレージに保存します",
"なぜAVDマルチセッションで必要か: マルチセッションでは複数ユーザーが1台のVMを共有します。Autoscaleでは接続するVMが毎回変わる可能性があるため、ユーザーのデータ/設定を外部に保存して、どのVMに接続しても同じ環境を提供する必要があります",
"お客様への説明の仕方: 「FSLogixは、カプセルホテルのロッカーのようなものです。部屋(VM)は毎回変わりますが、自分の荷物(プロファイル)はロッカー(外部ストレージ)に預けてあるので、どの部屋に入っても自分の環境が復元されます」",
"W365との重要な差別化ポイント: W365は1ユーザー=1 Cloud PC(専用VM)なので、プロファイルはVM内に保存されます。FSLogixの設計・構築・運用が一切不要です。これはAVD対比でのW365の大きなメリット(運用コスト削減)です",
"よくあるトラブル: FSLogixの運用で最もよくある問題は「サインインが遅い(30秒以上)」と「ディスク容量の肥大化」です。ストレージのIOPS不足やVHDの自動拡張が原因になることが多く、設計段階での考慮が重要です",
"提案での活用方法: 「AVDの場合はFSLogixの設計・運用が必要ですが、W365なら不要です。FSLogix運用にかかるIT工数(月あたり10-20時間)を人件費換算すると年間¥60-120万の削減になります」"]},

{type:"list",title:"FSLogixの基本概念 — 詳細解説",icon:"📁",items:[
"FSLogixとは: ユーザープロファイル(デスクトップ・ドキュメント・アプリ設定)をVHD/VHDXファイルに格納するソリューション",
"動作原理: サインイン時にVHDをマウント→ユーザーには通常のCドライブとして見える→サインアウト時にアンマウント",
"なぜ必要か: マルチセッションではVMが共有→ユーザーごとのデータを外部に保存して分離する必要がある",
"プロファイルコンテナ: ユーザープロファイル全体をVHDに格納(推奨方式)",
"Office 365コンテナ: Outlook OST/Teams/OneDriveキャッシュのみを別VHDに格納(プロファイルと分離)",
"Cloud Cache: 複数のストレージ先にプロファイルを同時書き込み(高可用性/DR)",
"ライセンス: M365 E3/E5/F1/F3、またはRDS CALに含まれる(追加費用なし)",
"W365との違い: W365はCloud PC=専用VM→プロファイルはVM内に保存→FSLogix不要"]},
{type:"flow",title:"FSLogixストレージ選定の判断フロー",icon:"🔄",steps:[

{icon:"⚡",label:"パフォーマンス要件",desc:"高IOPS→Premium/NetApp",style:""},

{type:"list",title:"サイジングガイドライン",icon:"📏",items:[

"Azure Files Premium課金: プロビジョニングした容量に対して課金(使用量ではない)",

{type:"list",title:"トラブルシューティング — よくある問題と対処",icon:"🔧",items:[
"問題: サインインが遅い(30秒以上) → 原因: ストレージIOPS不足。対処: Azure Files Premium/NetApp Filesに変更",
"問題: プロファイルが読み込まれない → 原因: VHDのロック(前回のセッションが正常終了していない)。対処: ロックファイル削除+排他ロックの確認",
"問題: ディスク容量不足 → 原因: VHDXの自動拡張で肥大化。対処: 定期的にVHDXを圧縮するスケジュールタスクを設定",
"問題: Outlookキャッシュが大きすぎる → 対処: Office 365コンテナを分離してプロファイルとは別のストレージに保存",

"問題: 一時プロファイルでログインしてしまう → 原因: 同一ユーザーが複数セッションに接続。対処: セッション制限+VHDLocationの確認",
"監視: FSLogixのイベントログ(Applications and Services Logs > Microsoft > FSLogix)で詳細を確認",

"Q: FSLogixはAVDを使うなら絶対に必要？ → A: マルチセッション(プールドホストプール)では必須です。パーソナル(専用VM)では任意ですが、イメージ更新時のプロファイル保持のために推奨されます",

{id:"cmp",title:"W365 vs AVD 比較",week:"Week 8",time:"3h",keyMsg:"SaaSのシンプルさ vs PaaSの柔軟性 — 顧客状況で使い分け",content:[
{type:"list",title:"なぜW365 vs AVDの理解が最重要か",icon:"📖",items:[
"お客様から最も多い質問は「W365とAVDのどちらがいいですか？」です。SEとして自信を持って回答できることが、信頼獲得の第一歩です。答えは「お客様の状況次第」ですが、根拠を持って説明できることが重要です",
"結論から言うと: 「運用のシンプルさを重視するならW365、コスト最適化と柔軟性を重視するならAVD、そして多くのお客様には両方の併用が最適解です」と説明します",
"お客様への説明の仕方: 「W365は自家用車(月額固定で楽)、AVDはカーシェア(使った分だけ課金で効率的)のようなものです。通勤用には自家用車(W365)が便利ですが、月に数回しか使わないならカーシェア(AVD)の方がお得です」",
"よくある誤解: 「W365とAVDは競合製品」→ 実際にはMicrosoft自身が併用を推奨しています。同じ管理画面(Intune管理センター)で両方を管理でき、同じ認証基盤(Entra ID)を使用します",
"提案での差別化: 競合(Citrix/VMware/AWS)はこのような「SaaS+PaaS併用」の柔軟性を提供できません。W365+AVDの最適な組み合わせを設計できることがMicrosoft SEの強みです",
"このトピックの位置づけ: Month 1-2で学んだ全ての知識(ゼロトラスト/Entra ID/CA/Intune/W365/AVD)を統合して、お客様に最適な提案ができるようになることがゴールです"]},

{id:"w3sec",title:"W365 セキュリティ設計",week:"Week 7",time:"3h",keyMsg:"セキュリティベースライン・Customer Lockbox・VBS — W365は「デフォルトで安全」な設計",content:[
{type:"list",title:"W365のセキュリティが物理PCより優れる理由",icon:"🛡️",items:[
"データがクラウドに留まるため、端末の紛失・盗難時にも情報漏洩リスクがゼロです。物理PCではディスク暗号化(BitLocker)をしていても端末ごとデータが持ち出されるリスクがありましたが、W365ではデータがMicrosoftデータセンター内に保存されるため、端末を紛失してもデータは一切漏れません",
"Microsoft管理基盤上で稼働しているため、OSセキュリティパッチが常に最新の状態に維持されます。物理PCでは「パッチを当てたら業務アプリが動かなくなった」というトラブルがありますが、W365ではMicrosoftが互換性テスト済みのパッチを自動適用するため、パッチ運用の負荷が大幅に軽減されます",
"セキュリティベースラインがプリセットされており、プロビジョニング時点でMicrosoftが推奨するセキュリティ設定が自動的に適用されます。物理PCでは数十項目のセキュリティ設定を手動で構成する必要がありましたが、W365では「箱から出した状態で安全」が実現されています",
"VBS(仮想化ベースセキュリティ)が標準で有効化されており、ハードウェアレベルの隔離によりカーネル保護が実現されています。物理PCではVBSの有効化に互換性確認や手動設定が必要ですが、W365では最初から有効なため追加作業は不要です",
"Customer Lockboxにより「Microsoftサポートですらお客様のデータを見ることができない」仕組みが提供されています。サポート対応時にMicrosoftエンジニアがテナントデータにアクセスする必要がある場合、お客様の事前承認が必須となり、全てのアクセスがログに記録されます"]},
{type:"diagram",title:"W365セキュリティの多層構造(6つの柱)",icon:"🏛️",pillars:[
{label:"ID保護",color:"#0078D4",desc:"Entra ID+CA"},
{label:"デバイス保護",color:"#5C2D91",desc:"Intune+Defender"},

{label:"アプリ保護",color:"#FFB900",desc:"MAM制御"},
{label:"基盤保護",color:"#D83B01",desc:"Microsoft管理"}]},
{type:"cards",title:"セキュリティベースラインの主要設定",icon:"⚙️",cards:[
{title:"Windows Security Baseline",color:"green",items:[
"BitLocker暗号化の強制有効化 — OS/データドライブの自動暗号化により、万一VMディスクが流出しても解読不可能にします",
"Windows Firewallの3プロファイル(ドメイン/プライベート/パブリック)全てを有効化し、不要なインバウンド通信をブロックします",
"UAC(ユーザーアカウント制御)をデスクトップ暗転レベルで強制し、不正なアプリのインストールや設定変更を防止します",
"PowerShellスクリプト実行ポリシーをAllSignedに設定し、署名されていないスクリプトの実行を禁止します",
"SMBv1プロトコルの無効化 — WannaCryなどのランサムウェアが悪用するレガシープロトコルを根本的にブロックします",
"ゲストアカウントの無効化と不要なローカルアカウントの削除により、攻撃者が利用できるアカウントを最小化します"]},
{title:"Defender Baseline",color:"red",items:[
"リアルタイム保護の常時有効化 — ファイルのダウンロード・実行時に即座にスキャンし、マルウェアを検知・ブロックします",
"クラウド保護レベルを「高+」に設定し、未知の脅威に対してもクラウドAI分析による検知精度を最大化します",
"ASR(Attack Surface Reduction)ルールの有効化 — Office製品からのプロセス生成、WMI呼び出し、スクリプト難読化などをブロックします",
"ネットワーク保護の有効化により、フィッシングサイトやC2サーバーへの通信をネットワークレベルでブロックします",
"PUA(潜在的に不要なアプリケーション)の自動ブロック — アドウェアやバンドルソフトのインストールを防止します",
"改ざん防止(Tamper Protection)の強制有効化 — 攻撃者やマルウェアによるDefender設定の変更を防止します"]},
{title:"Edge Baseline",color:"",items:[
"SmartScreenフィルターの強制有効化 — フィッシングサイトやマルウェア配布サイトへのアクセスを自動ブロックします",
"パスワードマネージャーの有効化と、パスワード生成機能の推奨設定により、弱いパスワードの使用を防止します",
"トラッキング防止レベルを「厳重」に設定し、Webサイトによるユーザー追跡を最小化します",
"安全でないHTTPサイトへの警告表示を強制し、HTTPS接続を優先するよう設定します",
"拡張機能のインストール制御 — 許可リスト外の拡張機能のインストールをブロックし、悪意のある拡張機能を防止します",
"InPrivateモードの制御とブラウザ履歴の保持設定により、業務利用時の監査証跡を確保します"]}]},

{type:"list",title:"Customer Lockboxとは",icon:"🔐",items:[
"Customer LockboxはMicrosoftサポートエンジニアがテナントデータにアクセスする際に、お客様(テナント管理者)の事前承認を必須化する機能です。承認なしではMicrosoftの社員であってもデータにアクセスすることができません",
"アクセスが発生した場合、全てのアクセスログが完全に記録され、監査レポートとして確認できます。「いつ・誰が・どのデータに・どれくらいの時間アクセスしたか」が全て追跡可能です",
"金融業界(金融庁ガイドライン対応)や医療業界(医療情報の安全管理ガイドライン対応)で特に重要な機能です。「クラウド事業者にデータを見られるのではないか」というお客様の懸念に対する明確な回答になります",
"M365 E5ライセンスに含まれるか、E3にアドオン(Customer Lockbox for Microsoft Azure)として追加可能です。Azure環境のCustomer Lockboxは無料で有効化できます",
"承認フロー: MSサポートがアクセス要求→テナント管理者にメール通知→管理者が承認/拒否→承認時のみ時間制限付きでアクセス可能→自動期限切れ。最大承認時間は12時間です"]},
{type:"list",title:"VBS(仮想化ベースセキュリティ)とは",icon:"🔒",items:[
"VBS(Virtualization-Based Security)はハードウェアの仮想化機能を利用して、通常のOSカーネルとは隔離されたセキュアな領域を作成するセキュリティ技術です。攻撃者がカーネルレベルの権限を取得しても、VBS領域内のデータには到達できません",
"Credential Guard: ユーザーの認証情報(NTLMハッシュ、Kerberos TGT)をVBS領域内に格納し、Pass-the-HashやPass-the-Ticket攻撃を根本的に防止します。Active Directory環境での横方向移動(ラテラルムーブメント)の防止に極めて有効です",
"HVCI(Hypervisor-protected Code Integrity): カーネルモードで実行されるコードの整合性をハイパーバイザーレベルで検証します。署名されていないドライバーやカーネルコードの実行を防止し、ルートキット攻撃を阻止します",
"W365ではVBSが標準で有効化されているため、追加の設定作業は一切不要です。物理PCではVBSの有効化にBIOS/UEFI設定の変更、互換性テスト、場合によってはパフォーマンスへの影響評価が必要ですが、W365ではこれらの心配がありません",
"お客様への説明: 「VBSは金庫の中に更に金庫を作るようなものです。外の金庫(OS)が破られても、中の金庫(VBS領域)は別の鍵で守られています。W365ではこの二重金庫が最初から設定済みです」"]},
{type:"table",title:"セキュリティ関連のお客様FAQ",icon:"❓",headers:["質問","回答"],rows:[
["W365のデータは日本に保存されますか？","はい。日本リージョン(東日本/西日本)を選択でき、データはMicrosoftの日本データセンター内に保存されます。データ所在地要件を満たせます"],
["Microsoftにデータを見られませんか？","Customer Lockboxを有効化すれば、Microsoftサポートであっても管理者の事前承認なしにはデータにアクセスできません。M365 E5で利用可能です"],
["W365がランサムウェアに感染したらどうなりますか？","Cloud PCをポイントインタイムで復元(最大10個のスナップショット)できます。また、Defender for Endpointが自動検知・隔離するため、感染拡大を防止します"],
["BYODからW365にアクセスする場合のセキュリティは？","条件付きアクセスでBYODからのアクセス条件を制御できます(例: MFA必須、コピー&ペースト禁止、画面キャプチャ禁止)。データは端末に残りません"],
["ISMSやPマーク対応に使えますか？","はい。Microsoftは ISO27001、ISO27017、ISO27018、SOC1/2/3 等の認証を取得しており、お客様のISMS審査やPマーク更新に必要な証跡を提供できます"],
["セキュリティベースラインをカスタマイズできますか？","はい。Intuneからセキュリティベースラインの各設定項目を個別にカスタマイズできます。業務アプリとの互換性のため特定の設定を緩和することも可能です"]]},
{type:"list",title:"提案時のポイント",icon:"💡",items:[
"「W365はデフォルトで安全です。物理PCのように1台ずつセキュリティ設定をする必要がありません。プロビジョニングした瞬間から、セキュリティベースラインが適用され、Defenderが有効化され、VBSが稼働します」とお客様に伝えましょう",
"セキュリティチームへの訴求: 「W365は設定漏れのリスクがゼロ。手動設定に依存する物理PCと違い、全Cloud PCが同一のセキュリティ水準を保証します」",
"経営層への訴求: 「端末紛失によるインシデント対応コスト(調査・報告・賠償)は1件あたり平均500万円。W365ならデータが端末にないため、紛失=セキュリティインシデントになりません」",
"競合比較: AWS WorkSpacesやCitrix DaaS(Azure上)ではセキュリティベースラインのプリセットは提供されておらず、Customer Lockboxに相当する機能もありません。これはMicrosoft独自の強みです"]
}],

{id:"avdnet",title:"AVD ネットワーク設計",week:"Week 7-8",time:"4h",keyMsg:"VNet/NSG/RDP Shortpath/Private Link — AVD提案で最も技術的に深い領域",content:[
{type:"list",title:"なぜAVDネットワーク設計が重要か",icon:"📖",items:[
"AVDはPaaSサービスですが、セッションホストVMのネットワークはお客様の責任範囲です。W365(MHN)と異なり、VNet/サブネット/NSG/ルートテーブルなどのネットワーク設計を顧客自身が行う必要があります",
"ネットワーク設計のミスは、パフォーマンス問題(遅延・画面カクつき)やセキュリティ問題(意図しない通信の許可)に直結します。後から設計を変更するのは困難なため、初期設計が極めて重要です",
"W365(MHN: Microsoft Hosted Network)との最大の違いがまさにこのネットワーク設計です。W365ではMicrosoftがネットワークを完全に管理しますが、AVDではお客様がAzure VNet上にセッションホストを配置し、NW全体を設計・管理します",
"お客様のインフラチーム(特にネットワークエンジニア)との連携が必須になります。SEとしてAVDのネットワーク要件を正確に伝え、既存ネットワークとの統合設計を支援することが求められます"]},
{type:"flow",title:"AVD接続の詳細フロー",icon:"🔄",steps:[

{type:"cards",title:"ネットワーク構成要素",icon:"🌐",cards:[
{title:"VNet / サブネット",color:"",items:[
"VNet(Virtual Network)はAzure上のプライベートネットワーク空間で、セッションホストVMを配置する基盤です。IPアドレス空間(CIDR)を計画的に設計する必要があります",
"サブネット設計: セッションホスト用、管理用、FSLogix用(ANF利用時)、その他サービス用など、用途別にサブネットを分割します",
"IPアドレス設計: セッションホスト1台につき1個のプライベートIPが必要です。将来の拡張を見越して/24(254台)以上のサブネットを推奨します",
"リージョン選択: ユーザーに最も近いリージョン(日本のお客様は東日本リージョン)にVNetを配置し、遅延を最小化します"]},
{title:"NSG(ネットワークセキュリティグループ)",color:"red",items:[
"NSGはAzureのファイアウォール機能で、サブネットまたはNICレベルで受信/送信トラフィックをルールベースで制御します",
"必須のアウトバウンド通信: AVDサービスへの通信(443/TCP)、Azure DNS(53/UDP,TCP)、KMS認証(1688/TCP)、Azure Monitor(443/TCP)を許可する必要があります",
"推奨: サブネットレベルでNSGを適用し、デフォルトの拒否ルールをベースに必要な通信のみを許可するホワイトリスト方式を採用します",
"ログ: NSGフローログを有効化し、通信パターンの可視化とセキュリティ監査に活用します"]},
{title:"Azure Firewall",color:"yellow",items:[
"Azure Firewallは高度なフィルタリング機能を提供するマネージドファイアウォールサービスです。NSGよりも細かい制御(FQDN/URLフィルタリング、脅威インテリジェンス)が可能です",
"AVDのアウトバウンド通信をFQDNベースで制御できるため、セキュリティ要件が厳しい金融・医療業界で特に有用です",
"コスト: Azure Firewall Premium(推奨)は月額約10万円+通信量課金です。コストに敏感なお客様にはNSGのみの構成も選択肢です",
"TLS検査: Premium SKUではTLS通信の中身を検査でき、暗号化された通信内のマルウェアも検知可能です"]},
{title:"RDP Shortpath",color:"green",items:[
"RDP Shortpathは、AVD接続の通信経路を最適化し、UDP直接接続により低遅延・高品質な画面転送を実現する機能です",
"通常の接続経路: ユーザー→AVDゲートウェイ(TCP)→セッションホスト。Shortpath: ユーザー→セッションホスト(UDP直接)で、ゲートウェイを経由しないため遅延が大幅に低減します",
"マネージドネットワークでのShortpath: 社内ネットワークやVPN経由で直接セッションホストに接続する場合に特に効果的です",
"パブリックネットワークでのShortpath: STUN/TURNプロトコルを使用してNAT越えを行い、自宅やカフェからでもUDP直接接続を試行します"]}]},

{type:"cards",title:"オンプレ接続パターン",icon:"🏢",cards:[
{title:"ExpressRoute(専用線)",color:"green",items:[
"Microsoftデータセンターとお客様拠点を専用線で接続するプライベート接続です。インターネットを経由しないため、高い信頼性と安定した帯域が保証されます",
"帯域: 50 Mbps〜100 Gbps。コスト: 月額約10万円〜(回線速度による)。初期構築に2-3ヶ月必要です",
"推奨シナリオ: 大規模環境(500名以上)、基幹システムへの常時接続が必要な金融・製造業、SLA要件が厳しい業務"]},
{title:"S2S VPN(サイト間VPN)",color:"",items:[
"お客様拠点のVPN装置とAzure VPN Gatewayをインターネット越しにIPSec VPNで接続します。ExpressRouteより安価で導入も容易です",
"帯域: VPN Gateway SKUにより最大10 Gbps。コスト: VPN Gateway月額約1.5万円〜+通信量。構築は数日で可能です",
"推奨シナリオ: 中規模環境(100-500名)、コスト重視、ExpressRouteの初期構築期間を待てない場合のつなぎ構成としても有効"]},
{title:"P2S VPN(ポイント対サイトVPN)",color:"yellow",items:[
"個々のクライアントデバイスからAzure VPN Gatewayに直接VPN接続する方式です。拠点のVPN装置が不要なため、小規模環境やBYODシナリオに適しています",
"帯域: クライアントあたり最大数百Mbps。コスト: VPN Gateway共用(S2Sと併用可能)。設定はユーザー単位で行います",
"推奨シナリオ: 小規模環境(50名以下)、管理者のみがAzure管理のためにVPN接続する場合、BYODからのオンプレアクセスが必要な場合"]}]},
{type:"list",title:"Private Linkの活用",icon:"🔐",items:[
"Private Linkを使用すると、セッションホストへの接続をMicrosoftバックボーンネットワーク経由のプライベート通信に限定できます。インターネットを経由しないため、通信の盗聴やDDoS攻撃のリスクを排除できます",
"AVD Private Linkは、AVD制御プレーン(ゲートウェイ・ブローカー)へのアクセスもプライベートエンドポイント経由にすることで、全通信経路をプライベート化します",
"金融業界(金融庁「金融機関のIT外部委託に関する有識者検討会」対応)や医療業界(3省2ガイドライン対応)で特に要求されることが多い構成です。「インターネットを一切経由しない」という要件に対応できます",
"構成: AVD用プライベートエンドポイント + Azure Files用プライベートエンドポイント + DNS設定(プライベートDNSゾーン)が必要です。設計の複雑度は上がりますが、最高レベルのセキュリティを実現します",
"コスト: プライベートエンドポイント1個あたり月額約1,000円+データ処理料金。セキュリティ要件との費用対効果で判断します"]},
{type:"table",title:"ネットワーク設計チェックリスト",icon:"✅",headers:["確認項目","内容","完了"],rows:[
["VNet/サブネット設計","CIDR範囲の決定、サブネット分割(セッションホスト用/管理用/ANF用)、将来の拡張余地の確保","□"],
["IPアドレス計画","最大セッションホスト台数×1 IP + 管理用IPの確保。オンプレとの重複がないことを確認","□"],
["NSGルール設計","必須アウトバウンド通信の許可(AVDサービスタグ/KMS/DNS)、不要通信のブロック","□"],
["DNS設計","Azure DNSまたはカスタムDNSの選択。オンプレADを使用する場合はDNSフォワーダーの設定","□"],
["オンプレ接続方式","ExpressRoute/S2S VPN/P2S VPNの選択。帯域要件とコストのバランス","□"],
["RDP Shortpath","UDP通信の許可設定。ファイアウォールでのSTUN/TURN通信の許可","□"],
["Azure Firewall要否","セキュリティ要件に応じてAzure Firewallの要否を判断。FQDNフィルタリングの必要性","□"],
["Private Link要否","金融・医療等の厳格なセキュリティ要件がある場合にPrivate Linkの導入を検討","□"],
["帯域見積もり","ユーザー数×利用シナリオ別帯域から必要な総帯域を算出。ピーク時の余裕を確保","□"],
["監視設計","NSGフローログ、Azure Monitor、Network Watcherの設定。通信異常の検知体制","□"]]},
{type:"list",title:"W365(MHN)との比較 — 提案での使い分け",icon:"🔗",items:[
"MHN(Microsoft Hosted Network)を選択すれば、上記のネットワーク設計が全て不要になります。VNet/NSG/ルートテーブル/DNS/ファイアウォールの設計・構築・運用をMicrosoftが全て管理します",
"ネットワークチームがいないお客様(IT部門3名以下の中小企業など)には、W365(MHN)を強く推奨します。ネットワーク設計の専門知識がなくてもセキュアなDaaS環境を即座に展開できます",
"厳格なネットワーク分離要件(金融規制・医療規制・防衛関連)がある場合はAVDを推奨します。独自のVNet内にセッションホストを配置し、NSG/Azure Firewall/Private Linkで通信を完全に制御できます",
"提案トーク: 「ネットワーク設計の自由度が必要ならAVD、ネットワーク設計を丸ごとお任せしたいならW365(MHN)です。御社のIT部門の体制とセキュリティ要件に応じて最適な方を選びましょう」",
"ハイブリッド構成: 一般ユーザーはW365(MHN)でネットワーク設計不要、オンプレ接続が必要な業務はAVD(VNet+ExpressRoute)という併用パターンも有効です"]
}],
links:[{title:"MS Learn: AVDネットワーク",url:"https://learn.microsoft.com/ja-jp/azure/virtual-desktop/network-connectivity"},{title:"MS Learn: RDP Shortpath",url:"https://learn.microsoft.com/ja-jp/azure/virtual-desktop/rdp-shortpath"}]},

// Topic 23: AVD Autoscale & コスト最適化
// ═══════════════════════════════════════════════════════
{id:"avdcost",title:"AVD Autoscale & コスト最適化",week:"Week 8",time:"3h",keyMsg:"Autoscale + RI + ハイブリッド特典 — AVDの真価はコスト最適化にある",content:[
{type:"list",title:"AVDコスト最適化がなぜ重要か",icon:"📖",items:[
"AVDは従量課金モデルのPaaSサービスであり、最適化を行わないとW365の固定月額よりも高コストになるケースが頻繁に発生します。「AVDは安い」という思い込みは危険で、適切な最適化があってこそコストメリットが出ます",
"逆に、Autoscale+RI+ハイブリッド特典を組み合わせた最適化を行えば、W365の半額以下のコストでDaaS環境を運用することも可能です。お客様への提案で「どこまで最適化できるか」を具体的に示すことが重要です",
"お客様への提案では必ずコスト根拠(Excel試算表やAzure料金計算ツールの結果)を提示する必要があります。「AVDの方が安くなります」だけでは説得力がなく、具体的な数字で示すことがSEとしての信頼獲得につながります",
"W365との比較において: W365は固定月額で予測しやすい反面、使っていない夜間・休日もコストが発生します。AVDはAutoscaleで夜間停止すれば稼働時間分のみの課金となり、大きなコスト差が生まれます"]},
{type:"flow",title:"Autoscaleの動作フロー",icon:"🔄",steps:[
{icon:"🌅",label:"業務開始(8:00)",desc:"VMを自動起動",style:"blue"},
{icon:"📊",label:"セッション監視",desc:"接続ユーザー数を監視",style:""},
{icon:"📈",label:"負荷増加",desc:"しきい値超過でVM追加起動",style:""},
{icon:"🌇",label:"業務終了(18:00)",desc:"セッション排出開始",style:""},
{icon:"⏬",label:"VM停止",desc:"空きVMを自動停止(割当解除)",style:""},
{icon:"🌙",label:"夜間最小構成",desc:"最小台数のみ稼働",style:"green"}]},
{type:"cards",title:"3つのコスト最適化手法",icon:"💰",cards:[
{title:"Autoscale(自動スケーリング)",color:"green",items:[
"使わない時間帯のVM(セッションホスト)を自動的に停止(割当解除)し、VM課金を止めます。平日10時間稼働なら約58%のVM費用削減が可能です",
"スケーリングプランで「ピーク時間帯」「ランプアップ」「ランプダウン」「オフピーク」の4フェーズを定義し、各フェーズのVM稼働台数を制御します",
"セッション排出(ドレインモード): VM停止前にユーザーに通知し、新規セッションの割当を停止。既存セッションの終了を待ってから安全にVMを停止します",
"注意点: Autoscale停止中もOSディスク(Managed Disk)の課金は継続します。ストレージコストは常に発生する点をお客様に説明する必要があります"]},
{title:"RI(Reserved Instance/予約インスタンス)",color:"",items:[
"1年予約で約40%、3年予約で約60%のVM費用割引が適用されます。常時稼働する「ベースラインVM」に適用することで大幅なコスト削減が可能です",
"適用対象: Autoscaleで「最小台数」として常時稼働するVMにRIを適用するのが最も効率的です。例: 最小5台を3年RIで購入→60%割引",
"柔軟性: RIはVM SKU(サイズ)やリージョンの変更に対応するInstance Size Flexibilityが利用可能です。D4s v5で購入したRIをD8s v5(半数)に適用することもできます",
"注意点: RIは途中解約時にキャンセル料(約12%)が発生します。ユーザー数の増減が予測しにくいお客様には1年RIから開始することを推奨します"]},
{title:"ハイブリッド特典(AHUB)",color:"purple",items:[
"既存のWindows Server SAライセンスまたはWindows Server サブスクリプションを持つお客様は、Azure Hybrid Benefit(AHUB)でWindows OSライセンス費用が不要になり、約49%の割引効果があります",
"適用方法: VM作成時またはAzure Portal/CLIでAHUBを有効化するだけです。既にSAを保有している場合、追加コストなしで即座にコスト削減が実現します",
"対象ライセンス: Windows Server Standard(8コア分で1VM)またはDatacenter(無制限VM)のSAが必要です。EA/CSP契約のお客様は大半が対象となります",
"M365ライセンスとの併用: AVDセッションホストのWindows 10/11マルチセッション利用にはM365ライセンス(E3/E5/F3等)が必要ですが、これはW365でも同様のため差にはなりません"]}]},
{type:"table",title:"コスト最適化のインパクト",icon:"📊",headers:["最適化手法","割引率","適用条件","年間削減額(50VM想定)"],rows:[
["Autoscale(平日10h稼働)","約58%","スケーリングプラン設定","約¥21,000,000(D4s v5×50台の場合)"],
["1年RI","約40%","1年間のコミットメント","約¥14,400,000(常時稼働VMに適用)"],
["3年RI","約60%","3年間のコミットメント","約¥21,600,000(常時稼働VMに適用)"],
["ハイブリッド特典(AHUB)","約49%","既存Windows Server SA","約¥17,640,000(OS費用の削減)"],
["全組合せ(Autoscale+3年RI+AHUB)","最大80%以上","全条件を満たす場合","約¥30,000,000以上の削減が可能"]]},
{type:"table",title:"Autoscaleスケーリングプラン設定例",icon:"⏰",headers:["時間帯","最小VM","最大VM","しきい値","アクション"],rows:[
["深夜(0:00-7:00)","1台","2台","90%","ほぼ全VM停止。緊急メンテナンス用に1台のみ維持"],
["朝ランプアップ(7:00-9:00)","10台","30台","60%","業務開始に備えてVMを段階的に起動。しきい値を低めに設定"],
["日中ピーク(9:00-18:00)","20台","50台","75%","全ユーザーの同時利用を想定。しきい値超過時に追加VMを起動"],
["夕方ランプダウン(18:00-22:00)","5台","20台","80%","セッション排出を開始。新規セッションは少数VMに集約"],
["夜間(22:00-0:00)","2台","5台","90%","残業ユーザーのみ。ほとんどのVMを停止して夜間構成へ移行"]]},
{type:"flow",title:"RI購入判断フロー",icon:"💰",steps:[
{icon:"📊",label:"常時稼働VM特定",desc:"Autoscale最小台数を確認",style:"blue"},
{icon:"🧮",label:"月間コスト計算",desc:"従量課金での月額を算出",style:""},
{icon:"📋",label:"1年RI価格比較",desc:"40%割引後の月額を算出",style:""},
{icon:"📈",label:"ROI計算",desc:"損益分岐点を確認(約7ヶ月)",style:""},
{icon:"🔍",label:"3年RI検討",desc:"60%割引・3年利用確実か判断",style:""},
{icon:"✅",label:"購入判断",desc:"CFOの承認を得て購入実行",style:"green"}]},
{type:"list",title:"コスト見積もりの実践",icon:"🧮",items:[
"Azure料金計算ツール(azure.microsoft.com/pricing/calculator)を使って、お客様向けの見積もりを作成します。VM(コンピューティング)+ストレージ+ネットワーク+FSLogix(Azure Files/ANF)の4要素を積算する必要があります",
"VM費用: SKU選定(D4s v5推奨)×台数×稼働時間。Autoscale前提の場合は「ピーク時台数×ピーク時間+最小台数×それ以外の時間」で計算します",
"ストレージ費用: OS Managed Disk(128GB Premium SSD推奨: ¥2,500/月/台)は常に課金されます。VM停止中も課金が継続する点を見落とさないようにします",
"見落としやすいコスト: Egress通信料(Azure→インターネット: ¥13.44/GB)、ANF容量超過時の自動拡張課金、Azure Monitor/Log Analyticsのデータ取り込み料金。これらを含めないと実際のコストが見積もりを超過します",
"お客様への提示方法: 「最小構成(Autoscale+1年RI)」「推奨構成(Autoscale+3年RI+AHUB)」「最大構成(常時稼働・最適化なし)」の3パターンを提示し、お客様に選択いただくのが効果的です"]},
{type:"table",title:"W365 vs AVD コストシナリオ比較",icon:"💰",headers:["シナリオ","W365月額","AVD月額(最適化済)","安い方"],rows:[
["常時稼働100名(一般事務)","¥768,300(4vCPU/16GB)","¥620,000(D4s v5×10台+RI)","AVD(約20%安)"],
["平日10h稼働200名(オフィスワーカー)","¥1,536,600(4vCPU/16GB)","¥780,000(Autoscale+RI)","AVD(約50%安)"],
["3交代制300名(Frontline比較)","¥768,300(FL: 100ライセンス)","¥900,000(Autoscale・24h)","W365 FL(約15%安)"],
["マルチセッション500名(大規模)","¥3,841,500(4vCPU/16GB)","¥1,500,000(マルチ+Autoscale+RI)","AVD(約60%安)"]
]},
{type:"list",title:"お客様への提案ポイント",icon:"💡",items:[
"「AVDは最適化次第でW365の半額以下になります。ただし、Autoscaleの設計やRI購入判断など、運用に一定のスキルが必要です。御社のIT部門の体制を踏まえて、どちらが最適か一緒に検討しましょう」と伝えます",
"コスト比較表は必ず「運用人件費」を含めて提示します。AVDの方がVM費用は安くても、運用人件費(Azureインフラ管理者の人件費)を含めるとW365の方が安い場合があります。特にIT部門が少人数のお客様では運用コストが逆転要因になります",
"RIの購入タイミング: 本番稼働後1-2ヶ月の実績を見てからRI購入を推奨します。最初から3年RIを購入すると、利用パターンの変化(ユーザー数増減、SKU変更)に対応できなくなるリスクがあります",
"Autoscaleの設計支援: 「まずは控えめな設定(最小台数多め)で開始し、1ヶ月の利用実績を見て最適化する」ステップを提案します。最初からアグレッシブな設定にすると、朝のログインラッシュ時にVM起動が間に合わない問題が発生します",
"ハイブリッド提案: 「一般業務はW365(運用楽+固定月額)、開発者/パワーユーザーはAVD(Autoscale+RI+マルチセッション)」の併用が多くのお客様にとって最適解です。それぞれのメリットを活かした設計を提案しましょう"]
}],
links:[{title:"Azure料金計算ツール",url:"https://azure.microsoft.com/ja-jp/pricing/calculator/"},{title:"MS Learn: AVD Autoscale",url:"https://learn.microsoft.com/ja-jp/azure/virtual-desktop/autoscale-scaling-plan"}]},

// ═══════════════════════════════════════════════════════
// Topic 24: W365 Boot / Switch / Link
// ═══════════════════════════════════════════════════════
{id:"w3new",title:"W365 Boot / Switch / Link",week:"Week 8",time:"2h",keyMsg:"物理端末とCloud PCの境界をなくす最新機能 — シンクライアント戦略の新しい形",content:[
{type:"list",title:"最新機能が変えるDaaSの体験",icon:"📖",items:[
"従来のDaaS(デスクトップ仮想化)は「リモートデスクトップ接続ソフトを起動して、接続先を選んで、IDとパスワードを入力して...」という手順が必要でした。ユーザーにとっては「わざわざ仮想環境に接続する」という意識的なステップが存在していました",
"W365 Boot / Switch / Linkはこの体験を根本的に変える最新機能です。「PCを開けばそこにCloud PC」「タスクバーで瞬時に切替」「専用デバイスで最初からCloud PC」という、物理PCとCloud PCの境界をなくす新しいDaaS体験を提供します",
"これらの機能は2023年後半から段階的にGA(一般提供)されており、W365 Enterprise/Businessの追加コストなしで利用可能です。既存のW365ライセンスをお持ちのお客様に「追加費用なしでDaaS体験を大幅に改善できます」と提案できる強力な武器です",
"シンクライアント戦略の転換点: 従来のシンクライアント(IGEL、HP t640等)は専用OSとハードウェアが必要でしたが、W365 Bootにより既存の汎用PCをシンクライアントとして活用できるようになりました。これにより「PCリプレース不要でシンクライアント化」が実現します"]},
{type:"flow",title:"W365 Bootの動作",icon:"⚡",steps:[
{icon:"🔌",label:"PC電源ON",desc:"物理PCの電源を投入",style:""},
{icon:"💻",label:"Windows起動",desc:"ローカルOSが起動",style:""},
{icon:"⏭️",label:"ローカルOSスキップ",desc:"自動的にCloud PC接続開始",style:"blue"},
{icon:"☁️",label:"Cloud PC表示",desc:"直接Cloud PCデスクトップ表示",style:"green"},
{icon:"👤",label:"業務開始",desc:"物理PCがシンクライアントとして機能",style:"green"}]},
{type:"cards",title:"3つの最新機能",icon:"🚀",cards:[
{title:"W365 Boot",color:"green",items:[
"PCの電源をONにすると、ローカルのWindowsデスクトップを経由せずに直接Cloud PCのデスクトップが表示される機能です。ユーザーはCloud PCを「自分のPC」として違和感なく利用できます",
"物理PCがシンクライアントとして機能するため、高スペックなPCが不要になります。5年前の古いPCでもCloud PC側のスペック(CPU/RAM)で業務を行えます",
"Intune管理センターからW365 Bootの有効化をポリシー配布するだけで設定完了。ユーザー側での操作は不要です",
"要件: Windows 11 Pro/Enterprise + Intune管理 + W365 Enterprise/Businessライセンス。Windows 10は非対応のため注意が必要です",
"ローカルPCへの切替もサポート: Ctrl+Alt+Delまたはサインアウトでローカルデスクトップに戻れるため、緊急時のローカル作業も可能です"]},
{title:"W365 Switch",color:"",items:[
"Windows 11のタスクバーからローカルPCとCloud PCを瞬時に切り替える機能です。仮想デスクトップの切替(Win+Ctrl+矢印)と同じ感覚で、ローカル↔Cloud PCをシームレスに行き来できます",
"ユースケース: ローカルPCで重い動画編集をしながら、Cloud PCで社内メール・Teamsを利用するなど、用途に応じてローカルとクラウドを使い分ける働き方が可能です",
"接続の速さ: タスクバーのCloud PCアイコンをクリックするだけで数秒でCloud PCに切り替わります。従来のリモートデスクトップ接続のような待ち時間がありません",

// Topic 16: SASE & Global Secure Access
// ═══════════════════════════════════════════════════════
{id:"sase",title:"SASE & Global Secure Access",week:"Week 9",time:"5h",keyMsg:"VPNをなくせるか？ — SASEの知識が提案の説得力を決める",content:[
{type:"list",title:"SASEとは — VPN時代からの転換を理解する",icon:"📖",items:[
"SASE(Secure Access Service Edge、読み方: サシー)は、2019年にGartnerが提唱した概念で、ネットワーク(SD-WAN)とセキュリティ(SWG/CASB/ZTNA/FWaaS)をクラウドで統合したアーキテクチャです",
"なぜ今SASEが注目されるか: リモートワークとクラウド利用の普及により、従来の「本社データセンターを中心とした境界型ネットワーク」では対応できなくなりました。VPN経由で全トラフィックを本社に集約すると帯域がボトルネックになります",
"お客様への説明の仕方: 「従来のVPNは高速道路の料金所のようなもの。全ての車(通信)が1箇所の料金所(VPN装置)を通るので渋滞します。SASEは各インターチェンジにETCゲートを設置するようなもの。どこからでもスムーズに安全に通れます」",
"W365/AVD提案との関係: Cloud PCを導入しても、オンプレミスのファイルサーバーや基幹システムにアクセスする必要がある場合、VPNが必要になります。SASEがあればVPNなしでオンプレアクセスが可能になり、Cloud PC+SASEで真のVPN撤廃が実現します",
"Microsoftの戦略: MicrosoftはGlobal Secure Access(GSA)というSSE(Security Service Edge)ソリューションを提供しています。Entra IDとネイティブ統合しているため、条件付きアクセスのポリシーでネットワークセキュリティも制御できます",
"VPN更新タイミングが最大のチャンス: 多くのお客様がVPN装置の保守期限切れを3-5年周期で迎えます。このタイミングで「VPN装置を更新する代わりにGSA+W365に移行しませんか」と提案するのが最も効果的です"]},
{type:"flow",title:"VPN時代からSASE時代への転換",icon:"📈",steps:[
{icon:"🏢",label:"VPN時代",desc:"全通信が本社経由",style:""},
{icon:"🔗",label:"ハイブリッド期",desc:"VPN+クラウド直結混在",style:"blue"},
{icon:"🌐",label:"SASE時代",desc:"どこからでも安全にアクセス",style:"green"}]},
{type:"cards",title:"SASE(サシー)の全体像",icon:"🌐",cards:[
{title:"SASEとは",color:"purple",items:[

{type:"list",title:"お客様の反論への対応 — VPN撤廃の不安を解消",icon:"💬",items:[
"「VPNをなくして本当に安全なのか」→ 回答: VPN装置自体が攻撃対象になっている現実があります。FortiGate/Pulse Secureの脆弱性を突いた攻撃で多数の企業が被害を受けています。SASEはクラウドベースなので装置の脆弱性リスクがありません",
"「既存のVPN投資が無駄になる」→ 回答: 段階的に移行できます。まずM365トラフィックをGSA経由にし(リスク低)、次にインターネットアクセスをSWGで保護し、最後にオンプレアクセスをZTNAに置き換えます。VPNは最後まで残して並行稼働できます",
"「レガシーアプリがVPN経由でしか使えない」→ 回答: Entra Private Access(ZTNA)でアプリ単位のアクセスを提供できます。VPN同様のTCPアクセスに加えて、条件付きアクセス連携でセキュリティが向上します",
"「パフォーマンスが心配」→ 回答: GSAはMicrosoftのグローバルネットワーク(Azure Backbone)を使用。VPN装置のボトルネックがなくなるため、むしろパフォーマンスは向上します",
"「導入実績が少ないのでは」→ 回答: Microsoft自身が数十万人規模でGSAを利用しています。また、Entra IDの条件付きアクセスはすでに数億ユーザーが利用しており、GSAはその延長線上の技術です"]
}],

{id:"cost",title:"コスト提案の組み立て方",week:"Week 10",time:"3h",keyMsg:"月額比較ではなくTCOで「隠れコスト」を可視化して提案",content:[
{type:"list",title:"コスト提案の考え方 — なぜ月額比較では負けるのか",icon:"📖",items:[
"DaaS(W365/AVD)提案で最も多い失敗パターンは「月額だけで比較する」ことです。物理PCの月額は¥0に見えるため(購入時に一括払い済み)、W365の月額¥7,683が「高い」と判断されてしまいます",
"TCO(Total Cost of Ownership / 総所有コスト)で比較することが必須です。TCOには購入費だけでなく、キッティング人件費・ヘルプデスク対応費・修理費・電力費・セキュリティ管理費・PCリプレース費など全てのコストを含みます",
"お客様への説明の仕方: 「自家用車の月額を『ローン返済額だけ』で計算する人はいませんよね。ガソリン代・保険料/車検費・駐車場代・修理費を含めた総額で比較するのと同じです。PCも月額ライセンス料だけでなく、隠れたコストを全て含めて比較しましょう」",
"物理PCの隠れコストTOP5: (1)キッティング人件費(1台3時間×人件費)、(2)ヘルプデスク対応(月平均20件×2時間/件)、(3)セキュリティパッチ管理(緊急パッチの夜間対応含む)、(4)ハードウェア故障対応(年間故障率3-5%)、(5)4年後のPCリプレース費(再び発生)",
"最も効果的な提案方法: 「御社の100台のPCにかかっている年間総コストを一緒に計算してみましょう」と切り出し、隠れコストを一つずつ洗い出す。お客様自身が「こんなにかかっていたのか」と気づくプロセスが重要です",
"コスト提案の3大ポイント: (1)TCOで物理PCの隠れコストを可視化、(2)SKUミックス+Frontlineでコスト最適化、(3)定性効果(セキュリティ向上・展開速度・BCP)を金額換算して追加"]},

{type:"list",title:"競合比較の考え方 — 自社の強みを理解する",icon:"📖",items:[
"競合比較はDaaS提案で避けて通れないテーマです。お客様は必ず「他のDaaSと何が違うの？」と聞いてきます。自社の強みを正確に理解し、競合の弱みではなく自社の強みで勝負することが重要です",
"Microsoft DaaSの最大の武器は「M365とのネイティブ統合」です。認証(Entra ID)、デバイス管理(Intune)、セキュリティ(Defender)、ネットワーク(GSA)が全て同じMicrosoftプラットフォームで統合管理できます",
"お客様への説明の仕方: 「御社が既にMicrosoft 365を使っているなら、追加のDaaSライセンスを購入するだけでCloud PCが使えます。認証もデバイス管理も同じ管理画面です。別の製品を使うと、管理画面が増え、ID連携の設定が必要になります」",
"競合比較の基本姿勢: 競合製品を直接否定するのではなく、「Microsoft DaaSの優位性」を語る。お客様が競合を褒めたら「確かにXは良い製品です。ただ、御社の環境ではMicrosoftの方が効率的です」と対応する",
"よくある誤解: 「Citrix/VMwareの方が機能が多い」→ AVD+Intune+GSAの組み合わせで大部分の機能はカバーできます。むしろ1つのベンダーで完結する方がライセンスコスト・運用コストが低くなります",
"提案のタイミング: 競合比較は「お客様から聞かれたら」出す。自分から積極的に出すと、不要な比較検討が始まり、商談が長期化するリスクがある。ただし、競合が既に提案済みの場合は先手を打って比較表を提示する"]},

{id:"hearing",title:"ヒアリング & 要件定義",week:"Week 11",time:"3h",keyMsg:"お客様の課題を引き出す質問術 — 初回提案の成功はヒアリングの質で決まる",content:[
{type:"list",title:"なぜヒアリングが最も重要か",icon:"📖",items:[
"製品説明だけの提案は刺さらない。お客様の「困っていること」を起点にしないと、的外れな提案になる",
"ヒアリングで得た情報が、提案書の構成・コスト試算・移行計画の全てのベースになる",

function renderMain(){
  if(view==='welcome') return renderWelcome();
  if(view==='quiz') return renderQuiz();
  const t=allT().find(x=>x.id===view);
  if(!t) return renderWelcome();
  const m=T.find(x=>x.topics.includes(t));
  let h=`<div class="topic-view active"><div class="breadcrumb">Month ${m.month}: ${m.title} › ${t.week}</div><div class="topic-title">${t.title}</div><div class="key-msg">${t.keyMsg}</div>`;
  t.content.forEach(b=>{
    if(b.type==='list') h+=rList(b);
    else if(b.type==='cards') h+=rCards(b);
    else if(b.type==='table') h+=rTable(b);
    else if(b.type==='flow') h+=rFlow(b);
    else if(b.type==='diagram') h+=rDiagram(b);
  });
  if(t.links&&t.links.length){
    h+=`<div class="block"><h3><span class="icon">🔗</span>深掘り学習</h3>`;
    t.links.forEach(l=>{h+=`<a class="link-box" href=${l.url} target="_blank"">📄 ${l.title}</a>`;});
    h+='</div>';
  }
  const all=allT(),idx=all.findIndex(x=>x.id===t.id);
  h+=`<div class="complete-bar"><button class="btn ${done[t.id]?'btn-outline':'btn-green'}" onclick="toggle('${t.id}')">${done[t.id]?'✅ 完了済み':'☐ 完了にする'}</button><div style="margin-left:auto;display:flex;gap:8px;">${idx>0?`<button class="btn btn-outline" onclick="go('${all[idx-1].id}')">← 前</button>`:''}${idx<all.length-1?`<button class="btn btn-azure" onclick="go('${all[idx+1].id}')">次 →</button>`:''}</div></div>`;
  h+='</div>';
  document.getElementById('main').innerHTML=h;
}

function rList(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><ul>${b.items.map(i=>`<li>${e(i)}</li>`).join('')}</ul></div>`;}
function rCards(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><div class="card-grid">${b.cards.map(c=>`<div class=card ${c.color}><h4>${c.title}</h4><ul>${c.items.map(i=>`<li>${e(i)}</li>`).join('')}</ul></div>`).join('')}</div></div>`;}
function rTable(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><table class="cmp-table"><thead><tr>${b.headers.map(h=>`<th>${e(h)}</th>`).join('')}</tr></thead><tbody>${b.rows.map(r=>`<tr>${r.map((c,i)=>`<td${i===0?' style="font-weight:600;color:var(--fg)"':''}>${e(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
function rFlow(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><div class="diagram">${b.steps.map((s,i)=>`${i>0?'<span class=diagram-arrow>→</span>':''}<div class=diagram-step><div class=diagram-box ${s.style||''}><div class=d-icon>${s.icon}</div><h5>${s.label}</h5><p>${s.desc}</p></div></div>`).join('')}</div></div>`;}
function rDiagram(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><div class="pillar-row">${b.pillars.map(p=>`<div class=pillar style="background:${p.color}"><div style="font-size:18px;margin-bottom:2px;">${p.label}</div><div style="font-size:10px;opacity:.85;">${p.desc}</div></div>`).join('')}</div></div>`;}

    ${T.map(m=>{const td=m.topics.filter(t=>done[t.id]).length;const mp=m.topics.length?Math.round(td/m.topics.length*100):0;return `<div class="month-card" onclick="go('${m.topics[0].id}')"><div class="mc-num" style="color:${m.color}">${m.month}</div><h3>Month ${m.month}: ${m.title}</h3><p>${m.period} — ${td}/${m.topics.length} 完了</p><div class="mc-prog"><div class="mc-prog-fill" style="width:${mp}%;background:${m.color}></div></div></div>`;}).join('')}
  </div>
</div>

<!-- 合格基準 -->
<div class="block" style="border-left:3px solid var(--red);">
  <h3><span class="icon">🎓</span>卒業テストの合格基準</h3>
  <ul>
    <li>基礎知識（Q1-7）: 7問中 <b>5問以上</b>正答</li>
    <li>専門知識（Q8-14）: 7問中 <b>5問以上</b>正答</li>
    <li>提案シナリオ（Q15-20）: レビュアーの評価で<b>「顧客に出せるレベル」</b>の評価</li>
    <li style="border-left-color:var(--green);">合格後 → メンターと共に<b>実案件に参加</b>（実践フェーズ）</li>
    <li style="border-left-color:var(--yellow);">不合格 → 該当セクションを1週間復習し再テスト</li>
