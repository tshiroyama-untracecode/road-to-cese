function renderQuiz(){
  let h='<div class="topic-view active"><div class="topic-title">卒業テスト（30問）</div><div class="key-msg">選択式20問 + 記述式10問。合格基準: 選択式16/20以上 + 記述式は先輩SEレビュー</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;"><div style="text-align:center;padding:14px;background:var(--azure-light);border-radius:8px;"><div style="font-size:24px;font-weight:700;color:var(--azure);" id="scoreChoice">- / 20</div><div style="font-size:11px;color:var(--fg-sub);">選択式スコア</div></div><div style="text-align:center;padding:14px;background:var(--green-bg);border-radius:8px;"><div style="font-size:24px;font-weight:700;color:var(--green);" id="scoreText">- / 10</div><div style="font-size:11px;color:var(--fg-sub);">記述式（自己採点）</div></div><div style="text-align:center;padding:14px;background:var(--purple-bg);border-radius:8px;"><div style="font-size:24px;font-weight:700;color:var(--fg);" id="scoreTotal">未採点</div><div style="font-size:11px;color:var(--fg-sub);">総合判定</div></div></div>';
  h+='<div style="margin-bottom:12px;"><button class="btn btn-azure" onclick="gradeQuiz()">採点する</button></div>';
  let lc='';
  Q.forEach((q,i)=>{
    if(q.cat!==lc){lc=q.cat;
      const icon=lc.includes('基礎')?'📘':lc.includes('専門')?'📗':'📙';
      h+=`<div class="section-divider"><h3>${icon} ${lc}</h3></div>`;
    }
    if(q.type==='choice'){
      h+=`<div class="quiz-q" id="qq${i}"><h4>Q${i+1}. ${e(q.q)}</h4><div style="display:flex;flex-direction:column;gap:6px;margin:8px 0;">`;
      q.choices.forEach((c,ci)=>{
        h+=`<label style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid var(--card-border);border-radius:6px;cursor:pointer;font-size:13px;color:var(--fg-sub);transition:border-color .15s;" onmouseover="this.style.borderColor='var(--azure)'" onmouseout="this.style.borderColor='var(--card-border)'"><input type="radio" name="q${i}" value="${ci}" style="accent-color:var(--azure);"> ${e(c)}</label>`;
      });
      h+=`</div><button class="hint-btn" onclick="this.nextElementSibling.classList.toggle('active')">💡 解説を見る</button><div class="quiz-hint">${e(q.h)}</div></div>`;
    } else {
      h+=`<div class="quiz-q scenario" id="qq${i}"><h4>Q${i+1}. ${e(q.q)}</h4><textarea class="quiz-answer" placeholder="回答を入力..." style="min-height:80px;"></textarea><button class="hint-btn" onclick="this.nextElementSibling.classList.toggle('active')">💡 模範回答を見る</button><div class="quiz-hint">${e(q.h)}</div></div>`;
    }
  });
  h+='</div>';
  document.getElementById('main').innerHTML=h;
}
function gradeQuiz(){
  let correct=0,total=0;
  Q.forEach((q,i)=>{
    const el=document.getElementById('qq'+i);
    if(q.type==='choice'){
      total++;
      const selected=el.querySelector('input[name="q'+i+'"]:checked');
      const labels=el.querySelectorAll('label');
      labels.forEach(l=>{l.style.background='rgba(255,255,255,.03)';l.style.borderColor='var(--card-border)';});
      // Show correct answer
      labels[q.answer].style.background='var(--green-bg)';
      labels[q.answer].style.borderColor='var(--green)';
      if(selected){
        const val=parseInt(selected.value);
        if(val===q.answer){
          correct++;
        } else {
          labels[val].style.background='var(--red-bg)';
          labels[val].style.borderColor='var(--red)';
        }
      }
    }
  });
  document.getElementById('scoreChoice').textContent=correct+' / '+total;
  const pct=Math.round(correct/total*100);
  const pass=correct>=16;
  document.getElementById('scoreTotal').textContent=pass?'合格':'不合格';
  document.getElementById('scoreTotal').style.color=pass?'var(--green)':'var(--red)';
  window.scrollTo(0,0);
}

function go(id){view=id;save();renderSB();renderMain();upd();window.scrollTo(0,0);}
function goQuiz(){view='quiz';renderSB();renderMain();window.scrollTo(0,0);}
function toggle(id){done[id]=!done[id];save();renderSB();renderMain();upd();showSaved();}
function upd(){const p=prog();document.getElementById('progFill').style.width=p+'%';document.getElementById('progText').textContent=p+'%';}
function e(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Theme switching
function setTheme(theme){
  document.documentElement.setAttribute('data-theme',theme);
  localStorage.setItem('tr_theme',theme);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.${theme}-btn`)?.classList.add('active');
}
function initTheme(){
  const saved=localStorage.getItem('tr_theme')||'light';
  setTheme(saved);
}

// Save indicator
function showSaved(){
  const el=document.getElementById('saveInd');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// Also save last viewed topic
function save(){
  localStorage.setItem("tr_done",JSON.stringify(done));
  localStorage.setItem("tr_lastView",view);
}

// Restore last view on load
function restoreView(){
  const last=localStorage.getItem("tr_lastView");
  if(last && last!=='welcome'){
    if(last==='quiz'){view='quiz';}
    else if(allT().find(t=>t.id===last)){view=last;}
  }
}

initTheme();
restoreView();
renderSB();renderMain();upd();
</script>
