<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Endpoint SE への道</title>
<style>
/* === Theme: Dark (default) === */
:root, [data-theme="dark"] {
  --azure:#0078D4;--azure-dark:#106EBE;--azure-light:rgba(0,120,212,.12);
  --green:#107C10;--green-bg:rgba(16,124,16,.12);
  --purple:#742774;--purple-bg:rgba(116,39,116,.12);
  --red:#D83B01;--red-bg:rgba(216,59,1,.12);
  --yellow:#FFB900;--yellow-bg:rgba(255,185,0,.12);
  --teal:#008B8B;--teal-bg:rgba(0,139,139,.12);
  --bg:#09090b;--card-bg:#18181b;--card-border:#27272a;
  --fg:#ffffff;--fg-sub:#a1a1a1;--fg-muted:#52525b;
  --header-bg:rgba(9,9,11,.85);--sb-hover:rgba(0,120,212,.12);
  --input-bg:rgba(255,255,255,.05);--row-hover:rgba(255,255,255,.03);
  --radius:12px;--radius-full:9999px;
}
/* === Theme: Light === */
[data-theme="light"] {
  --bg:#F3F2F1;--card-bg:#FFFFFF;--card-border:#E1DFDD;
  --fg:#323130;--fg-sub:#605E5C;--fg-muted:#A19F9D;
  --header-bg:rgba(255,255,255,.9);--sb-hover:rgba(0,120,212,.08);
  --input-bg:rgba(0,0,0,.03);--row-hover:rgba(0,0,0,.02);
  --azure-light:rgba(0,120,212,.08);--green-bg:rgba(16,124,16,.08);
  --purple-bg:rgba(116,39,116,.08);--red-bg:rgba(216,59,1,.08);
  --yellow-bg:rgba(255,185,0,.1);--teal-bg:rgba(0,139,139,.08);
}
/* === Theme: Blue === */
[data-theme="blue"] {
  --bg:#001B3D;--card-bg:#002050;--card-border:#003380;
  --fg:#DEECF9;--fg-sub:#8CBAE8;--fg-muted:#4A7FB5;
  --header-bg:rgba(0,27,61,.9);--sb-hover:rgba(0,120,212,.15);
  --input-bg:rgba(255,255,255,.06);--row-hover:rgba(255,255,255,.04);
  --azure-light:rgba(0,120,212,.18);--green-bg:rgba(16,124,16,.15);
  --purple-bg:rgba(116,39,116,.15);--red-bg:rgba(216,59,1,.12);
  --yellow-bg:rgba(255,185,0,.12);--teal-bg:rgba(0,139,139,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Segoe UI","Meiryo UI",system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased;}

/* Header */
.header{position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--card-border);}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;padding:14px 24px;gap:14px;}
.header .logo{display:flex;align-items:center;gap:8px;}
.header .logo-grid{width:16px;height:16px;display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.header .logo-grid span{background:var(--azure);border-radius:1px;}
.header h1{font-size:15px;font-weight:600;}
.header .progress-wrap{margin-left:auto;display:flex;align-items:center;gap:10px;}
.header .prog-bar{width:140px;height:5px;background:var(--card-border);border-radius:3px;overflow:hidden;}
.header .prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}
.header .prog-text{font-size:12px;color:var(--fg-sub);}

/* Layout */
.layout{display:flex;max-width:1100px;margin:0 auto;min-height:calc(100vh - 50px);}

/* Sidebar */
.sidebar{width:260px;border-right:1px solid var(--card-border);overflow-y:auto;position:sticky;top:50px;height:calc(100vh - 50px);flex-shrink:0;padding:16px 0;}
.sb-section{padding:8px 16px;margin-bottom:4px;}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--fg-muted);margin-bottom:6px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 12px;margin-bottom:2px;border-radius:8px;font-size:12px;cursor:pointer;color:var(--fg-sub);transition:all .12s;}
.sb-item:hover{background:var(--azure-light);color:var(--fg);}
.sb-item.active{background:var(--azure-light);color:var(--azure);font-weight:600;}
.sb-item.done{color:var(--green);}
.sb-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sb-item .check{font-size:10px;width:16px;text-align:center;}

/* Main */
.main{flex:1;padding:28px 36px;overflow-y:auto;}

/* Hero welcome */
.hero{text-align:center;padding:48px 20px 32px;}
.hero h2{font-size:36px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--azure),#50a0e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:16px;color:var(--fg-sub);max-width:560px;margin:0 auto 28px;}
.hero-stat{font-size:48px;font-weight:700;color:var(--fg);}
.hero-stat-label{font-size:13px;color:var(--fg-muted);}

.month-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:780px;margin:24px auto 0;}
.month-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform .15s,border-color .15s;}
.month-card:hover{transform:translateY(-2px);border-color:var(--azure);}
.month-card .mc-num{font-size:32px;font-weight:700;margin-bottom:4px;}
.month-card h3{font-size:14px;font-weight:600;margin-bottom:2px;}
.month-card p{font-size:11px;color:var(--fg-muted);}
.month-card .mc-prog{margin-top:8px;height:4px;background:var(--card-border);border-radius:2px;overflow:hidden;}
.month-card .mc-prog-fill{height:100%;border-radius:2px;transition:width .3s;}

/* Topic view */
.topic-view{display:none;}.topic-view.active{display:block;}
.breadcrumb{font-size:12px;color:var(--fg-muted);margin-bottom:4px;}
.topic-title{font-size:26px;font-weight:700;margin-bottom:6px;}
.key-msg{font-size:14px;color:var(--fg-sub);padding:10px 16px;background:var(--azure-light);border-left:3px solid var(--azure);border-radius:0 8px 8px 0;margin-bottom:20px;}

/* Block */
.block{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px 24px;margin-bottom:14px;}
.block h3{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.block h3 .icon{font-size:20px;}

/* List items */
.block ul{list-style:none;padding:0;}
.block ul li{padding:10px 14px;margin-bottom:5px;background:rgba(255,255,255,.04);border:1px solid var(--card-border);border-radius:8px;font-size:13px;color:var(--fg-sub);border-left:3px solid var(--azure);}
.block ul li.green{border-left-color:var(--green);}
.block ul li.red{border-left-color:var(--red);}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.card{background:rgba(255,255,255,.03);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px 18px;}
.card h4{font-size:13px;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--card-border);}
.card ul{list-style:none;padding:0;}
.card ul li{font-size:12px;padding:3px 0;color:var(--fg-sub);border:none;background:none;margin:0;border-left:none;}
.card ul li::before{content:"→ ";color:var(--azure);font-weight:600;}

/* Table */
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.cmp-table th{background:rgba(0,120,212,.15);color:var(--azure);padding:9px 10px;text-align:center;font-weight:600;border-bottom:1px solid var(--card-border);}
.cmp-table th:first-child{text-align:left;}
.cmp-table td{padding:8px 10px;border-bottom:1px solid var(--card-border);color:var(--fg-sub);}
.cmp-table tr:hover{background:rgba(255,255,255,.03);}

/* Flow diagram */
.diagram{display:flex;align-items:center;justify-content:center;gap:0;padding:14px 0;overflow-x:auto;flex-wrap:nowrap;}
.diagram-step{text-align:center;min-width:110px;}
.diagram-box{border:1px solid var(--card-border);border-radius:10px;padding:14px 10px;margin:0 6px;background:var(--card-bg);}
.diagram-box.blue{border-color:var(--azure);background:var(--azure-light);}
.diagram-box.green{border-color:var(--green);background:var(--green-bg);}
.diagram-box .d-icon{font-size:22px;margin-bottom:4px;}
.diagram-box h5{font-size:11px;font-weight:600;color:var(--fg);}
.diagram-box p{font-size:10px;color:var(--fg-muted);}
.diagram-arrow{font-size:16px;color:var(--azure);font-weight:700;}

/* Pillars */
.pillar-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0;}
.pillar{text-align:center;padding:16px 6px;border-radius:10px;color:white;font-size:12px;font-weight:600;}

/* Links */
.link-box{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--azure-light);border:1px solid rgba(0,120,212,.3);border-radius:var(--radius-full);font-size:12px;color:var(--azure);text-decoration:none;margin:4px 4px 4px 0;transition:background .12s;}
.link-box:hover{background:rgba(0,120,212,.2);}

/* Complete bar */
.complete-bar{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);margin-top:16px;}
.btn{padding:10px 24px;border:none;border-radius:var(--radius-full);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-green{background:var(--green);color:white;}
.btn-green:hover{opacity:.85;}
.btn-outline{background:transparent;border:1px solid var(--card-border);color:var(--fg-sub);}
.btn-outline:hover{background:rgba(255,255,255,.05);color:var(--fg);}
.btn-azure{background:var(--azure);color:white;}
.btn-azure:hover{background:var(--azure-dark);}

/* Quiz */
.quiz-q{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px 22px;margin-bottom:12px;border-left:3px solid var(--azure);}
.quiz-q.scenario{border-left-color:var(--purple);}
.quiz-q h4{font-size:14px;font-weight:600;margin-bottom:8px;}
.quiz-answer{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--fg);resize:vertical;min-height:56px;}
.quiz-answer:focus{outline:none;border-color:var(--azure);}
.quiz-hint{display:none;margin-top:8px;padding:10px 14px;background:var(--green-bg);border:1px solid rgba(16,124,16,.3);border-radius:8px;font-size:12px;color:var(--green);}
.quiz-hint.active{display:block;}
.hint-btn{background:none;border:1px solid var(--card-border);border-radius:var(--radius-full);padding:4px 12px;font-size:11px;cursor:pointer;color:var(--fg-muted);margin-top:6px;font-family:inherit;}
.hint-btn:hover{border-color:var(--fg-muted);color:var(--fg-sub);}

.section-divider{margin:20px 0 12px;padding:8px 0;border-bottom:1px solid var(--card-border);}
.section-divider h3{font-size:14px;font-weight:600;color:var(--fg-muted);}

/* Theme switcher */
.theme-switcher{display:flex;gap:4px;align-items:center;margin-right:8px;}
.theme-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--card-border);cursor:pointer;transition:transform .15s,border-color .15s;position:relative;}
.theme-btn:hover{transform:scale(1.15);}
.theme-btn.active{border-color:var(--azure);box-shadow:0 0 0 2px rgba(0,120,212,.3);}
.theme-btn.dark-btn{background:#18181b;}
.theme-btn.light-btn{background:#F3F2F1;}
.theme-btn.blue-btn{background:#002050;}

/* Save indicator */
.save-indicator{font-size:10px;color:var(--green);opacity:0;transition:opacity .3s;margin-left:4px;}
.save-indicator.show{opacity:1;}

@media(max-width:800px){
  .sidebar{display:none;}
  .month-cards{grid-template-columns:1fr;}
  .card-grid{grid-template-columns:1fr;}
  .pillar-row{grid-template-columns:repeat(3,1fr);}
  .main{padding:20px 16px;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo" onclick="view='welcome';renderSB();renderMain();upd();window.scrollTo(0,0);" style="cursor:pointer;">
      <div class="logo-grid"><span></span><span></span><span></span><span></span></div>
      <h1>Cloud Endpoint SE への道</h1>
    </div>
    <div class="theme-switcher">
      <div class="theme-btn dark-btn" title="Dark" onclick="setTheme('dark')"></div>
      <div class="theme-btn light-btn" title="Light" onclick="setTheme('light')"></div>
      <div class="theme-btn blue-btn" title="Blue" onclick="setTheme('blue')"></div>
    </div>
    <div class="progress-wrap">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <span class="prog-text" id="progText">0%</span>
      <span class="save-indicator" id="saveInd">✓ 保存済み</span>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<script>
const T=[{month:1,title:"基礎固め",color:"#0078D4",period:"Week 1-4",topics:[

// ═══════════════════════════════════════════════════════
// Topic 1: ゼロトラスト
// ═══════════════════════════════════════════════════════
{id:"zt",title:"ゼロトラスト",week:"Week 1",time:"3h",keyMsg:"「社内は安全」を捨て、全アクセスを常に検証するモデル",content:[
{type:"list",title:"ゼロトラストとは何か — 基礎から理解する",icon:"📖",items:[
"ゼロトラストとは「何も信頼しない(Zero Trust)」を前提としたセキュリティモデルのことで、2010年にForrester Researchのジョン・キンダーバーグ氏が提唱した考え方です",
"従来のセキュリティは「城と堀(Castle and Moat)」モデルと呼ばれ、企業ネットワークの境界(ファイアウォール/VPN)を守れば中は安全という考え方でした。社内LANに入れば信頼されたユーザーとして扱われていました",
"しかしクラウド(M365/SaaS)の普及とリモートワークの一般化により、「社内ネットワーク」という境界自体が曖昧になりました。データはクラウドに、ユーザーは自宅や外出先にいます",
"ゼロトラストでは、アクセス元が社内であっても社外であっても、全てのアクセス要求を毎回検証します。「信頼するが検証する(Trust but Verify)」ではなく「検証してから信頼する(Verify then Trust)」という発想転換です",
"なぜ今ゼロトラストが必要か: ランサムウェア攻撃の85%以上がVPN/リモートアクセス経由で侵入しています(2023年統計)。境界防御だけでは防げない攻撃が主流になっています",
"お客様への説明の仕方: 「ゼロトラスト=何も信じないではなく、毎回確認する仕組みです。銀行ATMのように、カードを入れてもPINを入力しても、毎回本人確認をしますよね。あれと同じ考え方です」"]},
{type:"flow",title:"ゼロトラスト導入の段階的ステップ",icon:"📈",steps:[
{icon:"🔑",label:"Step 1: MFA導入",desc:"全ユーザーにMFA必須化",style:"blue"},
{icon:"📋",label:"Step 2: CA設定",desc:"条件付きアクセスポリシー",style:""},
{icon:"📱",label:"Step 3: デバイス管理",desc:"Intune準拠チェック",style:""},
{icon:"🛡️",label:"Step 4: EDR導入",desc:"Defender for Endpoint",style:""},
{icon:"🌐",label:"Step 5: SASE/GSA",desc:"NWセキュリティ統合",style:"green"}]},
{type:"cards",title:"3つの原則 — 具体例で理解する",icon:"🛡️",cards:[
{title:"原則1: 明示的に検証する",color:"red",items:[
"全てのアクセス要求で認証・認可を実施する",
"ユーザーID・デバイス状態・場所・アプリ・データ感度を総合評価",
"実例: 社内LANからのアクセスでも毎回MFAを要求",
"実例: 管理者がAzure Portalにアクセスする際、フィッシング耐性MFA(FIDO2)を要求",
"従来型: VPN接続済み=信頼→社内リソース全てアクセス可能だった",
"ゼロトラスト: VPN接続済みでも、アクセス先ごとに条件を再評価",
"ポイント: 「一度認証したから安全」という考えを排除する"]},
{title:"原則2: 最小特権アクセス",color:"yellow",items:[
"業務に必要な最小限の権限のみを付与する",
"JIT (Just-In-Time): 必要な時だけ権限を昇格させる",
"実例: Global Adminは常時付与せず、PIMで申請→承認→時間制限付き昇格",
"実例: 開発者にはDevサブスクリプションのContributor権限のみ、Prodには読み取りのみ",
"データ分類: 機密データにアクセスできるユーザーを限定(DLP連携)",
"セグメンテーション: ネットワークを分割し横方向移動を防止",
"ポイント: 「必要十分」を常に問い直す文化が重要"]},
{title:"原則3: 侵害を前提とする",color:"",items:[
"攻撃者は既にネットワーク内にいると仮定して設計する",
"ブラストラジアス(被害範囲)を最小化する設計",
"実例: ランサムウェアが1台に感染しても他デバイスに拡散しない設計",
"実例: 管理者アカウント侵害時、影響範囲を1サービスに限定",
"マイクロセグメンテーション: アプリ間の通信も制御",
"EDR/XDR: 侵害後の検知・対応を自動化(Defender)",
"暗号化: データは保存時も転送中も常に暗号化",
"ポイント: 「侵入されないこと」ではなく「侵入されても大丈夫」を目指す"]}]},
{type:"table",title:"ゼロトラスト成熟度モデル — 現在地を把握する",icon:"📊",headers:["段階","ID","デバイス","ネットワーク","状態","次のアクション"],rows:[
["Level 0: 未着手","パスワードのみ","管理なし","VPNのみ","多くの中小企業が該当","MFA導入から開始"],
["Level 1: 基本","MFA導入済み","Intune登録開始","レガシー認証ブロック","M365 E3導入済み企業","CAポリシー強化"],
["Level 2: 標準","CA+準拠デバイス","Intune完全管理","条件付きNWアクセス","セキュリティ意識の高い企業","ID Protection導入"],
["Level 3: 高度","パスワードレス+PIM","EDR+自動隔離","SASE/GSA導入","先進的な大企業","ゼロトラスト完成"],
["Level 4: 最適化","継続的なリスク評価","自動修復","全通信の可視化","ゼロトラスト先進企業","継続的な改善"]]},
{type:"diagram",title:"ゼロトラストの6つの柱",icon:"🏛️",pillars:[
{label:"ID",color:"#0078D4",desc:"本人確認"},{label:"デバイス",color:"#5C2D91",desc:"端末検証"},
{label:"NW",color:"#008B8B",desc:"通信保護"},{label:"アプリ",color:"#107C10",desc:"権限管理"},
{label:"データ",color:"#FFB900",desc:"分類・保護"},{label:"インフラ",color:"#D83B01",desc:"構成管理"}]},
{type:"table",title:"従来型セキュリティ vs ゼロトラスト比較",icon:"⚖️",headers:["比較軸","従来型(境界防御)","ゼロトラスト"],rows:[
["信頼モデル","社内NW=信頼、社外=不信頼","全てのアクセスを検証、信頼しない"],
["NW境界","ファイアウォール/VPNが防御線","境界の概念なし、ID中心の制御"],
["認証頻度","VPN接続時に1回","毎回の要求で継続的に評価"],
["横方向移動","NW内で自由に移動可能","マイクロセグメンテーションで制限"],
["リモートアクセス","VPN経由で社内NWに接続","どこからでもIDベースで直接アクセス"],
["デバイス信頼","社内NW接続=信頼","デバイス正常性を毎回チェック"],
["データ保護","NW境界内に保管","データ自体を分類・暗号化・DLP"],
["インシデント対応","境界突破後は検知困難","EDR/XDRで内部の脅威も検知"],
["クラウド対応","VPN経由で回り道","クラウドネイティブに直接アクセス"],
["運用コスト","VPN/FW機器の維持管理","クラウドサービスで運用軽減"]]},
{type:"cards",title:"DaaS/VDIとゼロトラストの関係",icon:"☁️",cards:[
{title:"DaaSがゼロトラストに貢献する理由",color:"green",items:[
"データがクラウドに留まり端末に残らない→情報漏洩リスク大幅減",

{id:"eid",title:"Entra ID",week:"Week 1",time:"4h",keyMsg:"Microsoft のクラウド ID 管理基盤。W365/AVDの認証・認可の中核",content:[
{type:"list",title:"なぜEntra IDが重要なのか — W365/AVD提案の起点",icon:"📖",items:[
"Entra ID(旧Azure AD)は、Microsoftクラウドサービス全体の認証・認可を司る中核基盤です。W365やAVDを提案する際、まず最初に確認すべきは「お客様のEntra IDの状態」です",
"お客様への説明の仕方: 「Entra IDはMicrosoftクラウドの「身分証明書発行所」です。M365もW365もAVDも、全てEntra IDで本人確認してからアクセスを許可します」",
"なぜW365/AVD提案で必須か: Cloud PCへのサインイン認証、条件付きアクセスによるアクセス制御、Intuneとの連携、全てEntra IDが起点になります",
"Active Directory(AD)との違い: ADはオンプレミスのWindowsサーバー上で動くディレクトリサービスで、Kerberos/NTLMプロトコルを使用します。Entra IDはクラウドネイティブのIDaaS(Identity as a Service)で、OAuth 2.0/OpenID Connect/SAMLを使用します",
"歴史: Azure Active Directory として2013年にリリースされ、2023年7月にMicrosoft Entra IDに名称変更されました。機能は変わっていないので、「名前が変わっただけ」とお客様に説明できます",
"提案時のポイント: Entra IDのライセンス(Free/P1/P2)によって使える機能が大きく異なるため、W365/AVD提案時には必ずお客様のM365ライセンスを確認しましょう"]},
{type:"flow",title:"オンプレADからEntra IDへの進化",icon:"🔄",steps:[

{type:"cards",title:"SSO(シングルサインオン) — 1回の認証で全アプリにアクセス",icon:"🔓",cards:[

{id:"ca",title:"条件付きアクセス",week:"Week 1-2",time:"4h",keyMsg:"「もし〜なら〜を要求する」ルールベースのアクセス制御。ゼロトラストの要",content:[
{type:"list",title:"条件付きアクセスとは — 基礎から理解する",icon:"📖",items:[
"条件付きアクセス(Conditional Access / CA)は、Entra IDの機能の一つで、「もし〜の条件なら、〜の制御を適用する」というIF-THENルールでアクセスを制御する仕組みです",
"なぜ必要か: 単純なパスワード+MFAだけでは不十分です。「社外からのアクセスにはMFA必須だが、社内の準拠デバイスからならMFA不要」といった柔軟な制御が求められます",
"お客様への説明の仕方: 「条件付きアクセスは、建物のセキュリティゲートのようなものです。社員証(ID)だけでなく、入る時間帯(場所/時間)、入る人の役職(ロール)、持ち物(デバイスの状態)を総合的にチェックして入館を判断します」",
"ゼロトラストとの関係: ゼロトラストの「明示的に検証する」原則を実装する中核機能です。全てのアクセスに対して条件を評価し、適切な制御を適用します",
"ライセンス要件: Entra ID P1以上(M365 E3に含まれる)が必要です。無料版(Free)では使えません。これはW365 Enterprise導入の前提条件でもあります",
"W365/AVD提案での重要性: Cloud PCへのアクセスを「誰が」「どこから」「どのデバイスで」「どのようなリスクレベルで」アクセスしているかに基づいて制御できます"]},

{id:"mfa",title:"MFA / パスワードレス",week:"Week 2",time:"2h",keyMsg:"パスワードだけでは不十分。管理者にはフィッシング耐性MFAを強く推奨",content:[
{type:"list",title:"なぜMFAが必要なのか — パスワードの限界を理解する",icon:"📖",items:[
"MFA(Multi-Factor Authentication / 多要素認証)とは、パスワード(知識要素)に加えて、スマートフォン(所持要素)や指紋(生体要素)など複数の要素で本人確認する仕組みです",
"パスワードだけの認証がなぜ危険か: Microsoftの統計によると、MFAを有効にするだけでアカウント侵害攻撃の99.9%を防御できます。逆に言えば、パスワードだけではほぼ無防備です",
"パスワード攻撃の種類: ブルートフォース(総当たり)、パスワードスプレー(よくあるパスワードを多数のアカウントに試行)、フィッシング(偽サイトで入力させる)、認証情報の漏洩(ダークウェブで売買)があります",
"お客様への説明の仕方: 「パスワードは鍵のようなもの。鍵だけだとコピーされたら終わりですが、MFAは鍵+指紋認証のようなもの。鍵をコピーされても指紋は複製できません」",
"W365/AVD提案での位置づけ: Cloud PCへのアクセスにMFAを必須にすることで、不正アクセスリスクを劇的に低減できます。条件付きアクセスと組み合わせて適用します",
"パスワードレスの目標: 最終的にはパスワード自体を廃止し、Windows Hello(顔/指紋)+FIDO2セキュリティキーだけで認証する世界を目指します。パスワードがなければパスワード攻撃自体が成立しません"]},

{type:"flow",title:"AiTM攻撃の仕組み — フィッシング耐性MFAが必要な理由",icon:"⚠️",steps:[

{type:"list",title:"AiTMフィッシング攻撃 — なぜSMSは危険か",icon:"⚠️",items:[
"AiTM(Adversary-in-the-Middle)攻撃: 攻撃者が偽サイトを中継し、ユーザーのMFAトークンをリアルタイムで窃取",
"攻撃の流れ: フィッシングメール→偽ログインページ→ユーザーが正規認証情報+MFA入力→攻撃者がセッションクッキーを横取り",
"SMS/電話MFAはAiTMに対して完全に無力: 攻撃者がリアルタイムで中継するため、ワンタイムコードも傍受される",
"SIMスワップ攻撃: 攻撃者がキャリアを騙して被害者の電話番号を乗っ取り→SMSを受信",
"SS7プロトコル攻撃: 通信プロトコルの脆弱性を突いてSMSを傍受する高度な攻撃",
"フィッシング耐性MFA(FIDO2/Passkey)はAiTMに有効: オリジンバインディングにより偽サイトでは認証が成立しない",
"実例: 2022年大規模AiTM攻撃キャンペーンで10,000+組織が標的に。SMS-MFAでは防げなかった",
"Microsoftの推奨: 管理者はフィッシング耐性MFA必須。一般ユーザーもAuthenticator(番号一致)以上を強く推奨"]},

{id:"idp",title:"Entra ID Protection",week:"Week 2",time:"2h",keyMsg:"AIがサインインリスクをリアルタイム評価し、怪しいアクセスを自動ブロック",content:[
{type:"list",title:"ID Protectionとは — なぜ必要なのか",icon:"📖",items:[
"Entra ID Protectionは、MicrosoftのAI/機械学習がサインインのリスクをリアルタイムで評価し、異常なアクセスを自動的にブロックまたは追加認証を要求する機能です",
"なぜ必要か: MFAだけでは防げない高度な攻撃(AiTMフィッシング、認証情報漏洩、内部不正)に対して、AIベースのリスク検知で自動的に防御します",
"お客様への説明の仕方: 「ID Protectionは、銀行のAI不正検知と同じ仕組みです。いつもと違う場所・時間・デバイスからのアクセスを自動検知して、本人確認を追加したりブロックしたりします」",
"Microsoftの規模の利点: 毎日6.5兆以上のシグナルを分析するMicrosoftの脅威インテリジェンスを活用。1社だけでは検知できない攻撃パターンも、グローバルな知見で検知可能です",
"W365/AVD提案での位置づけ: Cloud PCへの不正アクセスをAIが自動検知。「認証情報が漏洩しても、異常なサインインを検知して自動ブロック」という安心感を提供できます",
"ライセンス: Entra ID P2が必要(M365 E5に含まれる)。E3のお客様にはE5アップグレードの訴求ポイントになります"]},
{type:"flow",title:"ID Protectionのリスク検知から自動対応までの流れ",icon:"🔄",steps:[
{icon:"👤",label:"サインイン試行",desc:"ユーザーがアクセス",style:"blue"},
{icon:"🤖",label:"AI分析",desc:"6.5兆のシグナルと比較",style:""},
{icon:"⚠️",label:"リスク判定",desc:"低/中/高にスコアリング",style:""},
{icon:"🛡️",label:"自動対応",desc:"MFA要求/ブロック/通知",style:"green"}]},
{type:"cards",title:"リスク検知の種類と具体例",icon:"🛡️",cards:[
{title:"サインインリスク検知",color:"red",items:[
"匿名IPアドレス: Tor/VPN経由のサインインを検知",
"特殊な移動(Atypical travel): 東京→ニューヨーク間30分でサインイン→物理的に不可能",
"マルウェアリンクIPアドレス: 既知のマルウェアC2サーバーIPからのアクセス",
"不審なブラウザ: 通常と異なるブラウザ/OS/デバイスからのアクセス",
"パスワードスプレー: 同一IPから多数のアカウントに対してよくあるパスワードを試行",
"不審な受信トレイ操作: サインイン後にメール転送ルール作成→情報窃取の兆候",
"管理者確認: リアルタイムでアラートを受信しMicrosoft Entra管理センターで確認"]},
{title:"ユーザーリスク検知",color:"yellow",items:[
"漏洩した認証情報: ダークウェブ等でユーザーのパスワードが発見された場合",
"異常なユーザーアクティビティ: 通常のパターンと大きく異なる操作",
"疑わしいAPI呼び出し: 自動化ツールによる大量のAPI操作",
"ユーザーリスクは「アカウント自体が侵害されている可能性」を示す",
"サインインリスクとは独立して評価される",
"高リスク時の推奨対応: パスワード変更+MFA再登録を強制",
"セキュリティ管理者による手動確認・却下も可能"]}]},
{type:"list",title:"お客様からよくある質問と回答",icon:"💬",items:[
"Q: ID Protectionは本当に必要か → A: MFAだけでは防げないAiTM攻撃や認証情報漏洩に対して、AIベースのリスク検知で自動防御します。2022年以降のサイバー攻撃はMFA突破型が増加しており、ID Protectionの必要性が高まっています",
"Q: P2ライセンスが必要なのがネック → A: M365 E5に含まれます。E3→E5へのアップグレード訴求では「ID Protectionによるリアルタイムリスク検知」が最大のポイントです。年間数千万円の被害を防ぐ投資として、ライセンスコストは十分に正当化できます",
"Q: 誤検知(False Positive)が多くないか → A: Microsoftの6.5兆シグナルを活用したAIのため、誤検知率は非常に低いです。万が一誤検知があった場合は、管理者が「安全」として却下できます。リスクポリシーの閾値も調整可能です",
"Q: 既存のSIEMと連携できるか → A: Microsoft Sentinel(SIEM)とネイティブ連携し、サードパーティSIEM(Splunk/QRadar等)にもSyslog/API経由でリスクイベントを送信できます",
"Q: Cloud PC(W365)のアクセスにもID Protectionは有効か → A: 有効です。Cloud PCへのサインイン時のリスクを検知し、高リスクの場合はアクセスをブロックまたはMFAを追加要求します"]},
{type:"table",title:"リスクレベル別の推奨対応 — CAポリシーとの連携",icon:"📋",headers:["リスクレベル","サインインリスクの対応","ユーザーリスクの対応","Cloud PCへの影響"],rows:[
["なし","通常通りアクセス許可","通常通りアクセス許可","Cloud PCに通常接続"],
["低","ログに記録(監視のみ)","ログに記録(監視のみ)","Cloud PCに通常接続"],
["中","MFA要求(追加認証)","MFA+パスワード変更推奨","Cloud PC接続時にMFA再要求"],
["高","アクセスブロック","アクセスブロック+パスワード変更強制","Cloud PCへのアクセス完全遮断"],
["管理者の手動対応","リスクの確認→安全なら却下","パスワードリセット+MFA再登録","対応完了後にCloud PCアクセス復旧"]]},
{type:"list",title:"設定手順と推奨構成",icon:"⚙️",items:[
"前提: Entra ID P2ライセンス(M365 E5に含む)が必要",
"Step 1: Entra管理センター > 保護 > ID Protection > リスクポリシーを開く",
"Step 2: サインインリスクポリシーを構成 — 対象: 全ユーザー、リスク: 中以上、制御: MFAを要求",
"Step 3: ユーザーリスクポリシーを構成 — 対象: 全ユーザー、リスク: 高、制御: パスワード変更を要求",
"Step 4: ただし上記レガシーポリシーではなく、条件付きアクセスにリスク条件を統合する方法を推奨(2024年以降の推奨)",
"推奨: CA-AllUsers-HighSignInRisk-Block(サインインリスク高→ブロック)",
"推奨: CA-AllUsers-MediumSignInRisk-RequireMFA(サインインリスク中→MFA要求)",
"推奨: CA-AllUsers-HighUserRisk-RequirePasswordChange(ユーザーリスク高→パスワード変更)",
"注意: セルフサービスパスワードリセット(SSPR)を有効にしないとパスワード変更制御が機能しない"]},
{type:"table",title:"条件付きアクセスとの統合パターン",icon:"🔗",headers:["シナリオ","サインインリスク","ユーザーリスク","CA制御","効果"],rows:[
["通常アクセス","なし","なし","MFA要求","標準セキュリティ"],
["やや怪しい","中","なし","MFA+準拠デバイス","追加検証で安全確認"],
["危険なサインイン","高","なし","ブロック","即座にアクセス拒否"],
["認証情報漏洩","なし","中","MFA+パスワード変更","アカウント回復"],
["アカウント侵害","なし","高","ブロック+管理者通知","即座に隔離"],
["複合リスク","高","高","ブロック+インシデント対応","SOC連携"]]},
{type:"list",title:"ダッシュボード・モニタリング",icon:"📊",items:[
"ID Protection概要ダッシュボード: リスクユーザー数/リスクサインイン数をリアルタイム表示",
"リスクユーザーレポート: 現在リスクフラグが付いているユーザーの一覧。管理者が確認→安全→却下操作",
"リスクサインインレポート: リスクが検知されたサインインの詳細(IP/場所/デバイス/リスク理由)",
"脆弱性レポート: 組織全体のセキュリティ態勢の弱点を可視化",
"Microsoft Sentinel連携: ID Protectionのアラートをセキュリティ運用基盤に統合",
"自動修復の効果測定: 自動ブロック/MFA強制でどれだけの攻撃を防いだかをレポート",
"週次レビュー推奨: 高リスクユーザーの確認と対応を定期的に実施",
"提案ポイント: 「IPアドレス制限だけでは不十分。AIベースのリスク検知で未知の攻撃にも対応」"]
},
{type:"table",title:"ID Protection導入のBefore/After",icon:"📈",headers:["シナリオ","導入前の対応","導入後の対応"],rows:[
["認証情報がダークウェブに漏洩","気づかず放置→不正アクセスされるまで分からない","自動検知→ユーザーリスク「高」→パスワード変更を自動強制"],
["海外からの不審なサインイン","IP制限がなければ通過→サインインログで事後発見","特殊な移動を自動検知→即座にMFA要求またはブロック"],
["パスワードスプレー攻撃","ログイン失敗の監視を手動で実施(見落としあり)","AIが攻撃パターンを自動検知→対象アカウントを即座に保護"],
["内部不正(退職予定者)","行動監視なし→情報持ち出しに気づけない","異常なアクティビティを検知→管理者にアラート通知"],
["AiTMフィッシング攻撃","SMS-MFAでは防げず、セッショントークン窃取","リスクベースCAでセッション無効化+再認証要求"]]}
],
links:[{title:"MS Learn: ID Protection",url:"https://learn.microsoft.com/ja-jp/entra/id-protection/"}]},

{id:"intune",title:"Intune",week:"Week 3",time:"4h",keyMsg:"物理PCもW365もAVDも、Intuneで統一管理。最大の提案ポイント",content:[
{type:"list",title:"Intuneとは — なぜW365/AVD提案の最重要ポイントなのか",icon:"📖",items:[
"Microsoft Intune(旧Microsoft Endpoint Manager)は、クラウドベースのデバイス管理(MDM)とアプリ管理(MAM)を提供する統合エンドポイント管理(UEM)サービスです",
"なぜW365/AVD提案で最重要か: W365 Enterpriseの利用にはIntuneが必須です。つまりW365を提案する=Intune導入を提案することになります。物理PCもCloud PCもIntuneで統一管理できることが最大の差別化ポイントです",
"お客様への説明の仕方: 「Intuneは、会社のPC・スマホ・タブレット・Cloud PCの全てを1つの管理画面から管理できるサービスです。新しいPCを追加しても、Cloud PCを導入しても、管理ツールが変わらないので教育コストがかかりません」",
"従来のPC管理との違い: SCCM(System Center Configuration Manager)はオンプレミスに管理サーバーが必要でしたが、Intuneはクラウドサービスなので管理サーバーの構築・運用が不要です",
"ライセンス: M365 E3/E5に含まれます(Intune Plan 1)。高度な機能(Intune Plan 2)はM365 E3にアドオンとして追加できます。W365 Enterprise導入時にはM365 E3が前提なので、Intuneは「追加費用なし」で使えます",
"競合との差別化: Citrix DaaSやVMware HorizonではVDIと物理PCの管理ツールが別々になりますが、Microsoft環境ならIntuneで全て統一できます。管理コンソールが1つ=運用コスト削減です"]},
{type:"flow",title:"GPO管理からIntune管理への進化",icon:"🔄",steps:[
{icon:"🏢",label:"GPO時代",desc:"オンプレAD+SCCM",style:""},

{icon:"☁️",label:"クラウド管理",desc:"Intune単独運用",style:"green"}]},

{id:"dj",title:"デバイス参加方式",week:"Week 3",time:"3h",keyMsg:"Entra参加 vs ハイブリッド参加 — 必ず聞かれるポイント",content:[
{type:"list",title:"デバイス参加方式とは — なぜ理解が必要なのか",icon:"📖",items:[
"デバイス参加方式とは、PCやモバイルデバイスを組織のID管理基盤(Entra IDやオンプレAD)に「参加」させる方式のことです。参加方式によって管理方法やアクセスできるリソースが変わります",
"なぜW365/AVD提案で重要か: Cloud PCのプロビジョニング設定で「Entra参加」か「ハイブリッドEntra参加」かを選択する必要があります。この選択がネットワーク設計(MHN vs ANC)やオンプレ接続可否に直結します",
"お客様への説明の仕方: 「デバイスの参加方式は、その端末がどの身分証明書を持つかを決めるものです。Entra参加はクラウドの身分証、ハイブリッドはクラウドとオンプレ両方の身分証を持ちます」",
"お客様から必ず聞かれる質問: 「うちのPCはどっちにすべきですか？」→ 回答の鍵は「オンプレADに依存するアプリ(Kerberos/NTLM認証)があるかどうか」です",
"よくある誤解: 「Entra参加するとオンプレのファイルサーバーにアクセスできなくなる」→ 実際はEntra Private Access(GSA)やAzure Filesへの移行で対応可能です",
"推奨の方向性: 新規導入はEntra参加を推奨。既存環境はハイブリッドEntra参加で移行期間を設け、段階的にEntra参加に移行するのがベストプラクティスです"]},

"Step 1: Entra Connect設定でハイブリッドEntra参加を有効化(現状維持)",

{title:"AVDでの考慮点",color:"",items:[

{type:"list",title:"お客様への参加方式の説明テクニック",icon:"💬",items:[
"お客様の反応: 「ハイブリッドEntra参加が安全そう」→ 回答: ハイブリッドはAD依存が残るため移行が遅れます。新規導入ならEntra参加を推奨します。オンプレアクセスはGSA Private Accessで代替できます",

{id:"ap",title:"Autopilot",week:"Week 4",time:"3h",keyMsg:"箱から出して電源ONするだけで業務PCが完成。W365なら不要",content:[
{type:"list",title:"Autopilotとは — 基礎から理解する",icon:"📖",items:[
"Windows Autopilotは、新しいPCを箱から出して電源を入れるだけで、業務に必要なアプリ・設定・セキュリティポリシーが自動的に適用される仕組みです。IT部門がキッティング(手動セットアップ)する必要がなくなります",
"なぜ必要か: 従来のPC展開では、IT部門が1台ずつ手作業でOS設定・ドメイン参加・アプリインストールを行っていました。1台あたり2-4時間、年間100台リプレースなら200-400時間のIT工数がかかっていました",
"お客様への説明の仕方: 「新しいPCをAmazonで買って社員の自宅に直送できます。社員が電源を入れてサインインするだけで、会社のPCとして自動設定されます。IT部門は一切触る必要がありません」",
"W365との関係: W365 Cloud PCはAutopilotが不要です(ライセンス割当だけで自動プロビジョニング)。ただし物理PCが残る限り、Autopilotとの併用が現実的です",
"よくある誤解: 「Autopilotは新品PCしか使えない」→ 既存PCもハードウェアハッシュ登録でAutopilot対象にできます。また、Autopilot Resetで既存PCをリセットして再展開することも可能です",
"ライセンス: M365 E3/E5に含まれます(Intune連携が前提)。追加費用なしで利用開始できます"]},
{type:"table",title:"PC展開のBefore/After — Autopilotの効果",icon:"📈",headers:["項目","従来のPC展開","Autopilot展開"],rows:[

{id:"def",title:"Defender for Endpoint",week:"Week 4",time:"3h",keyMsg:"端末の脅威をリアルタイム検知・対応するEDR/XDR",content:[
{type:"list",title:"Defender for Endpointとは — なぜCloud PCにも必要なのか",icon:"📖",items:[
"Microsoft Defender for Endpoint(MDE)は、PC・サーバーなどのエンドポイント(端末)に対する脅威をリアルタイムで検知・調査・対応するEDR(Endpoint Detection and Response)ソリューションです",
"なぜCloud PCにも必要か: 「Cloud PCはクラウドにあるから安全」は誤解です。Cloud PCもWindowsが動いている以上、マルウェア感染・フィッシング・ランサムウェアのリスクは物理PCと同じです",
"お客様への説明の仕方: 「Defenderは24時間365日、PCの中を監視するAIセキュリティガードです。不審な動きを検知したら自動的に隔離し、管理者にアラートを送ります。物理PCにもCloud PCにも同じように適用できます」",
"EDRとアンチウイルスの違い: 従来のアンチウイルスは「既知のマルウェアをパターンマッチで検知」する方式。EDRは「端末の振る舞い(挙動)を監視し、未知の攻撃も検知」します。さらにXDRはメール・ID・クラウドアプリまで含めた統合検知を行います",
"Intune+CA連携: Defenderが端末を「高リスク」と判定→Intuneが「非準拠」に設定→条件付きアクセスがアクセスブロック。この自動連携が最大の強みです",
"ライセンス: M365 E5に含まれます。E3の場合はDefender for Endpoint P1(基本機能)が含まれ、P2(フル機能)はアドオンが必要です"]},

{id:"w3a",title:"W365 アーキテクチャ",week:"Week 5",time:"4h",keyMsg:"Cloud PCはMSテナント内で稼働。インフラは全てMS管理のSaaS",content:[
{type:"list",title:"W365とは — SaaS型DaaSの革新性を理解する",icon:"📖",items:[
"Windows 365(W365)は、Microsoftが2021年8月にリリースしたSaaS型のクラウドPC(Desktop as a Service)サービスです。ユーザーごとに専用のWindows PCがクラウド上に作成され、どこからでもアクセスできます",
"最大の特徴は「SaaS」であること: 従来のVDI(Citrix/VMware/AVD)はインフラの管理が必要でしたが、W365はMicrosoftがインフラ(サーバー/ネットワーク/ストレージ)を全て管理します。お客様はユーザーにライセンスを割り当てるだけです",
"お客様への説明の仕方: 「W365はクラウド上にある自分専用のWindowsパソコンです。M365のライセンスを持っている方なら、追加のW365ライセンスを割り当てるだけで数分でPCが使えるようになります。サーバーの構築も、ネットワークの設計も不要です」",
"物理PCとの違い: 物理PCはハードウェアが手元にありますが、W365のCloud PCはMicrosoftのデータセンターで稼働しています。ユーザーのデバイス(PC/タブレット/スマホ)には画面だけが転送されるため、データがデバイスに残りません",
"なぜ今W365なのか: Windows 10のサポート終了(2025年10月)を機にPCリプレースが発生します。物理PCを買い替える代わりにW365に移行すれば、ハードウェア管理から解放されます。このタイミングが最大の提案チャンスです",

{id:"w3p",title:"料金体系 & SKUミックス",week:"Week 6",time:"3h",keyMsg:"全員同じSKUにせず用途別最適化がコスト提案の鍵",content:[
{type:"list",title:"なぜSKUミックスが重要か — コスト最適化の本質",icon:"📖",items:[
"SKUミックスとは、組織内のユーザーを業務内容に応じてグループ分けし、それぞれに最適なスペック(SKU)を割り当てる戦略です。全員に同じ高スペックを割り当てる「一律方式」は大きな無駄を生みます",
"お客様がやりがちな見積もり方法: 「安全のために全員4vCPU/16GBで見積もってください」→ 実際には一般事務の70%は2vCPU/8GBで十分→年間で数千万円のコスト差が出ます",
"お客様への説明の仕方: 「スマートフォンと同じです。全員に最新のiPhone Proを配る必要はありません。メール中心の方は標準モデルで十分で、動画編集する方だけProにすればコストを大幅に削減できます」",
"SKU選定の具体的な手順: (1)部門・職種のリストを作成→(2)各部門の主要業務アプリを確認→(3)必要なCPU/RAM/Storageを判定→(4)SKUを割当→(5)コストを試算。このプロセスを提案書に含めることで説得力が増します",
"PoC(Proof of Concept)の活用: 「まず各部門から2-3名ずつ代表者を選んで、異なるSKUを割り当てて2週間使ってもらいましょう。実際のパフォーマンスを体験してからSKUを確定すればリスクゼロです」",
"リサイズの安心感: W365はSKU変更(リサイズ)が簡単にできます。「もし足りなければすぐにアップグレードできるので、まずは低いSKUから始めましょう」と提案すると、お客様の心理的ハードルが下がります"]},

{id:"avd",title:"AVD アーキテクチャ",week:"Week 7",time:"4h",keyMsg:"セッションホストは顧客Azure内。柔軟だが管理責任も顧客側",content:[
{type:"list",title:"AVDとは — W365との違いを理解する",icon:"📖",items:[
"Azure Virtual Desktop(AVD)は、Azure上でWindows仮想デスクトップを提供するPaaS型のDaaSサービスです。W365がSaaS(全部おまかせ)であるのに対し、AVDはPaaS(インフラの柔軟性がある分、管理責任も顧客側)です",
"AVDの最大の特徴: マルチセッション方式で1台のVMに複数ユーザーが同時接続できるため、大規模環境ではW365よりもコスト効率が良くなります。また、GPU搭載VM(NVシリーズ)やAutoscaleによるコスト最適化が可能です",
"お客様への説明の仕方: 「AVDは『自分で設計できるクラウドPC』です。W365は全部おまかせで楽ですが、AVDは自由に設計できます。サーバーのスペック、ネットワーク構成、スケーリング方法を細かく指定できます。ただしその分、管理の手間も増えます」",
"W365との使い分け: 一般業務→W365(運用が楽)、マルチセッション/GPU/大規模環境→AVD(コスト最適化)、という棲み分けが基本です。多くのお客様にはW365+AVDの併用を提案します",
"責任分界の重要性: AVDの制御プレーン(ゲートウェイ/ブローカー)はMicrosoft管理ですが、データプレーン(セッションホストVM/ネットワーク/ストレージ)は顧客管理です。この責任分界をお客様に明確に説明することが重要です",
"コストモデル: AVDのコストは「Azure VM(時間課金)+ストレージ+ネットワーク」の従量課金です。Autoscaleで夜間/休日にVMを停止すればコストを大幅に削減できますが、設計・管理のスキルが必要です"]},
{type:"diagram",title:"AVDの責任分界 — PaaSモデル",icon:"🏛️",pillars:[

"ドレインモード: スケールダウン時に既存セッションは維持→ユーザーログオフ後にVM停止",
"容量しきい値: CPUやセッション数でVM追加/削除をトリガー"]}]

{id:"fsl",title:"FSLogix",week:"Week 7",time:"3h",keyMsg:"AVDマルチセッションではほぼ必須。W365では不要（差別化ポイント）",content:[
{type:"list",title:"FSLogixとは — なぜ必要で、なぜW365との差別化ポイントなのか",icon:"📖",items:[
"FSLogixは、Microsoftが2018年に買収したプロファイル管理ソリューションです。ユーザーのプロファイル(デスクトップ設定/ドキュメント/アプリ設定/Outlookキャッシュ)をVHD(仮想ハードディスク)ファイルに格納し、外部ストレージに保存します",
"なぜAVDマルチセッションで必要か: マルチセッションでは複数ユーザーが1台のVMを共有します。Autoscaleでは接続するVMが毎回変わる可能性があるため、ユーザーのデータ/設定を外部に保存して、どのVMに接続しても同じ環境を提供する必要があります",
"お客様への説明の仕方: 「FSLogixは、カプセルホテルのロッカーのようなものです。部屋(VM)は毎回変わりますが、自分の荷物(プロファイル)はロッカー(外部ストレージ)に預けてあるので、どの部屋に入っても自分の環境が復元されます」",
"W365との重要な差別化ポイント: W365は1ユーザー=1 Cloud PC(専用VM)なので、プロファイルはVM内に保存されます。FSLogixの設計・構築・運用が一切不要です。これはAVD対比でのW365の大きなメリット(運用コスト削減)です",
"よくあるトラブル: FSLogixの運用で最もよくある問題は「サインインが遅い(30秒以上)」と「ディスク容量の肥大化」です。ストレージのIOPS不足やVHDの自動拡張が原因になることが多く、設計段階での考慮が重要です",
"提案での活用方法: 「AVDの場合はFSLogixの設計・運用が必要ですが、W365なら不要です。FSLogix運用にかかるIT工数(月あたり10-20時間)を人件費換算すると年間¥60-120万の削減になります」"]},
{type:"flow",title:"FSLogixの動作の仕組み — サインインからサインアウトまで",icon:"🔄",steps:[
{icon:"👤",label:"サインイン",desc:"ユーザーがVMに接続",style:"blue"},
{icon:"💾",label:"VHDマウント",desc:"外部ストレージからVHDを取得",style:""},
{icon:"🖥️",label:"プロファイル復元",desc:"デスクトップ/アプリ設定が復元",style:""},
{icon:"📝",label:"業務実施",desc:"変更がリアルタイムでVHDに保存",style:""},
{icon:"💾",label:"サインアウト",desc:"VHDをアンマウント→ストレージに保存",style:"green"}]},
{type:"list",title:"FSLogixの基本概念 — 詳細解説",icon:"📁",items:[
"FSLogixとは: ユーザープロファイル(デスクトップ・ドキュメント・アプリ設定)をVHD/VHDXファイルに格納するソリューション",
"動作原理: サインイン時にVHDをマウント→ユーザーには通常のCドライブとして見える→サインアウト時にアンマウント",
"なぜ必要か: マルチセッションではVMが共有→ユーザーごとのデータを外部に保存して分離する必要がある",
"プロファイルコンテナ: ユーザープロファイル全体をVHDに格納(推奨方式)",
"Office 365コンテナ: Outlook OST/Teams/OneDriveキャッシュのみを別VHDに格納(プロファイルと分離)",
"Cloud Cache: 複数のストレージ先にプロファイルを同時書き込み(高可用性/DR)",
"ライセンス: M365 E3/E5/F1/F3、またはRDS CALに含まれる(追加費用なし)",
"W365との違い: W365はCloud PC=専用VM→プロファイルはVM内に保存→FSLogix不要"]},
{type:"flow",title:"FSLogixストレージ選定の判断フロー",icon:"🔄",steps:[
{icon:"👥",label:"ユーザー数確認",desc:"100名以下→Azure Files",style:"blue"},
{icon:"⚡",label:"パフォーマンス要件",desc:"高IOPS→Premium/NetApp",style:""},
{icon:"💰",label:"コスト確認",desc:"予算に合わせて選定",style:""},
{icon:"🌍",label:"DR要件",desc:"GRS/CRR対応が必要か",style:""},
{icon:"✅",label:"ストレージ決定",desc:"要件に最適なオプション",style:"green"}]},
{type:"table",title:"ストレージオプション比較",icon:"💾",headers:["ストレージ","IOPS","遅延","コスト","DR","推奨シナリオ"],rows:[
["Azure Files Standard(HDD)","最大20,000","高(数ms)","最安","GRS対応","小規模/コスト重視"],
["Azure Files Premium(SSD)","最大100,000","低(1ms以下)","中","LRS/ZRS","一般的な推奨(大多数のケース)"],
["Azure NetApp Files","最大450,000","超低(0.3ms)","高","CRR対応","大規模/高パフォーマンス要件"],
["自前ファイルサーバー(VM)","VM依存","低","VM費用+管理費","手動","レガシー環境/特殊要件"]]},
{type:"list",title:"サイジングガイドライン",icon:"📏",items:[
"プロファイルサイズ目安: 一般ユーザー 5-10GB、Outlookヘビーユーザー 20-30GB、開発者 10-20GB",
"IOPS目安: ユーザーあたり10-20 IOPS(サインイン時ピーク: 50+ IOPS)",
"100ユーザーの例: Azure Files Premium 1TB(プロビジョニング最小)→ 約3,000 IOPS+10GB/ユーザー",
"ストレージ容量計算: ユーザー数 × 平均プロファイルサイズ × 1.2(バッファ) = 必要容量",
"Azure Files Premium課金: プロビジョニングした容量に対して課金(使用量ではない)",
"コスト計算例: Azure Files Premium 1TB = 約¥17,000/月(100ユーザーで¥170/ユーザー/月)",
"縮小ルール: FSLogixはデフォルトでVHDを自動拡張するが縮小しない→ディスク容量管理が必要",
"VHDXの最大サイズ: デフォルト30GB。業務要件に応じて変更(GPOまたはレジストリで設定)",
"バックアップ: Azure Backupまたはスナップショットで定期バックアップ推奨"]},
{type:"list",title:"トラブルシューティング — よくある問題と対処",icon:"🔧",items:[
"問題: サインインが遅い(30秒以上) → 原因: ストレージIOPS不足。対処: Azure Files Premium/NetApp Filesに変更",
"問題: プロファイルが読み込まれない → 原因: VHDのロック(前回のセッションが正常終了していない)。対処: ロックファイル削除+排他ロックの確認",
"問題: ディスク容量不足 → 原因: VHDXの自動拡張で肥大化。対処: 定期的にVHDXを圧縮するスケジュールタスクを設定",
"問題: Outlookキャッシュが大きすぎる → 対処: Office 365コンテナを分離してプロファイルとは別のストレージに保存",
"問題: サインアウト時のプロファイル保存に時間がかかる → 対処: 大きなファイルの排除設定(redirections.xmlで不要フォルダを除外)",
"問題: Cloud Cacheのレプリケーション遅延 → 対処: プロバイダーの順序を見直し、プライマリストレージを最寄りリージョンに設定",
"問題: 一時プロファイルでログインしてしまう → 原因: 同一ユーザーが複数セッションに接続。対処: セッション制限+VHDLocationの確認",
"監視: FSLogixのイベントログ(Applications and Services Logs > Microsoft > FSLogix)で詳細を確認",
"提案ポイント: 「FSLogixの運用負荷がW365にはない=運用コスト削減の大きな差別化要素」"]
},

{type:"list",title:"お客様からよくある質問と回答",icon:"💬",items:[
"Q: FSLogixはAVDを使うなら絶対に必要？ → A: マルチセッション(プールドホストプール)では必須です。パーソナル(専用VM)では任意ですが、イメージ更新時のプロファイル保持のために推奨されます",
"Q: FSLogixのストレージ費用はどれくらい → A: Azure Files Premium 1TB(100ユーザー想定)で約¥17,000/月。ユーザーあたり¥170/月。大規模環境ではAzure NetApp Files(高性能・高額)も検討します",
"Q: W365にFSLogixは必要ないのか → A: 不要です。W365は1ユーザー=1 Cloud PCの専用VM構成なので、プロファイルはVM内に直接保存されます。これがW365の大きなメリットの一つです",
"Q: FSLogixの運用が大変だと聞いた → A: 確かにストレージの監視・VHDの肥大化対策・トラブル対応など、継続的な運用が必要です。この運用負荷を避けたい場合はW365を推奨します",
"提案での活用: AVDとW365の比較時に「FSLogixの運用コスト」を可視化するとW365の優位性が明確になります。年間¥60-120万の運用コスト削減は経営層にも響くポイントです"]
}],

{id:"cmp",title:"W365 vs AVD 比較",week:"Week 8",time:"3h",keyMsg:"SaaSのシンプルさ vs PaaSの柔軟性 — 顧客状況で使い分け",content:[
{type:"list",title:"なぜW365 vs AVDの理解が最重要か",icon:"📖",items:[
"お客様から最も多い質問は「W365とAVDのどちらがいいですか？」です。SEとして自信を持って回答できることが、信頼獲得の第一歩です。答えは「お客様の状況次第」ですが、根拠を持って説明できることが重要です",
"結論から言うと: 「運用のシンプルさを重視するならW365、コスト最適化と柔軟性を重視するならAVD、そして多くのお客様には両方の併用が最適解です」と説明します",
"お客様への説明の仕方: 「W365は自家用車(月額固定で楽)、AVDはカーシェア(使った分だけ課金で効率的)のようなものです。通勤用には自家用車(W365)が便利ですが、月に数回しか使わないならカーシェア(AVD)の方がお得です」",
"よくある誤解: 「W365とAVDは競合製品」→ 実際にはMicrosoft自身が併用を推奨しています。同じ管理画面(Intune管理センター)で両方を管理でき、同じ認証基盤(Entra ID)を使用します",
"提案での差別化: 競合(Citrix/VMware/AWS)はこのような「SaaS+PaaS併用」の柔軟性を提供できません。W365+AVDの最適な組み合わせを設計できることがMicrosoft SEの強みです",
"このトピックの位置づけ: Month 1-2で学んだ全ての知識(ゼロトラスト/Entra ID/CA/Intune/W365/AVD)を統合して、お客様に最適な提案ができるようになることがゴールです"]},

{id:"sase",title:"SASE & Global Secure Access",week:"Week 9",time:"5h",keyMsg:"VPNをなくせるか？ — SASEの知識が提案の説得力を決める",content:[
{type:"list",title:"SASEとは — VPN時代からの転換を理解する",icon:"📖",items:[
"SASE(Secure Access Service Edge、読み方: サシー)は、2019年にGartnerが提唱した概念で、ネットワーク(SD-WAN)とセキュリティ(SWG/CASB/ZTNA/FWaaS)をクラウドで統合したアーキテクチャです",
"なぜ今SASEが注目されるか: リモートワークとクラウド利用の普及により、従来の「本社データセンターを中心とした境界型ネットワーク」では対応できなくなりました。VPN経由で全トラフィックを本社に集約すると帯域がボトルネックになります",
"お客様への説明の仕方: 「従来のVPNは高速道路の料金所のようなもの。全ての車(通信)が1箇所の料金所(VPN装置)を通るので渋滞します。SASEは各インターチェンジにETCゲートを設置するようなもの。どこからでもスムーズに安全に通れます」",
"W365/AVD提案との関係: Cloud PCを導入しても、オンプレミスのファイルサーバーや基幹システムにアクセスする必要がある場合、VPNが必要になります。SASEがあればVPNなしでオンプレアクセスが可能になり、Cloud PC+SASEで真のVPN撤廃が実現します",
"Microsoftの戦略: MicrosoftはGlobal Secure Access(GSA)というSSE(Security Service Edge)ソリューションを提供しています。Entra IDとネイティブ統合しているため、条件付きアクセスのポリシーでネットワークセキュリティも制御できます",
"VPN更新タイミングが最大のチャンス: 多くのお客様がVPN装置の保守期限切れを3-5年周期で迎えます。このタイミングで「VPN装置を更新する代わりにGSA+W365に移行しませんか」と提案するのが最も効果的です"]},

{id:"cost",title:"コスト提案の組み立て方",week:"Week 10",time:"3h",keyMsg:"月額比較ではなくTCOで「隠れコスト」を可視化して提案",content:[
{type:"list",title:"コスト提案の考え方 — なぜ月額比較では負けるのか",icon:"📖",items:[
"DaaS(W365/AVD)提案で最も多い失敗パターンは「月額だけで比較する」ことです。物理PCの月額は¥0に見えるため(購入時に一括払い済み)、W365の月額¥7,683が「高い」と判断されてしまいます",
"TCO(Total Cost of Ownership / 総所有コスト)で比較することが必須です。TCOには購入費だけでなく、キッティング人件費・ヘルプデスク対応費・修理費・電力費・セキュリティ管理費・PCリプレース費など全てのコストを含みます",
"お客様への説明の仕方: 「自家用車の月額を『ローン返済額だけ』で計算する人はいませんよね。ガソリン代・保険料・車検費・駐車場代・修理費を含めた総額で比較するのと同じです。PCも月額ライセンス料だけでなく、隠れたコストを全て含めて比較しましょう」",
"物理PCの隠れコストTOP5: (1)キッティング人件費(1台3時間×人件費)、(2)ヘルプデスク対応(月平均20件×2時間/件)、(3)セキュリティパッチ管理(緊急パッチの夜間対応含む)、(4)ハードウェア故障対応(年間故障率3-5%)、(5)4年後のPCリプレース費(再び発生)",
"最も効果的な提案方法: 「御社の100台のPCにかかっている年間総コストを一緒に計算してみましょう」と切り出し、隠れコストを一つずつ洗い出す。お客様自身が「こんなにかかっていたのか」と気づくプロセスが重要です",
"コスト提案の3大ポイント: (1)TCOで物理PCの隠れコストを可視化、(2)SKUミックス+Frontlineでコスト最適化、(3)定性効果(セキュリティ向上・展開速度・BCP)を金額換算して追加"]},

{id:"comp",title:"競合比較",week:"Week 10",time:"3h",keyMsg:"M365/Intuneとのネイティブ統合がMicrosoft DaaSの最大の武器",content:[
{type:"list",title:"競合比較の考え方 — 自社の強みを理解する",icon:"📖",items:[
"競合比較はDaaS提案で避けて通れないテーマです。お客様は必ず「他のDaaSと何が違うの？」と聞いてきます。自社の強みを正確に理解し、競合の弱みではなく自社の強みで勝負することが重要です",
"Microsoft DaaSの最大の武器は「M365とのネイティブ統合」です。認証(Entra ID)、デバイス管理(Intune)、セキュリティ(Defender)、ネットワーク(GSA)が全て同じMicrosoftプラットフォームで統合管理できます",
"お客様への説明の仕方: 「御社が既にMicrosoft 365を使っているなら、追加のDaaSライセンスを購入するだけでCloud PCが使えます。認証もデバイス管理も同じ管理画面です。別の製品を使うと、管理画面が増え、ID連携の設定が必要になります」",
"競合比較の基本姿勢: 競合製品を直接否定するのではなく、「Microsoft DaaSの優位性」を語る。お客様が競合を褒めたら「確かにXは良い製品です。ただ、御社の環境ではMicrosoftの方が効率的です」と対応する",
"よくある誤解: 「Citrix/VMwareの方が機能が多い」→ AVD+Intune+GSAの組み合わせで大部分の機能はカバーできます。むしろ1つのベンダーで完結する方がライセンスコスト・運用コストが低くなります",
"提案のタイミング: 競合比較は「お客様から聞かれたら」出す。自分から積極的に出すと、不要な比較検討が始まり、商談が長期化するリスクがある。ただし、競合が既に提案済みの場合は先手を打って比較表を提示する"]},

function renderMain(){
  if(view==='welcome') return renderWelcome();
  if(view==='quiz') return renderQuiz();
  const t=allT().find(x=>x.id===view);
  if(!t) return renderWelcome();
  const m=T.find(x=>x.topics.includes(t));
  let h=`<div class="topic-view active"><div class="breadcrumb">Month ${m.month}: ${m.title} › ${t.week}</div><div class="topic-title">${t.title}</div><div class="key-msg">${t.keyMsg}</div>`;
  t.content.forEach(b=>{
    if(b.type==='list') h+=rList(b);
    else if(b.type==='cards') h+=rCards(b);
    else if(b.type==='table') h+=rTable(b);
    else if(b.type==='flow') h+=rFlow(b);
    else if(b.type==='diagram') h+=rDiagram(b);
  });
  if(t.links&&t.links.length){
    h+=`<div class="block"><h3><span class="icon">🔗</span>深掘り学習</h3>`;
    t.links.forEach(l=>{h+=`<a class="link-box" href="${l.url}" target="_blank">📄 ${l.title}</a>`;});
    h+='</div>';
  }
  const all=allT(),idx=all.findIndex(x=>x.id===t.id);
  h+=`<div class="complete-bar"><button class="btn ${done[t.id]?'btn-outline':'btn-green'}" onclick="toggle('${t.id}')">${done[t.id]?'✅ 完了済み':'☐ 完了にする'}</button><div style="margin-left:auto;display:flex;gap:8px;">${idx>0?`<button class="btn btn-outline" onclick="go('${all[idx-1].id}')">← 前</button>`:''}${idx<all.length-1?`<button class="btn btn-azure" onclick="go('${all[idx+1].id}')">次 →</button>`:''}</div></div>`;
  h+='</div>';
  document.getElementById('main').innerHTML=h;
}

function rList(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><ul>${b.items.map(i=>`<li>${e(i)}</li>`).join('')}</ul></div>`;}
function rCards(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><div class="card-grid">${b.cards.map(c=>`<div class="card ${c.color}"><h4>${c.title}</h4><ul>${c.items.map(i=>`<li>${e(i)}</li>`).join('')}</ul></div>`).join('')}</div></div>`;}
function rTable(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><table class="cmp-table"><thead><tr>${b.headers.map(h=>`<th>${e(h)}</th>`).join('')}</tr></thead><tbody>${b.rows.map(r=>`<tr>${r.map((c,i)=>`<td${i===0?' style="font-weight:600;color:var(--fg)"':''}>${e(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
function rFlow(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><div class="diagram">${b.steps.map((s,i)=>`${i>0?'<span class="diagram-arrow">→</span>':''}<div class="diagram-step"><div class="diagram-box ${s.style||''}"><div class="d-icon">${s.icon}</div><h5>${s.label}</h5><p>${s.desc}</p></div></div>`).join('')}</div></div>`;}
function rDiagram(b){return `<div class="block"><h3><span class="icon">${b.icon||''}</span>${b.title}</h3><div class="pillar-row">${b.pillars.map(p=>`<div class="pillar" style="background:${p.color}"><div style="font-size:18px;margin-bottom:2px;">${p.label}</div><div style="font-size:10px;opacity:.85;">${p.desc}</div></div>`).join('')}</div></div>`;}

    ${T.map(m=>{const td=m.topics.filter(t=>done[t.id]).length;const mp=m.topics.length?Math.round(td/m.topics.length*100):0;return `<div class="month-card" onclick="go('${m.topics[0].id}')"><div class="mc-num" style="color:${m.color}">${m.month}</div><h3>Month ${m.month}: ${m.title}</h3><p>${m.period} — ${td}/${m.topics.length} 完了</p><div class="mc-prog"><div class="mc-prog-fill" style="width:${mp}%;background:${m.color}"></div></div></div>`;}).join('')}
  </div>
</div>

<!-- 合格基準 -->
<div class="block" style="border-left:3px solid var(--red);">
  <h3><span class="icon">🎓</span>卒業テストの合格基準</h3>
  <ul>
    <li>基礎知識（Q1-7）: 7問中 <b>5問以上</b>正答</li>
    <li>専門知識（Q8-14）: 7問中 <b>5問以上</b>正答</li>
    <li>提案シナリオ（Q15-20）: 先輩SEレビューで<b>「顧客に出せるレベル」</b>の評価</li>
    <li style="border-left-color:var(--green);">合格後 → 先輩SE同行で<b>実際の顧客提案に参加</b>（OJT フェーズ）</li>
    <li style="border-left-color:var(--yellow);">不合格 → 該当セクションを1週間復習し再テスト</li>
  </ul>
</div>
`;
}

function renderQuiz(){
  let h='<div class="topic-view active"><div class="topic-title">卒業テスト（20問）</div><div class="key-msg">各問1-2文で回答。「ヒント」で参考回答を表示</div>';
  let lc='';
  Q.forEach((q,i)=>{
    if(q.cat!==lc){lc=q.cat;h+=`<div class="section-divider"><h3>${lc==='基礎'?'📘 基礎知識（Q1-7）':lc==='専門'?'📗 専門知識（Q8-14）':'📙 提案シナリオ（Q15-20）'}</h3></div>`;}
    h+=`<div class="quiz-q ${q.cat==='提案'?'scenario':''}"><h4>Q${i+1}. ${e(q.q)}</h4><textarea class="quiz-answer" placeholder="回答を入力..."></textarea><button class="hint-btn" onclick="this.nextElementSibling.classList.toggle('active')">💡 ヒント</button><div class="quiz-hint">${e(q.h)}</div></div>`;
  });
  h+='</div>';
  document.getElementById('main').innerHTML=h;
}

function go(id){view=id;save();renderSB();renderMain();upd();window.scrollTo(0,0);}
function goQuiz(){view='quiz';renderSB();renderMain();window.scrollTo(0,0);}
function toggle(id){done[id]=!done[id];save();renderSB();renderMain();upd();showSaved();}
function upd(){const p=prog();document.getElementById('progFill').style.width=p+'%';document.getElementById('progText').textContent=p+'%';}
function e(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Theme switching
function setTheme(theme){
  document.documentElement.setAttribute('data-theme',theme);
  localStorage.setItem('tr_theme',theme);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.${theme}-btn`)?.classList.add('active');
}
function initTheme(){
  const saved=localStorage.getItem('tr_theme')||'light';
  setTheme(saved);
}

// Save indicator
function showSaved(){
  const el=document.getElementById('saveInd');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// Also save last viewed topic
function save(){
  localStorage.setItem("tr_done",JSON.stringify(done));
  localStorage.setItem("tr_lastView",view);
}

// Restore last view on load
function restoreView(){
  const last=localStorage.getItem("tr_lastView");
  if(last && last!=='welcome'){
    if(last==='quiz'){view='quiz';}
    else if(allT().find(t=>t.id===last)){view=last;}
  }
}

initTheme();
restoreView();
renderSB();renderMain();upd();
</script>
</body>
</html>
